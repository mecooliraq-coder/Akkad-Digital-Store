<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاد | متجر بلاد الرافدين الرقمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap');
        
        body { font-family: 'Tajawal', sans-serif; background: #0a0f12; color: #e0d6c0; min-height: 100vh; }
        
        .gold-text { color: #d4af37; }
        .gold-border { border-bottom: 2px solid #d4af37; }
        .gold-bg { background: linear-gradient(135deg, #d4af37, #b8942e); color: #0a0f12; }
        
        .product-card { background: rgba(20, 26, 31, 0.85); backdrop-filter: blur(10px); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 1rem; transition: all 0.3s; overflow: hidden; }
        .product-card:hover { transform: translateY(-5px); border-color: #d4af37; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        
        .media-box { height: 170px; position: relative; overflow: hidden; cursor: pointer; }
        .media-box img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .product-card:hover .media-box img { transform: scale(1.05); }
        .video-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.3s; }
        .media-box:hover .video-overlay { opacity: 1; }
        
        .btn-gold { background: linear-gradient(135deg, #d4af37, #b8942e); color: #0a0f12; font-weight: 700; transition: 0.3s; }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4); }
        
        .cat-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(212,175,55,0.2); transition: 0.3s; }
        .cat-btn.active, .cat-btn:hover { background: #d4af37; color: #0a0f12; border-color: #d4af37; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-content { background: #141a1f; border-radius: 1rem; padding: 1.5rem; max-width: 450px; width: 90%; border: 1px solid rgba(212,175,55,0.3); }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #1a1f24; }
        ::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 3px; }
        
        .loader { width: 40px; height: 40px; border: 3px solid rgba(212,175,55,0.2); border-top: 3px solid #d4af37; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 bg-[#0a0f12]/95 backdrop-blur gold-border">
        <div class="container mx-auto px-4 py-3">
            <div class="flex justify-between items-center mb-3">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-[#d4af37] flex items-center justify-center text-black font-bold text-xl">أ</div>
                    <span class="text-xl font-black text-[#d4af37]">أَكَّد</span>
                </div>
                <div class="flex gap-2">
                    <button onclick="shareStore()" class="w-10 h-10 rounded-lg bg-white/10 hover:bg-white/20 transition"><i class="fas fa-share-alt"></i></button>
                    <a href="https://wa.me/9647730492020" class="w-10 h-10 rounded-lg bg-[#25D366] flex items-center justify-center hover:bg-[#128C7E] transition" target="_blank"><i class="fab fa-whatsapp"></i></a>
                </div>
            </div>
            <input type="text" id="searchInput" onkeyup="searchProducts()" class="w-full bg-black/40 border border-white/10 rounded-xl py-2 px-4 text-white outline-none focus:border-[#d4af37]" placeholder="🔍 ابحث عن منتج...">
            <div id="categoriesContainer" class="flex gap-2 mt-3 overflow-x-auto pb-2"></div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        <div id="loadingScreen" class="text-center py-20"><div class="loader"></div><p>جاري تحميل المتجر...</p></div>
        <div id="productsGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 hidden"></div>
        <div id="noResults" class="hidden text-center py-20"><p class="text-white/40">لا توجد منتجات مطابقة للبحث</p></div>
    </main>

    <!-- مودال التفاصيل -->
    <div id="detailsModal" class="modal" onclick="closeModal('detailsModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-4"><h2 id="modalTitle" class="text-xl font-bold text-[#d4af37]"></h2><button onclick="closeModal('detailsModal')" class="text-white/50 hover:text-white text-2xl">&times;</button></div>
            <div id="modalDesc" class="text-sm text-white/70 leading-relaxed mb-6 whitespace-pre-line"></div>
            <button onclick="closeModal('detailsModal')" class="w-full bg-white/10 py-2 rounded-lg">إغلاق</button>
        </div>
    </div>

    <!-- مودال الطلب -->
    <div id="orderModal" class="modal" onclick="closeModal('orderModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 class="text-center mb-4 font-bold text-[#d4af37]"><i class="fab fa-whatsapp ml-2"></i>طلب سريع</h3>
            <div id="orderProductInfo" class="bg-white/5 p-3 rounded-lg text-sm mb-4"></div>
            <form id="orderForm" class="space-y-3">
                <input type="text" id="custName" placeholder="الاسم الكامل *" class="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-white outline-none focus:border-[#d4af37]" required>
                <select id="custGov" class="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-white outline-none focus:border-[#d4af37]" required>
                    <option value="">المحافظة *</option>
                    <option>بغداد</option><option>البصرة</option><option>نينوى</option><option>أربيل</option><option>بابل</option><option>النجف</option><option>كربلاء</option><option>ذي قار</option>
                </select>
                <input type="text" id="custCity" placeholder="المنطقة *" class="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-white outline-none focus:border-[#d4af37]" required>
                <input type="tel" id="custPhone" placeholder="رقم الهاتف *" class="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-white outline-none focus:border-[#d4af37]" required>
                <textarea id="custAddress" rows="2" placeholder="العنوان التفصيلي" class="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-white outline-none focus:border-[#d4af37]"></textarea>
                <button type="submit" class="btn-gold w-full py-3 rounded-xl font-bold"><i class="fab fa-whatsapp ml-2"></i>إرسال الطلب</button>
                <button type="button" onclick="closeModal('orderModal')" class="w-full py-2 text-xs text-white/50">إلغاء</button>
            </form>
        </div>
    </div>

    <!-- مودال الفيديو -->
    <div id="videoModal" class="modal" onclick="closeVideo()">
        <div class="relative w-[90%] max-w-3xl aspect-video bg-black rounded-xl overflow-hidden border border-[#d4af37]/30">
            <button onclick="closeVideo()" class="absolute -top-10 left-0 text-white/70 hover:text-white text-2xl">&times;</button>
            <iframe id="videoFrame" class="w-full h-full" src="" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAEH25yJ-pwfgFUMjLZNgDyNqw8Rcv9S6E",
            authDomain: "akkad-store-ab5a1.firebaseapp.com",
            databaseURL: "https://akkad-store-ab5a1-default-rtdb.firebaseio.com",
            projectId: "akkad-store-ab5a1",
            storageBucket: "akkad-store-ab5a1.firebasestorage.app",
            messagingSenderId: "456810444639",
            appId: "1:456810444639:web:a706dc19781cd7738e28ea"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let allProducts = [], categories = {}, categoryOrder = [], currentCategory = 'all', currentSearch = '', selectedProduct = null;
        
        function showToast(msg, isError = false) {
            let toast = document.createElement('div');
            toast.className = `fixed bottom-5 left-5 z-[9999] px-4 py-2 rounded-lg text-white text-sm animate-[slideIn_0.3s_ease] ${isError ? 'bg-red-600' : 'bg-[#1a4d7a]'}`;
            toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'} ml-2"></i>${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function escapeHtml(t) { if(!t) return ''; return String(t).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
        
        function shareStore() { if(navigator.share) navigator.share({title:'متجر أكاد', text:'اكتشف كنوز بلاد الرافدين', url:window.location.href}); else { navigator.clipboard.writeText(window.location.href); showToast('✅ تم نسخ الرابط'); } }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function closeVideo() { document.getElementById('videoModal').style.display = 'none'; document.getElementById('videoFrame').src = ''; }
        
        function getYouTubeId(url) {
            if(!url) return null;
            let video = url.trim();
            if(video.length === 11 && /^[a-zA-Z0-9_-]{11}$/.test(video)) return video;
            let match = video.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/);
            return match ? match[1] : null;
        }
        
        function playVideo(url) { let id = getYouTubeId(url); if(id) { document.getElementById('videoFrame').src = `https://www.youtube.com/embed/${id}?autoplay=1`; document.getElementById('videoModal').style.display = 'flex'; } else showToast('⚠️ رابط فيديو غير صالح', true); }
        
        async function loadData() {
            try {
                const [catsSnap, orderSnap, prodsSnap] = await Promise.all([
                    db.ref('categories').once('value'),
                    db.ref('categoryOrder').once('value'),
                    db.ref('products').once('value')
                ]);
                categories = catsSnap.val() || {};
                categoryOrder = orderSnap.val() || [];
                allProducts = Object.entries(prodsSnap.val() || {}).map(([id, data]) => ({ id, ...data }));
                
                document.getElementById('loadingScreen').classList.add('hidden');
                document.getElementById('productsGrid').classList.remove('hidden');
                renderCategories();
                renderProducts();
            } catch(e) { showToast('❌ فشل التحميل', true); console.error(e); }
        }
        
        function getSortedCategories() {
            let sorted = [];
            categoryOrder.forEach(k => { if(categories[k]) sorted.push({key:k, name:categories[k]}); });
            Object.keys(categories).forEach(k => { if(!categoryOrder.includes(k)) sorted.push({key:k, name:categories[k]}); });
            return sorted;
        }
        
        function renderCategories() {
            let container = document.getElementById('categoriesContainer');
            let sorted = getSortedCategories();
            let html = `<button onclick="filterCategory('all')" class="cat-btn px-4 py-2 rounded-full text-sm whitespace-nowrap transition ${currentCategory === 'all' ? 'active' : ''}">🏠 الكل</button>`;
            sorted.forEach(cat => { html += `<button onclick="filterCategory('${cat.key}')" class="cat-btn px-4 py-2 rounded-full text-sm whitespace-nowrap transition ${currentCategory === cat.key ? 'active' : ''}">📁 ${escapeHtml(cat.name)}</button>`; });
            container.innerHTML = html;
        }
        
        function filterCategory(key) { currentCategory = key; renderCategories(); renderProducts(); }
        function searchProducts() { currentSearch = document.getElementById('searchInput').value.toLowerCase(); renderProducts(); }
        
        function renderProducts() {
            let filtered = allProducts.filter(p => (currentCategory === 'all' || p.category === currentCategory) && (!currentSearch || p.name.toLowerCase().includes(currentSearch)));
            let grid = document.getElementById('productsGrid'), noResults = document.getElementById('noResults');
            if(filtered.length === 0) { grid.classList.add('hidden'); noResults.classList.remove('hidden'); return; }
            grid.classList.remove('hidden'); noResults.classList.add('hidden');
            grid.innerHTML = filtered.map(p => `<div class="product-card"><div class="media-box" onclick="handleMedia('${p.id}')"><img src="${p.img || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22%3E%3Crect width=%22200%22 height=%22200%22 fill=%22%231a1a2e%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23d4af37%22%3E📦%3C/text%3E%3C/svg%3E'}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22%3E%3Crect width=%22200%22 height=%22200%22 fill=%22%231a1a2e%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23d4af37%22%3E📦%3C/text%3E%3C/svg%3E'}">${p.video ? `<div class="video-overlay"><i class="fas fa-play text-white text-3xl"></i></div><div class="absolute top-2 left-2 bg-[#d4af37] text-black text-xs px-2 py-0.5 rounded-full"><i class="fas fa-video"></i> فيديو</div>` : ''}</div><div class="p-3 text-center"><h3 class="text-sm font-bold h-10 overflow-hidden">${escapeHtml(p.name)}</h3><div class="text-[#d4af37] text-base font-black my-2">${Number(p.price).toLocaleString()} د.ع</div><div class="flex gap-2"><button onclick="openOrder('${p.id}')" class="btn-gold flex-1 py-2 rounded-lg text-xs"><i class="fab fa-whatsapp ml-1"></i> شراء</button><button onclick="showDetails('${p.id}')" class="bg-white/5 py-2 rounded-lg text-xs w-10 border border-white/10"><i class="fas fa-info"></i></button></div></div></div>`).join('');
        }
        
        function handleMedia(id) { let p = allProducts.find(x => x.id === id); if(p?.video) playVideo(p.video); else showDetails(id); }
        function showDetails(id) { let p = allProducts.find(x => x.id === id); if(!p) return; document.getElementById('modalTitle').innerHTML = p.name; let desc = p.desc || 'لا توجد مواصفات'; desc += `\n\n💰 السعر: ${Number(p.price).toLocaleString()} دينار عراقي`; document.getElementById('modalDesc').innerHTML = escapeHtml(desc).replace(/\n/g,'<br>'); document.getElementById('detailsModal').style.display = 'flex'; }
        function openOrder(id) { selectedProduct = allProducts.find(x => x.id === id); document.getElementById('orderProductInfo').innerHTML = `<div class="flex justify-between"><span>${escapeHtml(selectedProduct.name)}</span><span class="text-[#d4af37]">${Number(selectedProduct.price).toLocaleString()} د.ع</span></div>`; ['custName','custCity','custPhone','custAddress'].forEach(i => document.getElementById(i).value = ''); document.getElementById('custGov').value = ''; document.getElementById('orderModal').style.display = 'flex'; }
        
        document.getElementById('orderForm').addEventListener('submit', async e => {
            e.preventDefault();
            let name = document.getElementById('custName').value, gov = document.getElementById('custGov').value, city = document.getElementById('custCity').value, phone = document.getElementById('custPhone').value, addr = document.getElementById('custAddress').value;
            if(!name || !gov || !city || !phone) { showToast('⚠️ ملء الحقول المطلوبة', true); return; }
            let orderData = { orderId: Date.now().toString(), customerName: name, governorate: gov, city: city, phone: phone, address: addr, productId: selectedProduct.id, productName: selectedProduct.name, productPrice: selectedProduct.price, status: 'جديد', createdAt: new Date().toISOString(), createdAtTimestamp: Date.now() };
            try {
                await db.ref('orders/' + orderData.orderId).set(orderData);
                let msg = `🛍️ *طلب جديد - متجر أكاد*%0A%0A📦 *المنتج:* ${selectedProduct.name}%0A💰 *السعر:* ${Number(selectedProduct.price).toLocaleString()} د.ع%0A%0A👤 *الاسم:* ${name}%0A🏛️ *المحافظة:* ${gov}%0A📍 *المنطقة:* ${city}%0A📱 *الهاتف:* ${phone}${addr ? `%0A🏠 *العنوان:* ${addr}` : ''}%0A%0A📅 ${new Date().toLocaleString('ar-IQ')}`;
                window.open(`https://wa.me/9647730492020?text=${msg}`, '_blank');
                showToast('✅ تم إرسال الطلب');
                closeModal('orderModal');
            } catch(err) { showToast('❌ فشل الإرسال', true); }
        });
        
        loadData();
        setInterval(() => { db.ref('categoryOrder').once('value').then(s => { categoryOrder = s.val() || []; renderCategories(); }); }, 5000);
    </script>
</body>
</html>
