<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم متجر أكاد</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-lg">
        <h1 class="text-2xl font-bold mb-6 text-center text-blue-800">إضافة منتج جديد</h1>
        
        <div class="space-y-4">
            <input id="pName" type="text" placeholder="اسم الجهاز (مثلاً: X96 Max)" class="w-full p-2 border rounded">
            <input id="pPrice" type="text" placeholder="السعر (مثلاً: 55,000)" class="w-full p-2 border rounded">
            <select id="pCat" class="w-full p-2 border rounded">
                <option value="tvbox">أجهزة TV Box</option>
                <option value="satellite">ستلايت</option>
                <option value="mounts">حمالات تلفزيون</option>
                <option value="lighting">إضاءة سمارت</option>
            </select>
            <input id="pImg" type="text" placeholder="رابط صورة المنتج" class="w-full p-2 border rounded">
            <button onclick="saveProduct()" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700">نشر المنتج</button>
        </div>
    </div>

    <script>
        // ضع هنا الكود الذي حصلت عليه من Firebase (Project Settings)
        const firebaseConfig = {
            apiKey: "AIza...", 
            authDomain: "akkad-store-...",
            databaseURL: "https://akkad-store-...", // تأكد من وجود هذا السطر
            projectId: "akkad-store-...",
            storageBucket: "akkad-store-...",
            messagingSenderId: "...",
            appId: "..."
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function saveProduct() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const cat = document.getElementById('pCat').value;
            const img = document.getElementById('pImg').value;

            if(name && price) {
                const newProductRef = db.ref('products').push();
                newProductRef.set({ name, price, cat, img })
                .then(() => {
                    alert("تم نشر المنتج بنجاح!");
                    location.reload();
                });
            }
        }
    </script>
</body>
</html>
