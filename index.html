<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر أكاد الرقمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; }
        
        /* حركة نابضة لزر الواتساب */
        .pulse-wa {
            animation: pulse-animation 2s infinite;
        }
        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0px rgba(34, 197, 94, 0.5); }
            100% { box-shadow: 0 0 0 15px rgba(34, 197, 94, 0); }
        }

        /* منع اختفاء شريط الأقسام */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <nav class="bg-slate-900 text-white shadow-2xl sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3">
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-2">
                    <div class="bg-blue-600 p-2 rounded-lg"><i class="fas fa-bolt"></i></div>
                    <h1 class="text-xl font-bold italic">AKKAD STORE</h1>
                </div>
                <div class="text-xs bg-slate-800 px-3 py-1 rounded-full border border-slate-700">بغداد | توصيل سريع</div>
            </div>
            
            <div class="relative group">
                <input type="text" id="searchInput" onkeyup="searchProducts()" 
                    class="w-full bg-slate-800 border border-slate-700 rounded-xl py-2 px-10 outline-none focus:border-blue-500 transition-all text-sm"
                    placeholder="ابحث عن جهاز، سعر، أو قسم...">
                <i class="fas fa-search absolute right-4 top-3 text-slate-500 text-sm"></i>
            </div>
        </div>

        <div id="categories-nav" class="bg-slate-800/50 backdrop-blur flex gap-3 px-4 py-2 overflow-x-auto scrollbar-hide border-t border-slate-700/50">
            </div>
    </nav>

    <div class="container mx-auto px-4 mt-6">
        <div class="bg-gradient-to-l from-blue-600 to-indigo-700 rounded-2xl p-6 text-white relative overflow-hidden shadow-lg">
            <div class="relative z-10">
                <h2 class="text-2xl font-bold mb-1">أقوى العروض الحصرية</h2>
                <p class="text-blue-100 text-sm">أجهزة TV Box بنظام أندرويد الأصلي</p>
            </div>
            <i class="fas fa-tv absolute left-[-20px] bottom-[-20px] text-8xl opacity-10 rotate-12"></i>
        </div>
    </div>

    <main class="container mx-auto px-4 py-8">
        <div id="products-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
            </div>
    </main>

    <script>
        const firebaseConfig = { databaseURL: "https://akkad-store-ab5a1-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myPhone = "9647730492020"; 
        let allProducts = [];

        // جلب الأقسام
        db.ref('categories').on('value', snap => {
            const cats = snap.val();
            const nav = document.getElementById('categories-nav');
            nav.innerHTML = `<button onclick="filterByCat('all')" class="bg-blue-600 px-4 py-1 rounded-full whitespace-nowrap text-xs text-white shadow-lg">الكل</button>`;
            for(let key in cats) {
                nav.innerHTML += `<button onclick="filterByCat('${cats[key]}')" class="bg-slate-700/50 hover:bg-slate-600 px-4 py-1 rounded-full whitespace-nowrap text-xs text-white transition">${cats[key]}</button>`;
            }
        });

        // جلب المنتجات
        db.ref('products').on('value', snap => {
            const data = snap.val();
            allProducts = data ? Object.entries(data).map(([id, val]) => ({id, ...val})).reverse() : [];
            displayProducts(allProducts);
        });

        function displayProducts(items) {
            const grid = document.getElementById('products-grid');
            if (items.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-20 text-gray-400">لا توجد نتائج بحث مطابقة..</div>`;
                return;
            }
            grid.innerHTML = items.map((p, index) => `
                <div class="bg-white rounded-2xl shadow-sm hover:shadow-xl transition-all duration-300 border border-gray-100 flex flex-col group relative">
                    ${index < 4 ? '<span class="absolute top-2 right-2 bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-full z-10 shadow-sm">جديد</span>' : ''}
                    <div class="h-40 p-4 bg-gray-50/50 rounded-t-2xl flex items-center justify-center overflow-hidden">
                        <img src="${p.img || 'https://via.placeholder.com/150'}" class="max-h-full group-hover:scale-110 transition-transform duration-500">
                    </div>
                    <div class="p-3 flex flex-col flex-1">
                        <div class="text-[10px] text-blue-500 font-bold mb-1 opacity-70">${p.cat || 'أخرى'}</div>
                        <h3 class="font-bold text-slate-800 text-xs mb-3 line-clamp-2 h-8">${p.name}</h3>
                        <div class="mt-auto">
                            <div class="text-lg font-bold text-slate-900 mb-3">${p.price} <span class="text-[10px] font-normal text-gray-500 italic">د.ع</span></div>
                            <a href="https://wa.me/${myPhone}?text=سلام عليكم، أرغب بطلب: ${p.name}" target="_blank" 
                               class="w-full bg-green-600 hover:bg-green-700 text-white py-2 rounded-xl flex items-center justify-center gap-2 transition active:scale-95 pulse-wa">
                                <i class="fab fa-whatsapp"></i> <span class="text-xs font-bold">اطلب الآن</span>
                            </a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // البحث الذكي
        function searchProducts() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allProducts.filter(p => 
                p.name.toLowerCase().includes(term) || 
                p.cat.toLowerCase().includes(term) ||
                p.price.toString().includes(term)
            );
            displayProducts(filtered);
        }

        function filterByCat(category) {
            const filtered = category === 'all' ? allProducts : allProducts.filter(p => p.cat === category);
            displayProducts(filtered);
        }
    </script>
</body>
</html>
