<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم | متجر أكاد الرقمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-100 p-4 md:p-10 text-right">
    <script>
        const pass = prompt("الرجاء إدخال كلمة سر المدير للدخول:");
        if (pass !== "ashd1980") {
            alert("كلمة السر خاطئة!");
            window.location.href = "index.html";
        }
    </script>

    <div class="max-w-6xl mx-auto">
        <header class="mb-10 flex justify-between items-center bg-white p-6 rounded-2xl shadow-sm border-b-4 border-blue-600">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">إدارة متجر أكاد</h1>
                <p class="text-gray-500 text-sm">أضف المنتجات، المواصفات، وفيديوهات المراجعة</p>
            </div>
            <a href="index.html" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold hover:bg-blue-700 transition">معاينة المتجر</a>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 space-y-6">
                
                <div class="bg-white p-6 rounded-2xl shadow-lg">
                    <h2 class="font-bold mb-4 flex items-center gap-2 text-orange-600"><i class="fas fa-list"></i> إدارة الأقسام</h2>
                    <input id="catId" type="hidden">
                    <div class="flex gap-2 mb-4">
                        <input id="newCat" type="text" placeholder="اسم القسم الجديد" class="flex-1 p-2 border rounded-lg outline-none focus:ring-2 focus:ring-orange-400 text-sm">
                        <button onclick="saveCategory()" id="btnSaveCat" class="bg-orange-500 text-white px-4 rounded-lg font-bold">+</button>
                    </div>
                    <div id="cats-list" class="space-y-2 max-h-40 overflow-y-auto pr-2 text-sm">
                        </div>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-lg border-t-4 border-blue-600">
                    <h2 class="font-bold mb-4 flex items-center gap-2 text-blue-600"><i class="fas fa-box-open"></i> بيانات المنتج</h2>
                    <div class="space-y-3">
                        <input id="pId" type="hidden">
                        <input id="pName" type="text" placeholder="اسم الجهاز" class="w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-400 text-sm">
                        <input id="pPrice" type="text" placeholder="السعر (مثال: 50,000)" class="w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-400 text-sm">
                        <input id="pImg" type="text" placeholder="رابط الصورة المباشر" class="w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-400 text-sm">
                        <input id="pVideo" type="text" placeholder="معرف فيديو يوتيوب (ID)" class="w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-red-400 text-sm text-red-600">
                        
                        <label class="block text-xs font-bold text-gray-400 mr-1">المواصفات (تظهر عند "اقرأ التفاصيل")</label>
                        <textarea id="pDesc" placeholder="اكتب مواصفات الجهاز هنا... استعمل أسطر جديدة للنقاط." class="w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-400 h-28 text-sm"></textarea>
                        
                        <select id="pCat" class="w-full p-2 border rounded-lg outline-none bg-gray-50 text-sm cursor-pointer"></select>
                        
                        <button onclick="saveProduct()" id="btnSave" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold shadow-lg hover:bg-blue-700 transition active:scale-95">حفظ المنتج</button>
                        <button onclick="resetForm()" class="w-full text-[10px] text-gray-400 hover:underline">تفريغ الحقول</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="bg-white p-6 rounded-2xl shadow-lg min-h-[600px]">
                    <h2 class="font-bold mb-6 text-slate-700 flex items-center gap-2 border-b pb-3">
                        <i class="fas fa-th-large"></i> المنتجات الحالية في المتجر
                    </h2>
                    <div id="admin-products-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // إعدادات Firebase
        const firebaseConfig = { databaseURL: "https://akkad-store-ab5a1-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- وظائف الأقسام ---
        function saveCategory() {
            const id = document.getElementById('catId').value;
            const name = document.getElementById('newCat').value;
            if(!name) return alert("أدخل اسم القسم");
            if(id) db.ref('categories').child(id).set(name);
            else db.ref('categories').push(name);
            document.getElementById('catId').value = ""; document.getElementById('newCat').value = "";
            document.getElementById('btnSaveCat').innerText = "+";
        }

        db.ref('categories').on('value', snap => {
            const cats = snap.val();
            const list = document.getElementById('cats-list');
            const select = document.getElementById('pCat');
            list.innerHTML = ""; select.innerHTML = "";
            for(let key in cats) {
                list.innerHTML += `
                    <div class="flex justify-between items-center bg-gray-50 p-2 rounded-lg border">
                        <span>${cats[key]}</span>
                        <div class="flex gap-2">
                            <button onclick="editCat('${key}', '${cats[key]}')" class="text-blue-500 hover:scale-110 transition"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteCat('${key}')" class="text-red-500 hover:scale-110 transition"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>`;
                select.innerHTML += `<option value="${cats[key]}">${cats[key]}</option>`;
            }
        });

        function editCat(id, name) {
            document.getElementById('catId').value = id;
            document.getElementById('newCat').value = name;
            document.getElementById('btnSaveCat').innerText = "حفظ";
        }

        function deleteCat(id) { if(confirm("حذف القسم؟")) db.ref('categories').child(id).remove(); }

        // --- وظائف المنتجات ---
        function saveProduct() {
            const id = document.getElementById('pId').value;
            const data = {
                name: document.getElementById('pName').value,
                price: document.getElementById('pPrice').value,
                img: document.getElementById('pImg').value,
                video: document.getElementById('pVideo').value,
                desc: document.getElementById('pDesc').value,
                cat: document.getElementById('pCat').value
            };

            if(!data.name || !data.price) return alert("يرجى ملء الاسم والسعر على الأقل");

            if(id) db.ref('products').child(id).update(data);
            else db.ref('products').push(data);
            
            resetForm();
        }

        db.ref('products').on('value', snap => {
            const prods = snap.val();
            const list = document.getElementById('admin-products-list');
            list.innerHTML = "";
            for(let key in prods) {
                list.innerHTML += `
                <div class="bg-slate-50 p-3 rounded-2xl border flex items-center gap-3">
                    <img src="${prods[key].img || 'https://via.placeholder.com/50'}" class="w-12 h-12 object-contain bg-white rounded-lg border">
                    <div class="flex-1 min-w-0">
                        <div class="font-bold text-xs truncate">${prods[key].name}</div>
                        <div class="text-blue-600 text-[10px] font-bold">${prods[key].price} د.ع</div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="editProduct('${key}', ${JSON.stringify(prods[key]).replace(/"/g, '&quot;')})" class="bg-blue-100 text-blue-700 px-3 py-1 rounded-lg text-[10px] font-bold">تعديل</button>
                        <button onclick="deleteProduct('${key}')" class="bg-red-100 text-red-700 px-3 py-1 rounded-lg text-[10px] font-bold">حذف</button>
                    </div>
                </div>`;
            }
        });

        function deleteProduct(id) { if(confirm("هل أنت متأكد من حذف هذا المنتج؟")) db.ref('products').child(id).remove(); }

        function editProduct(id, data) {
            document.getElementById('pId').value = id;
            document.getElementById('pName').value = data.name;
            document.getElementById('pPrice').value = data.price;
            document.getElementById('pImg').value = data.img;
            document.getElementById('pVideo').value = data.video || "";
            document.getElementById('pDesc').value = data.desc || "";
            document.getElementById('pCat').value = data.cat;
            document.getElementById('btnSave').innerText = "تحديث المنتج الآن";
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function resetForm() {
            document.getElementById('pId').value = "";
            document.getElementById('pName').value = "";
            document.getElementById('pPrice').value = "";
            document.getElementById('pImg').value = "";
            document.getElementById('pVideo').value = "";
            document.getElementById('pDesc').value = "";
            document.getElementById('btnSave').innerText = "حفظ المنتج";
        }
    </script>
</body>
</html>
