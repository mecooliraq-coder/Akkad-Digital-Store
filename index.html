<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر أكاد | AKKAD STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Amiri:wght@700&display=swap');
        
        :root {
            --akkad-dark: #030508;
            --akkad-gold: #c9a961;
            --neon-cyan: #00f2ff;
            --neon-glow: 0 0 15px rgba(0, 242, 255, 0.4);
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--akkad-dark);
            color: #fff;
            background-image: radial-gradient(circle at top right, rgba(201,169,97,0.05), transparent),
                              radial-gradient(circle at bottom left, rgba(0,242,255,0.05), transparent);
        }

        .neon-border {
            border: 1px solid rgba(201, 169, 97, 0.2);
            transition: all 0.3s ease;
        }

        .neon-border:hover {
            border-color: var(--neon-cyan);
            box-shadow: var(--neon-glow);
            transform: translateY(-5px);
        }

        .gold-text { color: var(--akkad-gold); font-family: 'Amiri', serif; }
        
        .category-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(201, 169, 97, 0.2);
            transition: 0.3s;
        }

        .category-btn.active {
            background: var(--akkad-gold);
            color: #000;
            box-shadow: 0 0 15px var(--akkad-gold);
        }

        /* موديول التفاصيل */
        .modal-blur {
            backdrop-filter: blur(10px);
            background: rgba(0, 0, 0, 0.8);
        }
    </style>
</head>
<body class="min-h-screen">

    <header class="py-12 text-center border-b border-white/5">
        <h1 class="text-6xl gold-text tracking-widest mb-2 uppercase">AKKAD</h1>
        <p class="text-cyan-400 text-xs tracking-[0.5em] uppercase">The Digital Civilization</p>
    </header>

    <nav class="sticky top-0 z-40 bg-[#030508]/80 backdrop-blur-md py-4 border-b border-white/5">
        <div id="categoriesNav" class="flex justify-center gap-3 overflow-x-auto px-4 no-scrollbar">
            </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        <div id="productsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            </div>
    </main>

    <div id="detailsModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 modal-blur">
        <div class="bg-[#0a0f18] border border-cyan-500/30 rounded-3xl max-w-2xl w-full overflow-hidden shadow-2xl">
            <div id="modalBody" class="p-0"></div>
            <div class="p-6 bg-black/20 flex justify-between items-center">
                <button onclick="closeDetails()" class="text-gray-400 hover:text-white px-4 py-2">إغلاق</button>
                <a id="whatsappLink" href="#" target="_blank" class="bg-green-600 hover:bg-green-500 text-white px-6 py-2 rounded-full flex items-center gap-2 transition">
                    <i class="fab fa-whatsapp"></i> طلب المنتج
                </a>
            </div>
        </div>
    </div>

    <script>
        // إعدادات Firebase (نفس إعداداتك الأصلية)
        const firebaseConfig = {
            apiKey: "AIzaSyAEH25yJ-pwfgFUMjLZNgDyNqw8Rcv9S6E",
            authDomain: "akkad-store-ab5a1.firebaseapp.com",
            databaseURL: "https://akkad-store-ab5a1-default-rtdb.firebaseio.com",
            projectId: "akkad-store-ab5a1",
            storageBucket: "akkad-store-ab5a1.firebasestorage.app",
            messagingSenderId: "456810444639",
            appId: "1:456810444639:web:a706dc19781cd7738e28ea"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allProducts = [];
        let currentCat = "الكل";

        // جلب البيانات
        function loadStore() {
            // جلب الأقسام
            db.ref('categories').on('value', s => {
                const cats = s.val() || {};
                renderCategories(Object.values(cats));
            });

            // جلب المنتجات
            db.ref('products').on('value', s => {
                const data = s.val() || {};
                allProducts = Object.entries(data).map(([id, val]) => ({id, ...val}));
                filterProducts(currentCat);
            });
        }

        function renderCategories(catList) {
            const nav = document.getElementById('categoriesNav');
            const items = ["الكل", ...catList];
            nav.innerHTML = items.map(c => `
                <button onclick="filterProducts('${c}')" 
                        class="category-btn px-6 py-2 rounded-full text-sm font-bold whitespace-nowrap ${currentCat === c ? 'active' : ''}">
                    ${c}
                </button>
            `).join('');
        }

        function filterProducts(cat) {
            currentCat = cat;
            renderCategories(Array.from(new Set(allProducts.map(p => p.category))));
            
            const filtered = cat === "الكل" ? allProducts : allProducts.filter(p => p.category === cat);
            const grid = document.getElementById('productsGrid');
            
            grid.innerHTML = filtered.map(p => `
                <div class="neon-border bg-[#0a0f18] rounded-2xl overflow-hidden flex flex-col">
                    <div class="relative group cursor-pointer" onclick="openDetails('${p.id}')">
                        <img src="${p.image}" class="w-full h-64 object-cover transition duration-500 group-hover:scale-110">
                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition flex items-center justify-center">
                            <span class="bg-white/10 backdrop-blur-md border border-white/20 px-4 py-2 rounded-full text-sm font-bold">
                                قراءة التفاصيل
                            </span>
                        </div>
                    </div>
                    <div class="p-5 flex-grow">
                        <h3 class="text-lg font-bold mb-2 text-gray-100">${p.name}</h3>
                        <div class="flex justify-between items-center mt-4">
                            <span class="text-xl font-bold text-[var(--neon-cyan)]">${Number(p.price).toLocaleString()} <small class="text-[10px]">د.ع</small></span>
                            <button onclick="openDetails('${p.id}')" class="text-[var(--akkad-gold)] hover:underline text-sm">التفاصيل</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openDetails(id) {
            const p = allProducts.find(x => x.id === id);
            const modal = document.getElementById('detailsModal');
            const body = document.getElementById('modalBody');
            const wa = document.getElementById('whatsappLink');

            body.innerHTML = `
                <div class="grid md:grid-cols-2 gap-0">
                    <img src="${p.image}" class="w-full h-full object-cover max-h-[400px]">
                    <div class="p-8 space-y-4">
                        <h2 class="text-3xl gold-text">${p.name}</h2>
                        <span class="inline-block bg-cyan-500/10 text-cyan-400 text-xs px-3 py-1 rounded-full">${p.category}</span>
                        <p class="text-gray-400 leading-relaxed text-sm">${p.description || 'لا يوجد وصف متوفر لهذه القطعة.'}</p>
                        <div class="text-3xl font-bold text-white pt-4 border-t border-white/5">
                            ${Number(p.price).toLocaleString()} د.ع
                        </div>
                    </div>
                </div>
            `;

            wa.href = `https://wa.me/9647800000000?text=مرحباً، أريد طلب: ${p.name}`; // استبدل بالرقم الخاص بك
            modal.classList.remove('hidden');
        }

        function closeDetails() {
            document.getElementById('detailsModal').classList.add('hidden');
        }

        loadStore();
    </script>
</body>
</html>
