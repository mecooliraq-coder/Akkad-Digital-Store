<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | متجر أكاد الرقمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: #f1f5f9; scroll-behavior: smooth; }
        .glass-panel { background: white; border-radius: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid rgba(226, 232, 240, 0.8); }
        .stat-card { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); color: white; border-radius: 1.5rem; padding: 1.5rem; position: relative; overflow: hidden; transition: transform 0.3s; }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-card.orange { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); }
        .stat-card.green { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .stat-card.red { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); }
        .notification-toast { position: fixed; bottom: 20px; left: 20px; z-index: 9999; background: #1e293b; color: white; border-radius: 1rem; padding: 1rem 1.5rem; box-shadow: 0 10px 40px rgba(0,0,0,0.2); animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-overlay.active { display: flex; }
        .modal-box { background: white; border-radius: 1.5rem; padding: 2rem; width: 90%; max-width: 500px; }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-8 text-right">

    <div id="loginScreen" class="fixed inset-0 bg-gradient-to-br from-blue-600 to-blue-800 z-50 flex items-center justify-center">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md mx-4 text-center">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 text-white">
                <i class="fas fa-shield-alt text-2xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-slate-800">تسجيل الدخول</h2>
            <p class="text-sm text-gray-400 mt-2 mb-6">لوحة تحكم متجر أكاد الرقمي</p>
            <input id="loginPassword" type="password" class="w-full p-3 border rounded-xl mb-4 text-center outline-none" placeholder="أدخل كلمة المرور">
            <button onclick="login()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700">دخول</button>
            <p id="loginError" class="text-red-500 text-xs mt-3 hidden">كلمة المرور غير صحيحة!</p>
        </div>
    </div>

    <div id="mainContent" class="max-w-7xl mx-auto hidden">
        <header class="mb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg text-white">
                    <i class="fas fa-tools text-xl"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold text-slate-800">لوحة تحكم أكاد</h1>
                    <p class="text-xs text-gray-400" id="currentTime"></p>
                </div>
            </div>
            <div class="flex gap-3">
                <button onclick="exportToCSV()" class="bg-green-600 text-white px-4 py-2 rounded-xl font-bold text-sm hover:bg-green-700 transition">تصدير CSV</button>
                <button onclick="openCategoryModal()" class="bg-orange-500 text-white px-4 py-2 rounded-xl font-bold text-sm hover:bg-orange-600 transition">الأقسام</button>
                <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded-xl font-bold text-sm">خروج</button>
            </div>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8 text-white">
            <div class="stat-card">
                <div class="text-3xl font-bold" id="statTotalProducts">0</div>
                <div class="text-xs opacity-80">إجمالي المنتجات</div>
            </div>
            <div class="stat-card orange">
                <div class="text-3xl font-bold" id="statLowStock">0</div>
                <div class="text-xs opacity-80">مخزون منخفض</div>
            </div>
            <div class="stat-card red">
                <div class="text-3xl font-bold" id="statOutOfStock">0</div>
                <div class="text-xs opacity-80">نفذ من المخزون</div>
            </div>
            <div class="stat-card green">
                <div class="text-3xl font-bold" id="statCategories">0</div>
                <div class="text-xs opacity-80">الأقسام النشطة</div>
            </div>
        </div>

        <div class="glass-panel p-6">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-1 bg-gray-50 p-6 rounded-2xl border sticky top-4">
                    <h2 class="font-bold mb-4 text-blue-700" id="formTitle">إضافة منتج جديد</h2>
                    <div class="space-y-3">
                        <input id="pId" type="hidden">
                        <input id="pName" type="text" placeholder="اسم المنتج" class="w-full p-3 border rounded-xl text-sm">
                        <div class="grid grid-cols-2 gap-3">
                            <input id="pPrice" type="text" placeholder="السعر (د.ع)" class="w-full p-3 border rounded-xl text-sm">
                            <input id="pStock" type="number" placeholder="المخزون" class="w-full p-3 border rounded-xl text-sm">
                        </div>
                        <input id="pImg" type="text" placeholder="رابط الصورة" class="w-full p-3 border rounded-xl text-sm">
                        <select id="pCat" class="w-full p-3 border rounded-xl text-sm bg-white"></select>
                        <textarea id="pDesc" placeholder="وصف المنتج" class="w-full p-3 border rounded-xl h-24 text-sm"></textarea>
                        <button onclick="saveProduct()" id="btnSave" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold shadow-lg hover:bg-blue-700">حفظ المنتج</button>
                        <button onclick="resetForm()" id="btnCancel" class="w-full text-gray-400 text-xs hidden">إلغاء التعديل</button>
                    </div>
                </div>

                <div class="lg:col-span-2">
                    <div class="mb-4">
                        <input type="text" id="searchInput" onkeyup="searchProducts()" placeholder="
