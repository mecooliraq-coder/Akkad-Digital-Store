<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاد | متجر بلاد الرافدين الرقمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=Lateef&display=swap');
        
        :root {
            --mesopotamia-dark: #0a0f12;
            --akkad-gold: #d4af37;
            --cuneiform-glow: rgba(212, 175, 55, 0.12); /* شفافية مناسبة */
        }
        
        body { 
            font-family: 'Tajawal', sans-serif; 
            background: var(--mesopotamia-dark); 
            color: #f0e6d0; 
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        /* 1. نظام الخلفية المسمارية المتحركة */
        #cuneiform-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* خلف كل العناصر */
            pointer-events: none;
            background: radial-gradient(circle at center, #141a1f 0%, #0a0f12 100%);
        }

        .cuneiform-char {
            position: absolute;
            font-family: 'serif';
            color: var(--cuneiform-glow);
            user-select: none;
            filter: blur(0.3px);
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }

        /* تنسيق المتجر */
        .akkad-nav {
            background: rgba(10, 15, 18, 0.85); 
            backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--akkad-gold);
        }

        .akkad-card { 
            background: rgba(20, 26, 31, 0.6); /* خلفية بطاقة شفافة قليلاً */
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(212, 175, 55, 0.2); 
            border-radius: 1rem;
            transition: 0.4s;
            overflow: hidden; /* لضمان عدم خروج الصورة عن البطاقة */
        }
        
        .akkad-card:hover { 
            border-color: var(--akkad-gold);
            transform: translateY(-5px);
            background: rgba(20, 26, 31, 0.8);
        }

        .btn-akkad { 
            background: linear-gradient(135deg, var(--akkad-gold), #b8942e); 
            color: #0a0f12; font-weight: 800;
        }

        .btn-specs {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }

        .product-media-container { 
            height: 160px; 
            overflow: hidden; 
            position: relative; 
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }
        
        .product-media-container img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block; /* يضمن عدم وجود مسافات غريبة */
        }

        .modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.92); z-index: 1000;
            align-items: center; justify-content: center; backdrop-filter: blur(10px);
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--mesopotamia-dark); }
        ::-webkit-scrollbar-thumb { background: var(--akkad-gold); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="cuneiform-background"></div>

    <nav class="akkad-nav sticky top-0 z-50">

                    <img src="https://www.raed.net/img?id=1539063" class="w-12 h-12 rounded-full border-2 border-[var(--akkad-gold)]">
                    <div class="text-right">
                        <div class="text-xl font-black text-[var(--akkad-gold)] leading-none">أَكَّد</div>
                        <div class="text-[7px] tracking-[0.3em] opacity-60 uppercase">Digital Heritage</div>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="shareStore()" class="bg-white/10 p-2 rounded-lg"><i class="fas fa-share-nodes"></i></button>
                    <a href="https://wa.me/9647730492020" class="bg-[#25D366] px-4 py-2 rounded-lg text-white font-bold text-xs flex items-center gap-1"><i class="fab fa-whatsapp"></i> واتساب</a>
                </div>
            </div>
            <input type="text" id="searchInput" onkeyup="searchProducts()" class="w-full bg-black/40 border border-white/10 rounded-xl py-3 px-4 text-center outline-none focus:border-[var(--akkad-gold)] transition" placeholder="ابحث في كنوز أكاد...">
            <div id="categories-nav" class="flex gap-2 mt-4 overflow-x-auto pb-2 no-scrollbar text-xs"></div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        <div id="loading" class="text-center py-20">

        </div>

        <div id="products-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 hidden"></div>

        <div id="no-results" class="hidden text-center py-20 opacity-40">

            <p>لا توجد نتائج تطابق بحثك</p>
        </div>
    </main>

    <div id="descModal" class="modal" onclick="this.style.display='none'">
        <div class="bg-[#141a1f] border border-white/10 p-6 rounded-2xl max-w-md w-[90%] text-right" onclick="event.stopPropagation()">
            <h2 id="modalTitle" class="text-xl font-bold text-[var(--akkad-gold)] mb-4 border-b border-white/5 pb-2"></h2>
            <div id="modalDesc" class="text-sm opacity-80 leading-loose mb-6 max-h-[60vh] overflow-y-auto whitespace-pre-line relative z-10"></div>
            <button onclick="document.getElementById('descModal').style.display='none'" class="w-full bg-white/10 py-3 rounded-xl font-bold relative z-10">فهمت</button>
        </div>
    </div>

    <div id="quickOrderModal" class="modal">
        <div class="bg-[#141a1f] border border-[var(--akkad-gold)] p-6 rounded-2xl max-w-md w-[90%]" onclick="event.stopPropagation()">
            <h3 class="text-lg font-bold mb-4 text-center text-[var(--akkad-gold)]">تأكيد طلب الشراء</h3>
            <div id="quickProductInfo" class="bg-black/30 p-3 rounded-lg text-xs mb-4 text-center"></div>
            <form id="quickOrderForm" class="space-y-4">
                <input type="text" id="custName" placeholder="الاسم الكامل للزبون" class="w-full bg-black/40 border border-white/10 p-3 rounded-xl outline-none" required>
                
                <div class="grid grid-cols-2 gap-3">
                    <select id="custGov" class="w-full bg-[#0a0f12] border border-white/10 p-3 rounded-xl outline-none text-xs" required>
                        <option value="">اختر المحافظة</option>
                        <option>بغداد</option><option>البصرة</option><option>نينوى</option><option>أربيل</option>
                        <option>النجف</option><option>كربلاء</option><option>ذي قار</option><option>بابل</option>
                    </select>
                    <input type="text" id="custCity" placeholder="المدينة/المنطقة" class="w-full bg-black/40 border border-white/10 p-3 rounded-xl outline-none text-xs" required>
                </div>

                <input type="tel" id="custPhone" placeholder="رقم الهاتف الأساسي" class="w-full bg-black/40 border border-white/10 p-3 rounded-xl outline-none" required>
                <input type="text" id="custLandmark" placeholder="أقرب نقطة دالة (مثال: قرب جامع ...)" class="w-full bg-black/40 border border-white/10 p-3 rounded-xl outline-none">
                
                <button type="submit" class="btn-akkad w-full py-4 rounded-xl text-sm font-bold">إرسال الطلب عبر واتساب</button>
                <button type="button" onclick="closeModal('quickOrderModal')" class="w-full text-xs opacity-50 py-2">إلغاء</button>
            </form>
        </div>
    </div>

    <div id="videoModal" class="modal" onclick="closeVideo()">
        <div class="relative w-full max-w-3xl aspect-video bg-black rounded-xl overflow-hidden shadow-2xl">
            <iframe id="vFrame" class="w-full h-full" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>
