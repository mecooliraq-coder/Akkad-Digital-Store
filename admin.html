<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | متجر أكاد الرقمي</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Tajawal', sans-serif; background: #f8fafc; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); padding: 40px; width: 100%; max-width: 380px; text-align: center; }
        .icon-box { width: 64px; height: 64px; background: #3b82f6; border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3); }
        .icon-box svg { width: 32px; height: 32px; fill: white; }
        h1 { font-size: 22px; font-weight: 700; color: #1e293b; margin-bottom: 8px; }
        p { color: #64748b; font-size: 14px; margin-bottom: 24px; }
        input { width: 100%; padding: 14px 16px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 14px; font-family: inherit; margin-bottom: 12px; transition: 0.2s; background: #f8fafc; }
        input:focus { outline: none; border-color: #3b82f6; background: white; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        button { width: 100%; padding: 14px; background: #3b82f6; color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 500; cursor: pointer; transition: 0.2s; margin-top: 8px; }
        button:hover { background: #2563eb; transform: translateY(-1px); }
        button:disabled { background: #94a3b8; cursor: not-allowed; transform: none; }
        .error { color: #ef4444; font-size: 13px; margin-top: 12px; min-height: 20px; }
        .link { display: inline-block; margin-top: 20px; color: #3b82f6; text-decoration: none; font-size: 13px; }
        .link:hover { text-decoration: underline; }
        .loader { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="icon-box">
            <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
        </div>
        <h1>لوحة تحكم أكاد</h1>
        <p>سجّل الدخول لإدارة المتجر</p>
        
        <form id="loginForm">
            <input type="email" id="adminEmail" placeholder="البريد الإلكتروني" required autocomplete="email">
            <input type="password" id="adminPass" placeholder="كلمة المرور" required autocomplete="current-password">
            <button type="submit" id="loginBtn">
                <span id="btnText">تسجيل الدخول</span>
                <span class="loader" id="loader"></span>
            </button>
        </form>
        
        <p id="errorMsg" class="error"></p>
        <a href="index.html" class="link">← العودة للمتجر</a>
    </div>

    <script>
        // ⚠️ هام جداً: الصق إعدادات مشروعك هنا بدقة
        const firebaseConfig = {
            apiKey: "ضع_API_KEY_هنا",
            authDomain: "akkad-store-ab5a1.firebaseapp.com",
            projectId: "akkad-store-ab5a1",
            storageBucket: "akkad-store-ab5a1.appspot.com",
            messagingSenderId: "ضع_MessagingSenderId_هنا",
            appId: "ضع_AppId_هنا",
            databaseURL: "https://akkad-store-ab5a1-default-rtdb.firebaseio.com"
        };

        // تهيئة فايربيس
        if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const btnText = document.getElementById('btnText');
        const loader = document.getElementById('loader');
        const errorMsg = document.getElementById('errorMsg');

        // التحقق من الجلسة المحفوظة
        if(localStorage.getItem('akkad_admin_session') === 'active') {
            auth.onAuthStateChanged(user => {
                if(user && user.email === 'mecool.iraq@gmail.com') {
                    window.location.href = 'dashboard.html'; // أو صفحة اللوحة
                } else {
                    localStorage.removeItem('akkad_admin_session');
                }
            });
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPass').value.trim();
            
            btnText.style.display = 'none';
            loader.style.display = 'block';
            loginBtn.disabled = true;
            errorMsg.textContent = '';

            try {
                await auth.signInWithEmailAndPassword(email, password);
                localStorage.setItem('akkad_admin_session', 'active');
                localStorage.setItem('akkad_admin_time', Date.now().toString());
                window.location.href = 'dashboard.html'; // انتقل للوحة بعد نجاح الدخول
            } catch (error) {
                console.error("🔴 Firebase Auth Error:", error.code, error.message);
                
                // ترجمة أخطاء فايربيس لعربية واضحة
                const errors = {
                    'auth/user-not-found': 'هذا البريد غير مسجل في النظام',
                    'auth/wrong-password': 'كلمة المرور غير صحيحة',
                    'auth/invalid-email': 'صيغة البريد غير صحيحة',
                    'auth/invalid-api-key': 'إعدادات المشروع ناقصة (apiKey غير صحيح)',
                    'auth/network-request-failed': 'مشكلة اتصال أو إعدادات DNS',
                    'auth/too-many-requests': 'محاولات كثيرة، انتظر قليلاً'
                };
                
                errorMsg.textContent = errors[error.code] || 'فشل تسجيل الدخول: ' + error.message;
                loginBtn.disabled = false;
                btnText.style.display = 'inline';
                loader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
