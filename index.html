<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>أكاد | متجر بلاد الرافدين الرقمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background: #0a0f12;
            color: #e0d6c0;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* خلفية متحركة */
        .bg-pattern {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 30%, rgba(212, 175, 55, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(212, 175, 55, 0.04) 0%, transparent 40%),
                repeating-linear-gradient(45deg, rgba(139, 90, 43, 0.02) 0px, rgba(139, 90, 43, 0.02) 2px, transparent 2px, transparent 8px);
            animation: slowZoom 20s ease-in-out infinite alternate;
        }
        
        @keyframes slowZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }
        
        /* شريط ذهبي */
        .gold-border-bottom {
            border-bottom: 2px solid #d4af37;
            box-shadow: 0 2px 15px rgba(212, 175, 55, 0.15);
        }
        
        /* بطاقات المنتجات */
        .product-card {
            background: rgba(20, 26, 31, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 1.25rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            position: relative;
        }
        
        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .product-card:hover {
            transform: translateY(-8px);
            border-color: #d4af37;
            box-shadow: 0 20px 35px rgba(0,0,0,0.4), 0 0 20px rgba(212,175,55,0.15);
        }
        
        .product-card:hover::before { opacity: 1; }
        
        .media-box {
            height: 180px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        
        .media-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        
        .product-card:hover .media-box img { transform: scale(1.08); }
        
        .video-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.3s ease;
        }
        
        .media-box:hover .video-overlay { opacity: 1; }
        
        .video-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: #d4af37;
            color: #0a0f12;
            font-size: 10px;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
            z-index: 2;
        }
        
        /* أزرار */
        .btn-gold {
            background: linear-gradient(135deg, #d4af37, #b8942e);
            color: #0a0f12;
            font-weight: 700;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }
        
        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.4);
        }
        
        .btn-outline {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(212, 175, 55, 0.3);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .btn-outline:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: #d4af37;
        }
        
        /* أزرار الأقسام */
        .cat-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(212, 175, 55, 0.25);
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
            white-space: nowrap;
        }
        
        .cat-btn.active { background: #d4af37; color: #0a0f12; border-color: #d4af37; box-shadow: 0 0 12px rgba(212, 175, 55, 0.3); }
        .cat-btn:hover:not(.active) { background: rgba(212, 175, 55, 0.15); border-color: #d4af37; }
        
        /* سلة التسوق */
        .cart-badge { position: relative; }
        .cart-count { position: absolute; top: -8px; right: -8px; background: #d4af37; color: #0a0f12; font-size: 10px; font-weight: bold; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        
        /* شريط المنتجات المتحرك (أبرز المنتجات) */
        .marquee-section {
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.08), transparent);
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            padding: 15px 0;
            overflow: hidden;
            margin: 20px 0 30px;
        }
        
        .marquee-track {
            display: flex;
            gap: 25px;
            width: max-content;
            animation: scrollMarquee 35s linear infinite;
        }
        
        .marquee-section:hover .marquee-track { animation-play-state: paused; }
        
        @keyframes scrollMarquee {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }
        
        .marquee-item {
            width: 210px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(212, 175, 55, 0.15);
        }
        
        .marquee-item:hover {
            border-color: #d4af37;
            background: rgba(212, 175, 55, 0.1);
            transform: translateY(-3px);
        }
        
        .marquee-item img {
            width: 55px;
            height: 55px;
            border-radius: 10px;
            object-fit: cover;
        }
        
        .marquee-item .info { flex: 1; }
        .marquee-item .name { font-size: 11px; font-weight: 600; line-height: 1.3; margin-bottom: 4px; }
        .marquee-item .price { font-size: 10px; color: #d4af37; font-weight: bold; }
        
        /* مودال التفاصيل */
        .modal { display: none; position: fixed; inset: 0; background: rgba(10, 15, 18, 0.97); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(12px); }
        .modal-content { background: linear-gradient(145deg, #141a1f, #0f1419); border-radius: 1.5rem; padding: 1.75rem; max-width: 500px; width: 90%; border: 1px solid rgba(212, 175, 55, 0.4); box-shadow: 0 25px 40px rgba(0,0,0,0.5); max-height: 85vh; overflow-y: auto; }
        .detail-spec { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 12px; margin-top: 12px; }
        .spec-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px dashed rgba(255,255,255,0.1); }
        .spec-label { color: #d4af37; font-weight: 500; }
        
        /* سلة التسوق الجانبية */
        .cart-sidebar { position: fixed; top: 0; left: -380px; width: 360px; height: 100%; background: #0f1419; z-index: 1100; transition: left 0.3s ease; box-shadow: -5px 0 30px rgba(0,0,0,0.5); border-left: 1px solid rgba(212, 175, 55, 0.3); display: flex; flex-direction: column; }
        .cart-sidebar.open { left: 0; }
        .cart-header { padding: 20px; border-bottom: 1px solid rgba(212, 175, 55, 0.2); display: flex; justify-content: space-between; align-items: center; }
        .cart-items { flex: 1; overflow-y: auto; padding: 15px; }
        .cart-item { display: flex; gap: 12px; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 10px; }
        .cart-item img { width: 55px; height: 55px; border-radius: 8px; object-fit: cover; }
        .cart-item-details { flex: 1; }
        .cart-item-title { font-size: 13px; font-weight: 600; }
        .cart-item-price { font-size: 12px; color: #d4af37; }
        .cart-item-quantity { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
        .cart-item-quantity button { width: 24px; height: 24px; border-radius: 6px; background: rgba(255,255,255,0.1); border: none; color: white; cursor: pointer; }
        .cart-footer { padding: 20px; border-top: 1px solid rgba(212, 175, 55, 0.2); }
        .cart-total { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 15px; font-size: 16px; }
        
        /* لوجو المتجر */
        .logo-container {
            transition: all 0.3s ease;
        }
        .logo-container:hover {
            transform: scale(1.02);
        }
        
        .loader { width: 45px; height: 45px; border: 3px solid rgba(212, 175, 55, 0.2); border-top: 3px solid #d4af37; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: #1a1f24; }
        ::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 3px; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        .toast { position: fixed; bottom: 20px; left: 20px; background: #10b981; color: white; padding: 12px 20px; border-radius: 10px; z-index: 9999; animation: slideIn 0.3s ease; }
        .toast.error { background: #dc2626; }
        @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* إضافات السحب (Categories Scroll) */
        #categoriesContainer {
            cursor: grab;
            user-select: none;
        }

        #categoriesContainer:active {
            cursor: grabbing;
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>

    <nav class="sticky top-0 z-50 bg-[#0a0f12]/95 backdrop-blur-lg gold-border-bottom">
        <div class="container mx-auto px-4 py-3">
            <div class="flex justify-between items-center mb-3">
                <div class="logo-container flex items-center gap-3 cursor-pointer" onclick="window.location.reload();">
                    <div class="w-12 h-12 rounded-full overflow-hidden border-2 border-[#d4af37] bg-[#0a0f12] flex items-center justify-center shadow-lg">
                        <svg width="48" height="48" viewBox="0 0 200 200" class="scale-75">
                            <circle cx="100" cy="100" r="95" fill="#0a0f12" stroke="#d4af37" stroke-width="2"/>
                            <circle cx="100" cy="100" r="85" fill="none" stroke="#d4af37" stroke-width="0.5" stroke-dasharray="3 3"/>
                            <text x="100" y="70" text-anchor="middle" fill="#d4af37" font-size="22" font-weight="bold" font-family="Arial, 'Tajawal'">𒀀𒅗𒁺</text>
                            <text x="100" y="105" text-anchor="middle" fill="#d4af37" font-size="18" font-weight="bold" font-family="Arial, 'Tajawal'">أَكَّد</text>
                            <text x="100" y="130" text-anchor="middle" fill="#d4af37" font-size="7" opacity="0.6" font-family="Arial">AKKAD DIGITAL</text>
                            <path d="M 60 148 L 140 148" stroke="#d4af37" stroke-width="1" opacity="0.4"/>
                            <path d="M 70 153 L 130 153" stroke="#d4af37" stroke-width="0.5" opacity="0.3"/>
                        </svg>
                    </div>
                    <div class="hidden sm:block">
                        <div class="text-sm font-bold text-[#d4af37] tracking-wide">أَكَّد</div>
                        <div class="text-[8px] text-white/40 tracking-wider">AKKAD DIGITAL STORE</div>
                    </div>
                </div>
                
                <div class="flex gap-2">
                    <button onclick="toggleCart()" class="cart-badge w-10 h-10 rounded-lg bg-white/10 hover:bg-white/20 transition flex items-center justify-center">
                        <i class="fas fa-shopping-cart"></i>
                        <span id="cartCount" class="cart-count hidden">0</span>
                    </button>
                    <button onclick="shareStore()" class="w-10 h-10 rounded-lg bg-white/10 hover:bg-white/20 transition"><i class="fas fa-share-alt"></i></button>
                    <a href="https://wa.me/9647730492020" class="w-10 h-10 rounded-lg bg-[#25D366] flex items-center justify-center hover:bg-[#128C7E] transition shadow-lg" target="_blank"><i class="fab fa-whatsapp text-lg"></i></a>
                </div>
            </div>
            
            <div class="relative">
                <input type="text" id="searchInput" onkeyup="searchProducts()" class="w-full bg-black/40 border border-white/10 rounded-xl py-3 px-4 pr-12 text-white placeholder:text-white/30 outline-none focus:border-[#d4af37] transition" placeholder="🔍 ابحث عن منتج...">
                <i class="fas fa-search absolute right-4 top-1/2 -translate-y-1/2 text-white/30"></i>
            </div>
            
            <div id="categoriesContainer" class="flex gap-2 mt-4 overflow-x-auto no-scrollbar pb-2"></div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-6">
        <div id="marqueeSection" class="marquee-section hidden">
            <div class="flex justify-between items-center mb-3 px-2">
                <h3 class="text-sm font-bold text-[#d4af37]"><i class="fas fa-star-of-life ml-1"></i> أبرز المنتجات</h3>
                <span class="text-[10px] text-white/30">اسحب للمزيد ←</span>
            </div>
            <div class="marquee-track" id="marqueeTrack"></div>
        </div>
        
        <div id="loadingScreen" class="text-center py-20">
            <div class="loader"></div>
            <p class="text-white/50 text-sm mt-3">جاري تحميل كنوز بلاد الرافدين...</p>
        </div>
        
        <div id="productsGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5 hidden"></div>
        
        <div id="noResults" class="hidden text-center py-20">
            <i class="fas fa-search text-5xl text-white/20 mb-4"></i>
            <p class="text-white/40">لا توجد منتجات مطابقة للبحث</p>
        </div>
    </main>

    <!-- المودالات وسلة التسوق (كما في الكود الأصلي) -->
    <div id="detailsModal" class="modal" onclick="closeModal('detailsModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-4">
                <h2 id="modalTitle" class="text-xl font-bold text-[#d4af37]"></h2>
                <button onclick="closeModal('detailsModal')" class="text-white/50 hover:text-white text-2xl">&times;</button>
            </div>
            <div id="modalDesc" class="text-sm text-white/70 leading-relaxed mb-4 whitespace-pre-line"></div>
            <div id="modalSpecs" class="detail-spec"></div>
            <div class="flex gap-3 mt-6">
                <button onclick="closeModal('detailsModal')" class="flex-1 btn-outline py-2 rounded-lg text-sm">إغلاق</button>
                <button id="modalAddToCart" class="flex-1 btn-gold py-2 rounded-lg text-sm"><i class="fas fa-cart-plus ml-2"></i>أضف للسلة</button>
            </div>
        </div>
    </div>

    <!-- سكربت التحكم -->
    <script>
        const categoriesSlider = document.getElementById('categoriesContainer');

        let isDown = false;
        let startX;
        let scrollLeft;

        categoriesSlider.addEventListener('mousedown', (e) => {
            isDown = true;
            startX = e.pageX - categoriesSlider.offsetLeft;
            scrollLeft = categoriesSlider.scrollLeft;
        });

        categoriesSlider.addEventListener('mouseleave', () => {
            isDown = false;
        });

        categoriesSlider.addEventListener('mouseup', () => {
            isDown = false;
        });

        categoriesSlider.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - categoriesSlider.offsetLeft;
            const walk = (x - startX) * 2; 
            categoriesSlider.scrollLeft = scrollLeft - walk;
        });

        // دوال وهمية لتشغيل الواجهة (يجب ربطها بـ Firebase لاحقاً)
        function toggleCart() { document.getElementById('cartSidebar')?.classList.toggle('open'); }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
