<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | متجر أكاد الرقمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: #f1f5f9; scroll-behavior: smooth; }
        .glass-panel { background: white; border-radius: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid rgba(226, 232, 240, 0.8); }
        .stat-card { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); color: white; border-radius: 1.5rem; padding: 1.5rem; position: relative; overflow: hidden; }
        .stat-card.orange { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); }
        .tab-btn { padding: 10px 20px; border-radius: 12px; font-weight: 700; font-size: 13px; transition: all 0.3s; cursor: pointer; border: none; background: #e2e8f0; color: #64748b; }
        .tab-btn.active { background: #3b82f6; color: white; box-shadow: 0 4px 15px rgba(59,130,246,0.3); }
        .notification-toast { position: fixed; bottom: 20px; left: 20px; z-index: 9999; background: #1e293b; color: white; border-radius: 1rem; padding: 1rem 1.5rem; box-shadow: 0 10px 40px rgba(0,0,0,0.2); animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-overlay.active { display: flex; }
        .modal-box { background: white; border-radius: 1.5rem; padding: 2rem; width: 90%; max-width: 500px; }
    </style>
</head>
<body class="p-4 md:p-8 text-right">

    <script>
        const pass = prompt("الرجاء إدخال كلمة سر المدير للدخول:");
        if (pass !== "ashd1980") {
            alert("كلمة السر خاطئة!");
            window.location.href = "index.html";
        }
    </script>

    <div class="max-w-7xl mx-auto">
        <header class="mb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg text-white">
                    <i class="fas fa-tools text-xl"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold text-slate-800">لوحة تحكم أكاد</h1>
                    <p class="text-xs text-gray-400" id="currentTime"></p>
                </div>
            </div>
            <div class="flex gap-3">
                <button onclick="openCategoryModal()" class="bg-orange-500 text-white px-5 py-2.5 rounded-xl font-bold hover:bg-orange-600 transition flex items-center gap-2">
                    <i class="fas fa-tags"></i> الأقسام
                </button>
                <a href="index.html" target="_blank" class="bg-slate-800 text-white px-5 py-2.5 rounded-xl font-bold">المتجر</a>
            </div>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="stat-card">
                <div class="text-3xl font-bold" id="statTotalProducts">0</div>
                <div class="text-xs opacity-75 mt-1">منتجاً متوفراً</div>
            </div>
            <div class="stat-card orange">
                <div class="text-3xl font-bold" id="statLowStock">0</div>
                <div class="text-xs opacity-75 mt-1">مخزون منخفض</div>
            </div>
        </div>

        <div class="glass-panel p-6">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-1">
                    <div class="bg-gray-50 p-6 rounded-2xl border border-gray-200 sticky top-4">
                        <h2 class="font-bold mb-4 text-blue-700 flex items-center gap-2">
                            <i class="fas fa-edit"></i> <span id="formTitle">إضافة منتج جديد</span>
                        </h2>
                        <div class="space-y-3" id="productForm">
                            <input id="pId" type="hidden">
                            <div>
                                <label class="text-xs text-gray-400">اسم المنتج</label>
                                <input id="pName" type="text" class="w-full p-3 border rounded-xl outline-none text-sm focus:border-blue-500">
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="text-xs text-gray-400">السعر</label>
                                    <input id="pPrice" type="text" class="w-full p-3 border rounded-xl outline-none text-sm">
                                </div>
                                <div>
                                    <label class="text-xs text-gray-400">المخزون</label>
                                    <input id="pStock" type="number" class="w-full p-3 border rounded-xl outline-none text-sm">
                                </div>
                            </div>
                            <div>
                                <label class="text-xs text-gray-400">رابط الصورة</label>
                                <input id="pImg" type="text" class="w-full p-3 border rounded-xl outline-none text-sm">
                            </div>
                            <div>
                                <label class="text-xs text-gray-400">القسم</label>
                                <select id="pCat" class="w-full p-3 border rounded-xl outline-none text-sm bg-white"></select>
                            </div>
                            <div>
                                <label class="text-xs text-gray-400">الوصف</label>
                                <textarea id="pDesc" class="w-full p-3 border rounded-xl outline-none h-24 text-sm"></textarea>
                            </div>
                            <button onclick="saveProduct()" id="btnSave" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg">حفظ المنتج</button>
                            <button onclick="resetForm()" id="btnCancel" class="w-full text-gray-400 text-xs py-2 hidden">إلغاء التعديل والعودة للإضافة</button>
                        </div>
                    </div>
                </div>
                
                <div class="lg:col-span-2">
                    <h2 class="font-bold mb-4 text-slate-700">قائمة المنتجات الحالية</h2>
                    <div id="admin-products-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <div id="categoryModal" class="modal-overlay" onclick="closeCategoryModal()">
        <div class="modal-box" onclick="event.stopPropagation()">
            <h2 class="text-xl font-bold text-orange-600 mb-4">إدارة الأقسام</h2>
            <div class="flex gap-2 mb-6">
                <input id="catId" type="hidden">
                <input id="newCat" type="text" placeholder="اسم القسم" class="flex-1 p-3 border rounded-xl outline-none text-sm">
                <button onclick="saveCategory()" id="btnSaveCat" class="bg-orange-500 text-white px-5 rounded-xl font-bold">حفظ</button>
            </div>
            <div id="categoriesFullList" class="space-y-2 max-h-60 overflow-y-auto"></div>
        </div>
    </div>

    <script>
        // إعدادات قاعدة البيانات - ضع رابطك هنا
        const firebaseConfig = { databaseURL: "https://your-project-id.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // تحديث الساعة
        setInterval(() => { document.getElementById('currentTime').innerText = new Date().toLocaleString('ar-EG'); }, 1000);

        // 1. إدارة الأقسام
        function loadCategories() {
            db.ref('categories').on('value', (snap) => {
                const cats = snap.val() || {};
                const list = document.getElementById('categoriesFullList');
                const select = document.getElementById('pCat');
                list.innerHTML = '';
                select.innerHTML = '<option value="">اختر القسم...</option>';
                
                Object.keys(cats).forEach(id => {
                    list.innerHTML += `
                        <div class="flex justify-between items-center p-3 bg-gray-50 rounded-xl border border-gray-100">
                            <span class="font-bold text-slate-700">${cats[id].name}</span>
                            <div class="flex gap-2">
                                <button onclick="editCategory('${id}', '${cats[id].name}')" class="text-blue-500 p-2"><i class="fas fa-edit"></i></button>
                                <button onclick="deleteCategory('${id}')" class="text-red-500 p-2"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>`;
                    select.innerHTML += `<option value="${id}">${cats[id].name}</option>`;
                });
            });
        }

        function saveCategory() {
            const name = document.getElementById('newCat').value;
            const id = document.getElementById('catId').value;
            if (!name) return;

            if (id) {
                db.ref('categories/' + id).update({ name }).then(() => {
                    showToast("تم تحديث القسم");
                    resetCatForm();
                });
            } else {
                db.ref('categories').push({ name }).then(() => {
                    showToast("تمت إضافة القسم");
                    resetCatForm();
                });
            }
        }

        function editCategory(id, name) {
            document.getElementById('catId').value = id;
            document.getElementById('newCat').value = name;
            document.getElementById('btnSaveCat').innerText = "تحديث";
        }

        function resetCatForm() {
            document.getElementById('catId').value = '';
            document.getElementById('newCat').value = '';
            document.getElementById('btnSaveCat').innerText = "حفظ";
        }

        function deleteCategory(id) {
            if (confirm("هل تريد حذف هذا القسم؟")) db.ref('categories/' + id).remove();
        }

        // 2. إدارة المنتجات
        function loadProducts() {
            db.ref('products').on('value', (snap) => {
                const prods = snap.val() || {};
                const list = document.getElementById('admin-products-list');
                list.innerHTML = '';
                let low = 0, total = 0;

                Object.keys(prods).forEach(id => {
                    total++;
                    const p = prods[id];
                    if (p.stock <= 3) low++;
                    
                    // نستخدم base64 أو نمرر القيم مباشرة لتجنب مشاكل علامات الاقتباس في JSON
                    list.innerHTML += `
                        <div class="bg-white p-4 rounded-2xl border border-gray-100 flex gap-4 items-center hover:shadow-md transition">
                            <img src="${p.img || 'https://via.placeholder.com/100'}" class="w-16 h-16 rounded-xl object-cover">
                            <div class="flex-1">
                                <h4 class="font-bold text-sm text-slate-800">${p.name}</h4>
                                <p class="text-blue-600 font-bold text-xs mt-1">${p.price} د.ع</p>
                                <p class="text-[10px] ${p.stock <= 3 ? 'text-red-500 font-bold' : 'text-gray-400'}">المخزون: ${p.stock}</p>
                            </div>
                            <div class="flex flex-col gap-2">
                                <button onclick="prepareEdit('${id}')" class="bg-blue-50 text-blue-600 p-2 rounded-lg hover:bg-blue-600 hover:text-white transition">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button onclick="deleteProduct('${id}')" class="bg-red-50 text-red-600 p-2 rounded-lg hover:bg-red-600 hover:text-white transition">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>`;
                });
                document.getElementById('statTotalProducts').innerText = total;
                document.getElementById('statLowStock').innerText = low;
            });
        }

        function prepareEdit(id) {
            db.ref('products/' + id).once('value').then((snap) => {
                const p = snap.val();
                document.getElementById('pId').value = id;
                document.getElementById('pName').value = p.name || '';
                document.getElementById('pPrice').value = p.price || '';
                document.getElementById('pStock').value = p.stock || 0;
                document.getElementById('pImg').value = p.img || '';
                document.getElementById('pCat').value = p.cat || '';
                document.getElementById('pDesc').value = p.desc || '';
                
                document.getElementById('formTitle').innerText = "تعديل المنتج";
                document.getElementById('btnSave').innerText = "تحديث التغييرات";
                document.getElementById('btnCancel').classList.remove('hidden');
                
                window.scrollTo(0, 0); // الصعود للأعلى لرؤية النموذج
            });
        }

        function saveProduct() {
            const id = document.getElementById('pId').value;
            const data = {
                name: document.getElementById('pName').value,
                price: document.getElementById('pPrice').value,
                stock: parseInt(document.getElementById('pStock').value) || 0,
                img: document.getElementById('pImg').value,
                cat: document.getElementById('pCat').value,
                desc: document.getElementById('pDesc').value,
                lastUpdated: Date.now()
            };

            if (!data.name || !data.price) return alert("يرجى ملء الاسم والسعر على الأقل");

            if (id) {
                db.ref('products/' + id).update(data).then(() => {
                    showToast("تم تحديث المنتج بنجاح");
                    resetForm();
                });
            } else {
                db.ref('products').push(data).then(() => {
                    showToast("تم إضافة منتج جديد");
                    resetForm();
                });
            }
        }

        function deleteProduct(id) {
            if (confirm("هل أنت متأكد من حذف هذا المنتج نهائياً؟")) {
                db.ref('products/' + id).remove().then(() => showToast("تم حذف المنتج"));
            }
        }

        function resetForm() {
            document.getElementById('pId').value = '';
            document.getElementById('pName').value = '';
            document.getElementById('pPrice').value = '';
            document.getElementById('pStock').value = '';
            document.getElementById('pImg').value = '';
            document.getElementById('pCat').value = '';
            document.getElementById('pDesc').value = '';
            document.getElementById('formTitle').innerText = "إضافة منتج جديد";
            document.getElementById('btnSave').innerText = "حفظ المنتج";
            document.getElementById('btnCancel').classList.add('hidden');
        }

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'notification-toast';
            t.innerHTML = `<i class="fas fa-check-circle text-green-400 mr-2"></i> ${msg}`;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        function openCategoryModal() { document.getElementById('categoryModal').classList.add('active'); }
        function closeCategoryModal() { document.getElementById('categoryModal').classList.remove('active'); resetCatForm(); }

        window.onload = () => { loadCategories(); loadProducts(); };
    </script>
</body>
</html>
