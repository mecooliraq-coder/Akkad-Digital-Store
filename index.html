<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاد | متجر بلاد الرافدين</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #0a0f12; color: #e0d6c0; font-family: 'Tajawal', sans-serif; }
        .gold { color: #d4af37; }
        .product-card { background: rgba(20,26,31,0.85); border-radius: 1rem; border: 1px solid rgba(212,175,55,0.2); transition: 0.3s; overflow: hidden; }
        .product-card:hover { transform: translateY(-5px); border-color: #d4af37; }
        .media-box { height: 160px; position: relative; cursor: pointer; overflow: hidden; }
        .media-box img { width: 100%; height: 100%; object-fit: cover; }
        .btn-gold { background: linear-gradient(135deg, #d4af37, #b8942e); color: #000; font-weight: bold; }
        .cat-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(212,175,55,0.2); padding: 6px 14px; border-radius: 20px; font-size: 13px; transition: 0.3s; cursor: pointer; white-space: nowrap; }
        .cat-btn.active, .cat-btn:hover { background: #d4af37; color: #000; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: #141a1f; border-radius: 1rem; padding: 1.5rem; max-width: 450px; width: 90%; }
        .loader { width: 40px; height: 40px; border: 3px solid rgba(212,175,55,0.2); border-top: 3px solid #d4af37; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 3px; }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 bg-[#0a0f12]/95 backdrop-blur border-b-2 border-[#d4af37]">
        <div class="container mx-auto px-4 py-3">
            <div class="flex justify-between items-center mb-3">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-[#d4af37] flex items-center justify-center text-black font-bold">أ</div>
                    <span class="text-xl font-bold gold">أَكَّد</span>
                </div>
                <div class="flex gap-2">
                    <button onclick="shareStore()" class="w-10 h-10 rounded-lg bg-white/10 hover:bg-white/20"><i class="fas fa-share-alt"></i></button>
                    <a href="https://wa.me/9647730492020" class="w-10 h-10 rounded-lg bg-[#25D366] flex items-center justify-center hover:bg-[#128C7E]" target="_blank"><i class="fab fa-whatsapp"></i></a>
                </div>
            </div>
            <input type="text" id="searchInput" onkeyup="searchProducts()" class="w-full bg-black/40 border border-white/10 rounded-xl py-2 px-4 text-white outline-none focus:border-[#d4af37]" placeholder="🔍 ابحث عن منتج...">
            <div id="categoriesContainer" class="flex gap-2 mt-3 overflow-x-auto pb-2"></div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        <div id="loadingScreen" class="text-center py-20"><div class="loader"></div><p class="mt-3">جاري التحميل...</p></div>
        <div id="productsGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4 hidden"></div>
        <div id="noResults" class="hidden text-center py-20 text-white/40">لا توجد منتجات</div>
    </main>

    <div id="detailsModal" class="modal" onclick="closeModal('detailsModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="modalTitle" class="text-xl font-bold gold mb-4"></h2>
            <div id="modalDesc" class="text-sm mb-6 whitespace-pre-line"></div>
            <button onclick="closeModal('detailsModal')" class="w-full bg-white/10 py-2 rounded-lg">إغلاق</button>
        </div>
    </div>

    <div id="orderModal" class="modal" onclick="closeModal('orderModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 class="text-center gold font-bold mb-4"><i class="fab fa-whatsapp ml-2"></i>طلب سريع</h3>
            <div id="orderProductInfo" class="bg-white/5 p-3 rounded-lg text-sm mb-4"></div>
            <form id="orderForm">
                <input type="text" id="custName" placeholder="الاسم الكامل *" class="w-full bg-black/40 border border-white/10 rounded-lg p-3 mb-3" required>
                <select id="custGov" class="w-full bg-black/40 border border-white/10 rounded-lg p-3 mb-3" required><option value="">المحافظة</option><option>بغداد</option><option>بصرة</option><option>نينوى</option><option>أربيل</option><option>بابل</option><option>النجف</option><option>كربلاء</option></select>
                <input type="text" id="custCity" placeholder="المنطقة *" class="w-full bg-black/40 border border-white/10 rounded-lg p-3 mb-3" required>
                <input type="tel" id="custPhone" placeholder="رقم الهاتف *" class="w-full bg-black/40 border border-white/10 rounded-lg p-3 mb-3" required>
                <textarea id="custAddress" rows="2" placeholder="العنوان" class="w-full bg-black/40 border border-white/10 rounded-lg p-3 mb-3"></textarea>
                <button type="submit" class="btn-gold w-full py-3 rounded-lg font-bold"><i class="fab fa-whatsapp ml-2"></i>إرسال</button>
                <button type="button" onclick="closeModal('orderModal')" class="w-full py-2 text-xs text-white/50 mt-2">إلغاء</button>
            </form>
        </div>
    </div>

    <div id="videoModal" class="modal" onclick="closeVideo()">
        <div class="relative w-[90%] max-w-2xl aspect-video bg-black rounded-xl overflow-hidden border border-[#d4af37]/30">
            <button onclick="closeVideo()" class="absolute -top-8 left-0 text-white text-2xl">&times;</button>
            <iframe id="videoFrame" class="w-full h-full" src="" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAEH25yJ-pwfgFUMjLZNgDyNqw8Rcv9S6E",
            authDomain: "akkad-store-ab5a1.firebaseapp.com",
            databaseURL: "https://akkad-store-ab5a1-default-rtdb.firebaseio.com",
            projectId: "akkad-store-ab5a1",
            storageBucket: "akkad-store-ab5a1.firebasestorage.app",
            messagingSenderId: "456810444639",
            appId: "1:456810444639:web:a706dc19781cd7738e28ea"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let allProducts = [], categories = {}, currentCategory = 'all', currentSearch = '', selectedProduct = null;
        
        function showToast(msg, isErr = false) { let t = document.createElement('div'); t.className = `fixed bottom-5 left-5 z-50 bg-${isErr ? 'red' : 'green'}-600 text-white px-4 py-2 rounded-lg text-sm`; t.innerHTML = msg; document.body.appendChild(t); setTimeout(()=>t.remove(),3000); }
        function escapeHtml(t) { if(!t) return ''; return String(t).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
        function shareStore() { if(navigator.share) navigator.share({title:'أكاد', url:location.href}); else { navigator.clipboard.writeText(location.href); showToast('✅ تم نسخ الرابط'); } }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function closeVideo() { document.getElementById('videoModal').style.display = 'none'; document.getElementById('videoFrame').src = ''; }
        
        function getYouTubeId(url) { if(!url) return null; let m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/); return m ? m[1] : null; }
        function playVideo(url) { let id = getYouTubeId(url); if(id) { document.getElementById('videoFrame').src = `https://www.youtube.com/embed/${id}?autoplay=1`; document.getElementById('videoModal').style.display = 'flex'; } else showToast('رابط غير صالح', true); }
        
        async function loadData() {
            try {
                const [catsSnap, prodsSnap] = await Promise.all([db.ref('categories').once('value'), db.ref('products').once('value')]);
                categories = catsSnap.val() || {};
                allProducts = Object.entries(prodsSnap.val() || {}).map(([id,data]) => ({id, ...data}));
                document.getElementById('loadingScreen').classList.add('hidden');
                document.getElementById('productsGrid').classList.remove('hidden');
                renderCategories();
                renderProducts();
            } catch(e) { showToast('فشل التحميل', true); }
        }
        
        function getSortedCategories() {
            return Object.entries(categories).sort((a,b) => {
                let numA = parseInt(a[0].split('_')[0]) || 999;
                let numB = parseInt(b[0].split('_')[0]) || 999;
                return numA - numB;
            }).map(([key, name]) => ({ key, name: name.replace(/^\d+_/, '') }));
        }
        
        function renderCategories() {
            let container = document.getElementById('categoriesContainer');
            let sorted = getSortedCategories();
            let html = `<button onclick="filterCategory('all')" class="cat-btn ${currentCategory === 'all' ? 'active' : ''}">🏠 الكل</button>`;
            sorted.forEach(cat => { html += `<button onclick="filterCategory('${cat.key}')" class="cat-btn ${currentCategory === cat.key ? 'active' : ''}">📁 ${escapeHtml(cat.name)}</button>`; });
            container.innerHTML = html;
        }
        
        function filterCategory(key) { currentCategory = key; renderCategories(); renderProducts(); }
        function searchProducts() { currentSearch = document.getElementById('searchInput').value.toLowerCase(); renderProducts(); }
        
        function renderProducts() {
            let filtered = allProducts.filter(p => (currentCategory === 'all' || p.category === currentCategory) && (!currentSearch || p.name.toLowerCase().includes(currentSearch)));
            let grid = document.getElementById('productsGrid'), noRes = document.getElementById('noResults');
            if(filtered.length === 0) { grid.classList.add('hidden'); noRes.classList.remove('hidden'); return; }
            grid.classList.remove('hidden'); noRes.classList.add('hidden');
            grid.innerHTML = filtered.map(p => `<div class="product-card"><div class="media-box" onclick="handleMedia('${p.id}')"><img src="${p.img || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22%3E%3Crect width=%22200%22 height=%22200%22 fill=%22%231a1a2e%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23d4af37%22%3E📦%3C/text%3E%3C/svg%3E'}">${p.video ? `<div class="absolute top-2 left-2 bg-[#d4af37] text-black text-xs px-2 rounded-full">🎬 فيديو</div><div class="absolute inset-0 bg-black/30 flex items-center justify-center opacity-0 hover:opacity-100 transition"><i class="fas fa-play text-white text-3xl"></i></div>` : ''}</div><div class="p-3 text-center"><h3 class="text-sm font-bold">${escapeHtml(p.name)}</h3><div class="gold text-base font-bold my-2">${Number(p.price).toLocaleString()} د.ع</div><div class="flex gap-2"><button onclick="openOrder('${p.id}')" class="btn-gold flex-1 py-2 rounded-lg text-xs">شراء</button><button onclick="showDetails('${p.id}')" class="bg-white/5 py-2 rounded-lg text-xs w-10 border border-white/10"><i class="fas fa-info"></i></button></div></div></div>`).join('');
        }
        
        function handleMedia(id) { let p = allProducts.find(x => x.id === id); if(p?.video) playVideo(p.video); else showDetails(id); }
        function showDetails(id) { let p = allProducts.find(x => x.id === id); if(!p) return; document.getElementById('modalTitle').innerHTML = p.name; let d = p.desc || 'لا توجد مواصفات'; d += `\n\n💰 السعر: ${Number(p.price).toLocaleString()} د.ع`; document.getElementById('modalDesc').innerHTML = escapeHtml(d).replace(/\n/g,'<br>'); document.getElementById('detailsModal').style.display = 'flex'; }
        function openOrder(id) { selectedProduct = allProducts.find(x => x.id === id); document.getElementById('orderProductInfo').innerHTML = `<div class="flex justify-between"><span>${escapeHtml(selectedProduct.name)}</span><span class="gold">${Number(selectedProduct.price).toLocaleString()} د.ع</span></div>`; ['custName','custCity','custPhone','custAddress'].forEach(i => document.getElementById(i).value = ''); document.getElementById('custGov').value = ''; document.getElementById('orderModal').style.display = 'flex'; }
        
        document.getElementById('orderForm').addEventListener('submit', async e => {
            e.preventDefault();
            let name = document.getElementById('custName').value, gov = document.getElementById('custGov').value, city = document.getElementById('custCity').value, phone = document.getElementById('custPhone').value, addr = document.getElementById('custAddress').value;
            if(!name || !gov || !city || !phone) return showToast('⚠️ حقول مطلوبة', true);
            let orderData = { orderId: Date.now().toString(), customerName: name, governorate: gov, city: city, phone: phone, address: addr, productId: selectedProduct.id, productName: selectedProduct.name, productPrice: selectedProduct.price, status: 'جديد', createdAt: new Date().toISOString(), createdAtTimestamp: Date.now() };
            try {
                await db.ref('orders/' + orderData.orderId).set(orderData);
                let msg = `🛍️ *طلب جديد - متجر أكاد*%0A%0A📦 *المنتج:* ${selectedProduct.name}%0A💰 *السعر:* ${Number(selectedProduct.price).toLocaleString()} د.ع%0A%0A👤 *الاسم:* ${name}%0A🏛️ *المحافظة:* ${gov}%0A📍 *المنطقة:* ${city}%0A📱 *الهاتف:* ${phone}${addr ? `%0A🏠 *العنوان:* ${addr}` : ''}`;
                window.open(`https://wa.me/9647730492020?text=${msg}`, '_blank');
                showToast('✅ تم إرسال الطلب');
                closeModal('orderModal');
            } catch(err) { showToast('فشل الإرسال', true); }
        });
        
        loadData();
        setInterval(() => loadData(), 10000);
    </script>
</body>
</html>
