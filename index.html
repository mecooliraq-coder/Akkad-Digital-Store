<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر أكاد الرقمي | Akkad Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background: radial-gradient(circle at top right, #1e293b, #0f172a); color: white; min-height: 100vh; overflow-x: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); transition: all 0.4s ease; }
        .glass-card:hover { transform: translateY(-10px); background: rgba(255, 255, 255, 0.07); }
        
        /* شريط متحرك */
        .ticker-wrapper { overflow: hidden; white-space: nowrap; background: rgba(15, 23, 42, 0.8); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .ticker-content { display: inline-block; animation: ticker 40s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        
        /* نوافذ منبثقة */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(8px); padding: 20px; }
        .modal-content { background: #1e293b; border: 1px solid rgba(255,255,255,0.1); width: 100%; max-w-lg; border-radius: 24px; padding: 30px; position: relative; }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 bg-slate-900/90 backdrop-blur-xl border-b border-white/5 p-4">
        <div class="container mx-auto flex justify-between items-center mb-4">
            <h1 class="text-xl font-bold italic uppercase tracking-wider">AKKAD <span class="text-blue-500">DIGITAL</span></h1>
            <a href="https://wa.me/9647730492020" class="text-green-500"><i class="fab fa-whatsapp text-2xl"></i></a>
        </div>
        <input type="text" id="searchInput" onkeyup="searchProducts()" class="w-full bg-white/5 border border-white/10 rounded-2xl py-2 px-10 outline-none text-sm" placeholder="ابحث عن جهازك...">
        <div id="categories-nav" class="flex gap-3 mt-4 overflow-x-auto pb-2 scrollbar-hide text-xs"></div>
    </nav>

    <div class="ticker-wrapper"><div id="product-ticker" class="ticker-content py-2 text-blue-400 font-bold"></div></div>

    <main class="container mx-auto px-4 py-10">
        <div id="products-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
    </main>

    <div id="descModal" class="modal" onclick="closeModal('descModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="modalTitle" class="text-xl font-bold mb-4 text-blue-400 border-b border-white/10 pb-2">المواصفات الفنية</h2>
            <p id="modalDesc" class="text-gray-300 leading-relaxed text-sm whitespace-pre-line mb-6"></p>
            <button onclick="closeModal('descModal')" class="w-full bg-slate-700 hover:bg-slate-600 py-3 rounded-xl font-bold transition">إغلاق</button>
        </div>
    </div>

    <div id="videoModal" class="modal" onclick="closeModal('videoModal')">
        <div class="relative w-full max-w-4xl aspect-video rounded-3xl overflow-hidden shadow-2xl" onclick="event.stopPropagation()">
            <iframe id="ytPlayer" class="w-full h-full" src="" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://akkad-store-ab5a1-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myPhone = "9647730492020";
        let allProducts = [];

        db.ref('categories').on('value', snap => {
            const cats = snap.val();
            const nav = document.getElementById('categories-nav');
            nav.innerHTML = `<button onclick="filterByCat('all')" class="bg-blue-600 px-4 py-1 rounded-lg">الكل</button>`;
            for(let key in cats) nav.innerHTML += `<button onclick="filterByCat('${cats[key]}')" class="bg-white/5 border border-white/5 px-4 py-1 rounded-lg">${cats[key]}</button>`;
        });

        db.ref('products').on('value', snap => {
            const data = snap.val();
            allProducts = data ? Object.entries(data).map(([id, val]) => ({id, ...val})).reverse() : [];
            displayProducts(allProducts);
            document.getElementById('product-ticker').innerHTML = allProducts.map(p => `<span class="mx-8">${p.name} : <span class="text-white">${p.price} د.ع</span></span>`).join('');
        });

        function displayProducts(items) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = items.map((p, index) => `
                <div class="glass-card rounded-[2rem] p-4 flex flex-col relative group">
                    ${index < 4 ? '<span class="absolute top-2 left-2 bg-red-600 text-[8px] font-bold px-2 py-0.5 rounded-full z-10">NEW</span>' : ''}
                    <div class="h-40 mb-4 bg-white/5 rounded-2xl flex items-center justify-center p-3 relative overflow-hidden">
                        <img src="${p.img}" class="max-h-full object-contain transition-transform group-hover:scale-110">
                        ${p.video ? `<button onclick="openVideo('${p.video}')" class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-all">
                            <i class="fas fa-play bg-red-600 p-3 rounded-full"></i>
                        </button>` : ''}
                    </div>
                    <div class="flex-1">
                        <h3 class="font-bold text-[13px] mb-2 line-clamp-2 h-10">${p.name}</h3>
                        <div class="text-lg font-bold text-white mb-3">${p.price} <span class="text-[9px] text-gray-500 uppercase">IQD</span></div>
                        
                        <button onclick="showDetails('${p.name}', \`${(p.desc || 'لا يوجد وصف حالياً لهذا المنتج').replace(/`/g, "'")}\`)" 
                                class="w-full border border-blue-500/30 text-blue-400 py-2 rounded-xl text-[10px] font-bold mb-2 hover:bg-blue-500/10 transition">
                            اقرأ التفاصيل
                        </button>
                    </div>
                    <a href="https://wa.me/${myPhone}?text=طلب: ${p.name}" target="_blank" 
                       class="w-full bg-green-600 hover:bg-green-500 text-white py-2.5 rounded-xl flex items-center justify-center gap-2 transition font-bold text-xs">
                        <i class="fab fa-whatsapp"></i> اطلب الآن
                    </a>
                </div>
            `).join('');
        }

        function showDetails(title, desc) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalDesc').innerText = desc;
            document.getElementById('descModal').style.display = 'flex';
        }

        function openVideo(id) {
            document.getElementById('ytPlayer').src = `https://www.youtube.com/embed/${id}?autoplay=1`;
            document.getElementById('videoModal').style.display = 'flex';
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
            if(modalId === 'videoModal') document.getElementById('ytPlayer').src = "";
        }

        function searchProducts() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            displayProducts(allProducts.filter(p => p.name.toLowerCase().includes(term)));
        }

        function filterByCat(category) {
            displayProducts(category === 'all' ? allProducts : allProducts.filter(p => p.cat === category));
        }
    </script>
</body>
</html>
