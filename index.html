<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاد | متجر بلاد الرافدين الرقمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=Amiri:wght@400;700&family=Lateef&display=swap');
        
        :root {
            --mesopotamia-dark: #0a0f12;
            --akkad-gold: #d4af37;
            --sumerian-blue: #1a4d8c;
        }
        
        body { 
            font-family: 'Tajawal', sans-serif; 
            background: var(--mesopotamia-dark); 
            color: #f0e6d0; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* خلفية بلاد الرافدين */
        .bg-mesopotamia {
            position: fixed; inset: 0; z-index: -2;
            background: 
                radial-gradient(ellipse at 30% 40%, rgba(212, 175, 55, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 70%, rgba(26, 77, 140, 0.1) 0%, transparent 50%),
                linear-gradient(145deg, #0a0f12 0%, #141a1f 40%, #1a1510 100%);
        }

        .cuneiform-particle {
            position: fixed; font-family: 'Lateef', cursive;
            color: rgba(212, 175, 55, 0.12); pointer-events: none; z-index: -1;
            animation: floatCuneiform linear infinite;
        }
        
        @keyframes floatCuneiform {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.4; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }

        .akkad-nav {
            background: rgba(10, 15, 18, 0.95); 
            backdrop-filter: blur(20px);
            border-bottom: 2px solid var(--akkad-gold);
        }

        .akkad-card { 
            background: linear-gradient(145deg, rgba(20, 26, 31, 0.85), rgba(10, 15, 18, 0.75));
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(212, 175, 55, 0.25); 
            border-radius: 1rem;
            transition: all 0.4s ease;
            position: relative; overflow: hidden;
        }
        
        .akkad-card:hover { 
            transform: translateY(-5px); 
            border-color: var(--akkad-gold);
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.15);
        }

        .btn-akkad { 
            background: linear-gradient(135deg, var(--akkad-gold), #b8942e); 
            color: #0a0f12; font-weight: 700;
        }

        .modal {
            display: none; position: fixed; inset: 0;
            background: rgba(10, 15, 18, 0.96); z-index: 1000;
            align-items: center; justify-content: center; backdrop-filter: blur(15px);
        }

        .product-media-container { height: 180px; position: relative; overflow: hidden; cursor: pointer; }
        .product-media-container img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .akkad-card:hover .product-media-container img { transform: scale(1.1); }

        .video-play-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 45px; height: 45px; border-radius: 50%; background: var(--akkad-gold);
            display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.3s;
        }
        .akkad-card:hover .video-play-btn { opacity: 1; }

        .slider-container { overflow: hidden; position: relative; padding: 10px 0; }
        .slider-track { display: flex; gap: 16px; animation: scrollProducts 40s linear infinite; width: fit-content; }
        @keyframes scrollProducts { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        .category-chip.active { background: var(--akkad-gold); color: #0a0f12; }
        
        .toast { position: fixed; bottom: 20px; left: 20px; background: var(--sumerian-blue); padding: 12px 20px; border-radius: 8px; z-index: 10000; animation: slideIn 0.3s; }
        @keyframes slideIn { from { transform: translateX(-100%); } to { transform: translateX(0); } }
    </style>
</head>
<body>
    <div class="bg-mesopotamia"></div>

    <nav class="akkad-nav sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3">
            <div class="flex justify-between items-center mb-3">
                <div class="flex items-center gap-3">
                    <img src="https://www.raed.net/img?id=1539063" class="w-12 h-12 rounded-full border-2 border-[var(--akkad-gold)]" onerror="this.src='https://via.placeholder.com/50'">
                    <div>
                        <div class="text-xl font-extrabold text-[var(--akkad-gold)]">أَكَّد</div>
                        <div class="text-[8px] tracking-widest opacity-70">Akkad Digital Store</div>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="shareStore()" class="bg-[#25D366] px-4 py-2 rounded-lg text-xs font-bold text-white"><i class="fas fa-share-nodes"></i></button>
                    <a href="https://wa.me/9647730492020" class="bg-[#25D366] px-4 py-2 rounded-lg text-white"><i class="fab fa-whatsapp"></i></a>
                </div>
            </div>
            <div class="relative max-w-xl mx-auto">
                <input type="text" id="searchInput" onkeyup="searchProducts()" class="w-full bg-black/40 border border-white/10 rounded-xl py-3 px-12 text-white outline-none focus:border-[var(--akkad-gold)]" placeholder="ابحث عن منتجك المفضل...">
                <i class="fas fa-search absolute right-4 top-4 text-white/30"></i>
            </div>
            <div id="categories-nav" class="flex gap-2 mt-4 overflow-x-auto pb-2 no-scrollbar"></div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-6">
        <div class="slider-container mb-8">
            <div class="slider-track" id="sliderTrack"></div>
        </div>

        <div id="loading" class="text-center py-20">
            <div class="w-12 h-12 border-4 border-[var(--akkad-gold)] border-t-transparent rounded-full animate-spin mx-auto"></div>
            <p class="mt-4 opacity-60">جاري تحميل الكنوز...</p>
        </div>

        <div id="products-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 hidden"></div>

        <div id="no-results" class="hidden text-center py-20 opacity-50">
            <i class="fas fa-box-open text-4xl mb-4"></i>
            <p>لا توجد نتائج مطابقة</p>
        </div>
    </main>

    <div id="descModal" class="modal" onclick="this.style.display='none'">
        <div class="bg-[#141a1f] border border-white/10 p-6 rounded-2xl max-w-md w-[90%]" onclick="event.stopPropagation()">
            <h2 id="modalTitle" class="text-xl font-bold text-[var(--akkad-gold)] mb-4"></h2>
            <p id="modalDesc" class="text-sm opacity-80 leading-relaxed mb-6"></p>
            <button onclick="document.getElementById('descModal').style.display='none'" class="w-full bg-white/5 py-3 rounded-xl">إغلاق</button>
        </div>
    </div>

    <div id="quickOrderModal" class="modal">
        <div class="bg-[#141a1f] border border-[var(--akkad-gold)]/30 p-6 rounded-2xl max-w-md w-[90%]" onclick="event.stopPropagation()">
            <h3 class="text-xl font-bold text-[var(--akkad-gold)] mb-4"><i class="fab fa-whatsapp ml-2"></i>طلب شراء</h3>
            <div id="quickProductInfo" class="bg-black/30 p-3 rounded-lg text-xs mb-4"></div>
            <form id="quickOrderForm" class="space-y-3">
                <input type="text" id="custName" placeholder="الاسم الكامل" class="w-full bg-black/20 border border-white/10 p-3 rounded-lg outline-none" required>
                <select id="custGov" class="w-full bg-[#1a1a1a] border border-white/10 p-3 rounded-lg outline-none" required>
                    <option value="">اختر المحافظة</option>
                    <option>بغداد</option><option>البصرة</option><option>نينوى</option><option>أربيل</option><option>بابل</option><option>النجف</option><option>كربلاء</option><option>ذي قار</option>
                </select>
                <input type="tel" id="custPhone" placeholder="رقم الهاتف" class="w-full bg-black/20 border border-white/10 p-3 rounded-lg outline-none" required>
                <button type="submit" class="btn-akkad w-full py-3 rounded-xl mt-2">إرسال عبر واتساب</button>
                <button type="button" onclick="closeModal('quickOrderModal')" class="w-full text-xs opacity-50">إلغاء</button>
            </form>
        </div>
    </div>

    <div id="videoModal" class="modal" onclick="closeVideo()">
        <div class="relative w-full max-w-3xl aspect-video bg-black rounded-xl overflow-hidden shadow-2xl">
            <iframe id="vFrame" class="w-full h-full" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAEH25yJ-pwfgFUMjLZNgDyNqw8Rcv9S6E",
            authDomain: "akkad-store-ab5a1.firebaseapp.com",
            databaseURL: "https://akkad-store-ab5a1-default-rtdb.firebaseio.com",
            projectId: "akkad-store-ab5a1",
            storageBucket: "akkad-store-ab5a1.firebasestorage.app",
            messagingSenderId: "456810444639",
            appId: "1:456810444639:web:a706dc19781cd7738e28ea"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allProducts = [], categories = {}, currentCategory = 'all', currentSearch = '';
        let selectedProduct = null;

        // تهيئة الجزيئات المسمارية
        function initParticles() {
            const symbols = ['𒀀', '𒅗', '𒁺', '𒀭', '𒂗', 'मि'];
            for(let i=0; i<25; i++){
                let p = document.createElement('div');
                p.className = 'cuneiform-particle';
                p.textContent = symbols[Math.floor(Math.random()*symbols.length)];
                p.style.left = Math.random()*100 + '%';
                p.style.animationDuration = (10 + Math.random()*10) + 's';
                p.style.animationDelay = Math.random()*5 + 's';
                document.body.appendChild(p);
            }
        }

        async function loadStore() {
            try {
                const [pSnap, cSnap] = await Promise.all([
                    db.ref('products').once('value'),
                    db.ref('categories').once('value')
                ]);
                
                allProducts = Object.entries(pSnap.val() || {}).map(([id, data]) => ({id, ...data}));
                categories = cSnap.val() || {};
                
                renderCategories();
                renderProducts();
                renderSlider();
                document.getElementById('loading').style.display = 'none';
            } catch(e) {
                showToast("خطأ في الاتصال بالخادم", "error");
            }
        }

        function renderCategories() {
            const nav = document.getElementById('categories-nav');
            let html = `<button onclick="filterCat('all')" class="category-chip active px-5 py-2 rounded-full whitespace-nowrap text-xs transition">الكل</button>`;
            for(let id in categories) {
                html += `<button onclick="filterCat('${id}')" class="category-chip px-5 py-2 rounded-full border border-white/10 whitespace-nowrap text-xs transition">${categories[id]}</button>`;
            }
            nav.innerHTML = html;
        }

        function filterCat(id) {
            currentCategory = id;
            document.querySelectorAll('.category-chip').forEach(btn => {
                btn.classList.toggle('active', (id === 'all' && btn.innerText === 'الكل') || (categories[id] === btn.innerText));
            });
            renderProducts();
        }

        function searchProducts() {
            currentSearch = document.getElementById('searchInput').value.toLowerCase();
            renderProducts();
        }

        function renderProducts() {
            const grid = document.getElementById('products-grid');
            const filtered = allProducts.filter(p => {
                const matchCat = currentCategory === 'all' || p.category === currentCategory;
                const matchSearch = p.name.toLowerCase().includes(currentSearch);
                return matchCat && matchSearch;
            });

            if(filtered.length === 0) {
                grid.classList.add('hidden');
                document.getElementById('no-results').classList.remove('hidden');
            } else {
                grid.classList.remove('hidden');
                document.getElementById('no-results').classList.add('hidden');
                grid.innerHTML = filtered.map(p => `
                    <div class="akkad-card">
                        <div class="product-media-container" onclick="handleMedia('${p.id}')">
                            <img src="${p.img}" onerror="this.src='https://via.placeholder.com/300'">
                            ${p.video ? `<div class="video-play-btn"><i class="fas fa-play text-black"></i></div>` : ''}
                        </div>
                        <div class="p-3">
                            <h3 class="text-xs font-bold h-8 overflow-hidden mb-1">${p.name}</h3>
                            <div class="text-[var(--akkad-gold)] text-sm font-bold mb-3">${Number(p.price).toLocaleString()} د.ع</div>
                            <div class="flex gap-1">
                                <button onclick="openOrder('${p.id}')" class="btn-akkad flex-1 py-2 rounded-lg text-[10px]">طلب شراء</button>
                                <button onclick="showDetails('${p.id}')" class="bg-white/5 px-3 rounded-lg"><i class="fas fa-info-circle text-[10px]"></i></button>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
        }

        function handleMedia(id) {
            const p = allProducts.find(x => x.id === id);
            if(p.video) {
                const vid = p.video.split('v=')[1]?.split('&')[0] || p.video.split('/').pop();
                document.getElementById('vFrame').src = `https://www.youtube.com/embed/${vid}?autoplay=1`;
                document.getElementById('videoModal').style.display = 'flex';
            } else {
                showDetails(id);
            }
        }

        function closeVideo() {
            document.getElementById('videoModal').style.display = 'none';
            document.getElementById('vFrame').src = '';
        }

        function showDetails(id) {
            const p = allProducts.find(x => x.id === id);
            document.getElementById('modalTitle').innerText = p.name;
            document.getElementById('modalDesc').innerText = p.desc || 'لا يوجد وصف متاح حالياً.';
            document.getElementById('descModal').style.display = 'flex';
        }

        function openOrder(id) {
            selectedProduct = allProducts.find(x => x.id === id);
            document.getElementById('quickProductInfo').innerHTML = `<b>المنتج:</b> ${selectedProduct.name}<br><b>السعر:</b> ${Number(selectedProduct.price).toLocaleString()} د.ع`;
            document.getElementById('quickOrderModal').style.display = 'flex';
        }

        document.getElementById('quickOrderForm').onsubmit = function(e) {
            e.preventDefault();
            const msg = `*طلب شراء جديد*%0A------------------%0A*المنتج:* ${selectedProduct.name}%0A*الاسم:* ${document.getElementById('custName').value}%0A*المحافظة:* ${document.getElementById('custGov').value}%0A*الهاتف:* ${document.getElementById('custPhone').value}`;
            window.open(`https://wa.me/9647730492020?text=${msg}`);
            closeModal('quickOrderModal');
        };

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function renderSlider() {
            const track = document.getElementById('sliderTrack');
            const items = allProducts.slice(0, 8);
            const html = items.map(p => `
                <div class="w-32 bg-white/5 rounded-lg overflow-hidden flex-shrink-0" onclick="showDetails('${p.id}')">
                    <img src="${p.img}" class="w-full h-20 object-cover">
                    <div class="p-2 text-[8px] font-bold truncate">${p.name}</div>
                </div>
            `).join('');
            track.innerHTML = html + html; // تكرار للتأثير المستمر
        }

        function showToast(m) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.innerText = m;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        function shareStore() {
            if(navigator.share) navigator.share({title: 'متجر أكاد', url: window.location.href});
            else { navigator.clipboard.writeText(window.location.href); showToast("تم نسخ الرابط"); }
        }

        initParticles();
        loadStore();
    </script>
</body>
</html>
