<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAEH25yJ-pwfgFUMjLZNgDyNqw8Rcv9S6E",
        authDomain: "://firebaseapp.com",
        databaseURL: "https://firebaseio.com",
        projectId: "akkad-store-ab5a1",
        storageBucket: "akkad-store-ab5a1.firebasestorage.app",
        messagingSenderId: "456810444639",
        appId: "1:456810444639:web:a706dc19781cd7738e28ea"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let products = [];

    function loadData() {
        const loader = document.getElementById('loader');
        loader.style.display = 'flex';

        // 1. جلب الفئات أولاً (لأنه مسموح بقراءتها في قواعدك)
        db.ref('categories').once('value', (snapshot) => {
            const cats = snapshot.val();
            if (cats) {
                const catBar = document.getElementById('category-bar');
                catBar.innerHTML = '<div class="category-chip active" onclick="filterItems(\'الكل\', this)">الكل</div>';
                Object.values(cats).forEach(cat => {
                    catBar.innerHTML += `<div class="category-chip" onclick="filterItems('${cat.name}', this)">${cat.name}</div>`;
                });
            }
        });

        // 2. جلب المنتجات
        db.ref('products').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                // تحويل الكائن إلى مصفوفة مع الحفاظ على الـ ID
                products = Object.keys(data).map(key => ({
                    id: key,
                    ...data[key]
                }));
                displayProducts(products);
            } else {
                document.getElementById('products-grid').innerHTML = 
                    '<p class="text-center col-span-full text-gold-500 opacity-50 py-10">خزانة أكاد فارغة حالياً..</p>';
            }
            loader.style.display = 'none';
        }, (error) => {
            console.error(error);
            alert("خطأ في جلب البيانات: " + error.message);
            loader.style.display = 'none';
        });
    }

    function displayProducts(items) {
        const grid = document.getElementById('products-grid');
        grid.innerHTML = items.map(item => `
            <div class="akkad-card p-5 animate-fade-in">
                <img src="${item.image || 'https://placeholder.com'}" 
                     class="w-full h-52 object-cover rounded mb-4 border border-gold-500/10">
                <h3 class="text-xl font-bold text-white mb-2">${item.name}</h3>
                <div class="flex justify-between items-center mt-6">
                    <span class="text-gold-500 font-bold">${item.price} د.ع</span>
                    <button class="btn-akkad px-5 py-2 text-sm">اقتناء</button>
                </div>
            </div>
        `).join('');
    }

    function filterItems(category, element) {
        // تحديث شكل الأزرار
        document.querySelectorAll('.category-chip').forEach(c => c.classList.remove('active'));
        element.classList.add('active');

        // الفلترة
        const filtered = category === 'الكل' ? products : products.filter(p => p.category === category);
        displayProducts(filtered);
    }

    window.onload = loadData;
</script>
