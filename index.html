<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>أكاد | متجر بلاد الرافدين الرقمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background: #0a0f12;
            color: #e0d6c0;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .bg-pattern {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 30%, rgba(212, 175, 55, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(212, 175, 55, 0.04) 0%, transparent 40%),
                repeating-linear-gradient(45deg, rgba(139, 90, 43, 0.02) 0px, rgba(139, 90, 43, 0.02) 2px, transparent 2px, transparent 8px);
            animation: slowZoom 20s ease-in-out infinite alternate;
        }
        
        @keyframes slowZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }
        
        .gold-border-bottom {
            border-bottom: 2px solid #d4af37;
            box-shadow: 0 2px 15px rgba(212, 175, 55, 0.15);
        }
        
        .product-card {
            background: rgba(20, 26, 31, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 1.25rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            position: relative;
        }
        
        .product-card:hover {
            transform: translateY(-8px);
            border-color: #d4af37;
            box-shadow: 0 20px 35px rgba(0,0,0,0.4), 0 0 20px rgba(212,175,55,0.15);
        }
        
        .media-box {
            height: 180px;
            overflow: hidden;
            background: #1a1f24;
        }
        
        .media-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .btn-gold {
            background: linear-gradient(135deg, #d4af37, #b8942e);
            color: #0a0f12;
            font-weight: 700;
        }

        /* تحسين سحب الأقسام */
        #categoriesContainer {
            cursor: grab;
            user-select: none;
        }

        #categoriesContainer:active {
            cursor: grabbing;
        }

        .loader { width: 45px; height: 45px; border: 3px solid rgba(212, 175, 55, 0.2); border-top: 3px solid #d4af37; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>

    <nav class="sticky top-0 z-50 bg-[#0a0f12]/95 backdrop-blur-lg gold-border-bottom">
        <div class="container mx-auto px-4 py-3">
            <div class="flex justify-between items-center mb-3">
                <div class="logo-container flex items-center gap-3 cursor-pointer" onclick="window.location.reload();">
                    <div class="w-12 h-12 rounded-full overflow-hidden border-2 border-[#d4af37] bg-[#0a0f12] flex items-center justify-center shadow-lg">
                        <svg width="48" height="48" viewBox="0 0 200 200" class="scale-75">
                            <circle cx="100" cy="100" r="95" fill="#0a0f12" stroke="#d4af37" stroke-width="2"/>
                            <text x="100" y="70" text-anchor="middle" fill="#d4af37" font-size="22" font-weight="bold">𒀀𒅗𒁺</text>
                            <text x="100" y="105" text-anchor="middle" fill="#d4af37" font-size="18" font-weight="bold">أَكَّد</text>
                        </svg>
                    </div>
                    <div>
                        <div class="text-sm font-bold text-[#d4af37]">أَكَّد</div>
                        <div class="text-[8px] text-white/40">AKKAD DIGITAL</div>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button class="w-10 h-10 rounded-lg bg-white/10 flex items-center justify-center"><i class="fas fa-shopping-cart"></i></button>
                    <a href="https://wa.me/9647730492020" class="w-10 h-10 rounded-lg bg-[#25D366] flex items-center justify-center"><i class="fab fa-whatsapp"></i></a>
                </div>
            </div>
            
            <input type="text" class="w-full bg-black/40 border border-white/10 rounded-xl py-3 px-4 text-white outline-none focus:border-[#d4af37]" placeholder="🔍 ابحث عن منتج...">
            
            <div id="categoriesContainer" class="flex gap-2 mt-4 overflow-x-auto no-scrollbar pb-2">
                <button class="bg-[#d4af37] text-[#0a0f12] px-5 py-2 rounded-full text-xs font-bold">الكل</button>
                <button class="bg-white/5 border border-white/10 px-5 py-2 rounded-full text-xs text-white/70">هواتف</button>
                <button class="bg-white/5 border border-white/10 px-5 py-2 rounded-full text-xs text-white/70">إلكترونيات</button>
                <button class="bg-white/5 border border-white/10 px-5 py-2 rounded-full text-xs text-white/70">ساعات</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-6">
        <!-- شاشة التحميل -->
        <div id="loadingScreen" class="text-center py-20">
            <div class="loader"></div>
            <p class="text-white/50 text-sm">جاري تحميل المنتجات...</p>
        </div>
        
        <!-- شبكة المنتجات -->
        <div id="productsGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5 hidden">
            <!-- المنتجات سيتم إضافتها هنا عبر جافا سكريبت -->
        </div>
    </main>

    <script>
        // 1. بيانات تجريبية (حتى تقوم بربط Firebase)
        const demoProducts = [
            { id: 1, name: "منتج تجريبي 1", price: "25,000", img: "https://via.placeholder.com/300x300/1a1f24/d4af37?text=Product+1" },
            { id: 2, name: "منتج تجريبي 2", price: "40,000", img: "https://via.placeholder.com/300x300/1a1f24/d4af37?text=Product+2" },
            { id: 3, name: "منتج تجريبي 3", price: "15,500", img: "https://via.placeholder.com/300x300/1a1f24/d4af37?text=Product+3" },
            { id: 4, name: "منتج تجريبي 4", price: "60,000", img: "https://via.placeholder.com/300x300/1a1f24/d4af37?text=Product+4" }
        ];

        // 2. دالة عرض المنتجات
        function displayProducts() {
            const grid = document.getElementById('productsGrid');
            const loader = document.getElementById('loadingScreen');
            
            grid.innerHTML = demoProducts.map(p => `
                <div class="product-card">
                    <div class="media-box"><img src="${p.img}" alt="${p.name}"></div>
                    <div class="p-4">
                        <h3 class="text-xs font-bold mb-2 line-clamp-1">${p.name}</h3>
                        <p class="text-[#d4af37] font-bold text-sm mb-3">${p.price} د.ع</p>
                        <button class="btn-gold w-full py-2 rounded-lg text-[10px] font-bold">طلب عبر واتساب</button>
                    </div>
                </div>
            `).join('');

            // إخفاء التحميل وإظهار المنتجات
            loader.style.display = 'none';
            grid.classList.remove('hidden');
        }

        // 3. تفعيل السحب للأقسام بالماوس
        const slider = document.getElementById('categoriesContainer');
        let isDown = false; let startX; let scrollLeft;

        slider.addEventListener('mousedown', (e) => {
            isDown = true;
            startX = e.pageX - slider.offsetLeft;
            scrollLeft = slider.scrollLeft;
        });
        slider.addEventListener('mouseleave', () => isDown = false);
        slider.addEventListener('mouseup', () => isDown = false);
        slider.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - slider.offsetLeft;
            const walk = (x - startX) * 2;
            slider.scrollLeft = scrollLeft - walk;
        });

        // تشغيل الوظائف عند تحميل الصفحة
        window.onload = displayProducts;
    </script>
</body>
</html>
