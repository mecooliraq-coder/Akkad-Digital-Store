<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* كل التعريفات كما هي (أبقيها كما كانت سليمة) */
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&family=Amiri:wght@400;700&display=swap');
        :root { --akkad-dark: #030508; --akkad-gold: #c9a961; --akkad-gold-bright: #e8d5a3; --glass-bg: rgba(15, 26, 36, 0.55); --neon-gold: rgba(201, 169, 97, 0.6); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: var(--akkad-dark); color: #fff; min-height: 100vh; overflow-x: hidden; }
        .bg-gradient-custom { position: fixed; inset: 0; z-index: -2; background: radial-gradient(circle at 20% 30%, rgba(201,169,97,0.15) 0%, transparent 50%), radial-gradient(circle at 80% 70%, rgba(201,169,97,0.08) 0%, transparent 40%), linear-gradient(165deg, #030508 0%, #0a1018 40%, #0f1a24 70%, #1a1205 100%); }
        .neon-text { text-shadow: 0 0 5px var(--neon-gold), 0 0 10px var(--neon-gold), 0 0 20px rgba(201,169,97,0.5); }
        .akkad-nav { background: rgba(3,5,8,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(201,169,97,0.3); box-shadow: 0 4px 30px rgba(201,169,97,0.1); }
        .akkad-logo-img { width: 52px; height: 52px; border-radius: 50%; border: 2px solid rgba(201,169,97,0.6); object-fit: cover; box-shadow: 0 0 15px rgba(201,169,97,0.4), 0 0 30px rgba(201,169,97,0.2); transition: all 0.3s ease; }
        .akkad-logo-img:hover { box-shadow: 0 0 20px rgba(201,169,97,0.6), 0 0 40px rgba(201,169,97,0.3); transform: scale(1.05); }
        .akkad-logo-text { font-size: 1.45rem; font-weight: 700; background: linear-gradient(135deg, #fff, var(--akkad-gold), var(--akkad-gold-bright)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .akkad-card { background: var(--glass-bg); backdrop-filter: blur(16px); border: 1px solid rgba(201,169,97,0.25); border-radius: 1.25rem; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden; }
        .akkad-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, transparent, var(--akkad-gold), transparent); opacity: 0.6; }
        .akkad-card:hover { transform: translateY(-8px); border-color: rgba(201,169,97,0.6); box-shadow: 0 10px 40px rgba(0,0,0,0.4), 0 0 20px rgba(201,169,97,0.15), 0 0 40px rgba(201,169,97,0.08); }
        .btn-akkad { background: linear-gradient(135deg, var(--akkad-gold), #8b6f47); color: #0a0f18; font-weight: 600; position: relative; overflow: hidden; transition: all 0.3s ease; }
        .btn-akkad::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: linear-gradient(45deg, transparent, rgba(255,255,255,0.2), transparent); transform: rotate(45deg); transition: all 0.5s; opacity: 0; }
        .btn-akkad:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(201,169,97,0.4), 0 0 15px rgba(201,169,97,0.2); }
        .btn-akkad:hover::after { opacity: 1; transform: rotate(45deg) translate(50%, 50%); }
        .btn-outline-akkad { border: 1px solid rgba(201,169,97,0.4); color: var(--akkad-gold); background: rgba(201,169,97,0.06); transition: all 0.3s ease; }
        .btn-outline-akkad:hover { background: rgba(201,169,97,0.15); border-color: var(--akkad-gold); box-shadow: 0 0 15px rgba(201,169,97,0.2); }
        .modal, .quick-order-modal, .video-modal { display: none; position: fixed; inset: 0; background: rgba(3,5,8,0.95); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .modal-content, .quick-order-form { background: rgba(15,26,36,0.98); border: 1px solid rgba(201,169,97,0.4); border-radius: 1.5rem; padding: 1.75rem; max-width: 500px; width: 90%; box-shadow: 0 25px 50px rgba(0,0,0,0.5), 0 0 30px rgba(201,169,97,0.1); }
        .quick-order-form { max-height: 90vh; overflow-y: auto; }
        .video-modal-content { position: relative; width: 90vw; max-width: 900px; aspect-ratio: 16/9; border-radius: 1rem; overflow: hidden; border: 2px solid rgba(201,169,97,0.4); }
        .video-modal-content iframe { width: 100%; height: 100%; border: none; }
        .video-modal-close { position: absolute; top: -50px; left: 0; color: var(--akkad-gold); font-size: 32px; cursor: pointer; background: none; border: none; }
        .loader { border: 3px solid rgba(201,169,97,0.15); border-top: 3px solid var(--akkad-gold); border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin: 40px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .category-chip { transition: all 0.3s ease; }
        .category-chip.active { background: rgba(201,169,97,0.2); border-color: var(--akkad-gold); color: var(--akkad-gold); box-shadow: 0 0 15px rgba(201,169,97,0.2); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(201,169,97,0.05); }
        ::-webkit-scrollbar-thumb { background: var(--akkad-gold); border-radius: 3px; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .search-input { background: rgba(201,169,97,0.05); border: 1px solid rgba(201,169,97,0.2); transition: all 0.3s ease; }
        .search-input:focus { background: rgba(201,169,97,0.08); border-color: rgba(201,169,97,0.5); box-shadow: 0 0 15px rgba(201,169,97,0.15); outline: none; }
        .gold-pulse { animation: goldPulse 3s ease-in-out infinite; }
        @keyframes goldPulse { 0%, 100% { box-shadow: 0 0 5px rgba(201,169,97,0.3); } 50% { box-shadow: 0 0 20px rgba(201,169,97,0.6), 0 0 40px rgba(201,169,97,0.2); } }
        .share-btn { background: linear-gradient(135deg, #25D366, #128C7E); transition: all 0.3s ease; }
        .share-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(37, 211, 102, 0.4); }
        .section-title { position: relative; display: inline-block; }
        .section-title::after { content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); width: 60px; height: 2px; background: linear-gradient(90deg, transparent, var(--akkad-gold), transparent); }
        .product-media-container { position: relative; overflow: hidden; height: 180px; cursor: pointer; }
        .product-media-container img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .akkad-card:hover .product-media-container img { transform: scale(1.08); }
        .video-play-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8); width: 50px; height: 50px; border-radius: 50%; background: rgba(201, 169, 97, 0.95); border: 2px solid rgba(255,255,255,0.9); display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 3; opacity: 0; transition: all 0.3s ease; box-shadow: 0 0 0 4px rgba(201,169,97,0.3); }
        .product-media-container:hover .video-play-btn { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .video-play-btn:hover { background: var(--akkad-gold); transform: translate(-50%, -50%) scale(1.15) !important; }
        .video-play-btn i { color: #0a0f18; font-size: 20px; margin-right: 2px; }
        .video-badge-bar { position: absolute; top: 10px; left: 10px; background: rgba(201, 169, 97, 0.9); color: #0a0f18; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; z-index: 3; display: flex; align-items: center; gap: 5px; pointer-events: none; }
        .media-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0); transition: background 0.3s ease; z-index: 2; pointer-events: none; }
        .product-media-container:hover .media-overlay { background: rgba(0,0,0,0.2); }
        .fade-in-up { animation: fadeInUp 0.5s ease forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .amiri-font { font-family: 'Amiri', serif; }
        .footer { background: rgba(3,5,8,0.8); backdrop-filter: blur(10px); border-top: 1px solid rgba(201,169,97,0.2); margin-top: 50px; }
        .product-description { white-space: pre-wrap; line-height: 1.6; }
        .whatsapp-icon-btn { background: #25D366; color: white; transition: all 0.3s ease; }
        .whatsapp-icon-btn:hover { background: #128C7E; transform: scale(1.05); box-shadow: 0 0 15px rgba(37, 211, 102, 0.4); }
        .toast { position: fixed; bottom: 20px; left: 20px; background: #10b981; color: white; padding: 12px 20px; border-radius: 10px; z-index: 9999; animation: slideIn 0.3s; }
        .toast.error { background: #dc2626; }
        @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

                    <a href="https://wa.me/9647730492020" class="bg-[#25D366] text-white w-10 h-10 rounded-xl flex items-center justify-center gold-pulse" target="_blank"><i class="fab fa-whatsapp"></i></a>

    <main class="container mx-auto px-4 py-10">
        <div class="text-center mb-10"><h2 class="text-2xl md:text-3xl font-bold mb-3 section-title amiri-font">✨ كنوز أكاد الرقمية ✨</h2><p class="text-gray-400 text-sm">أحدث الأجهزة والمستلزمات بأفضل الأسعار</p></div>
        <div id="loading" class="text-center py-20"><div class="loader"></div><p class="text-gray-400 mt-5">جاري الاتصال بقاعدة البيانات...</p><p id="loadingStatus" class="text-gray-500 text-xs mt-2">جاري التهيئة...</p></div>

    </main>

    <footer class="footer py-6 text-center"><div class="container mx-auto px-4"><p class="text-gray-500 text-sm">© 2024 متجر أكاد الرقمي - جميع الحقوق محفوظة</p><p class="text-gray-600 text-xs mt-2">من قلب بلاد الرافدين</p></div></footer>

    <!-- نوافذ -->
    <div id="descModal" class="modal" onclick="closeModal('descModal')"><div class="modal-content" onclick="event.stopPropagation()"><div class="flex justify-between items-start mb-4"><h2 id="modalTitle" class="text-xl font-bold text-[var(--akkad-gold)] neon-text"></h2><button onclick="closeModal('descModal')" class="text-gray-400 hover:text-white text-2xl">&times;</button></div><div id="modalDesc" class="text-gray-300 text-sm leading-relaxed mb-6 product-description"></div><button onclick="closeModal('descModal')" class="w-full bg-white/10 py-2 rounded-xl hover:bg-white/20">إغلاق</button></div></div>
    <div id="videoModal" class="video-modal" onclick="closeVideoModal()"><div class="video-modal-content" onclick="event.stopPropagation()"><button class="video-modal-close" onclick="closeVideoModal()">&times;</button><iframe id="videoIframe" src="" allowfullscreen></iframe></div></div>
    <div id="quickOrderModal" class="quick-order-modal" onclick="if(event.target===this) closeQuickOrder()"><div class="quick-order-form"><div class="flex justify-between items-center mb-4"><h3 class="text-xl font-bold text-[var(--akkad-gold)] neon-text"><i class="fab fa-whatsapp ml-2"></i>طلب سريع</h3><button onclick="closeQuickOrder()" class="text-gray-400 hover:text-white text-2xl">&times;</button></div><div id="quickProductInfo" class="bg-white/10 p-3 rounded-lg text-sm mb-4"></div><form id="quickOrderForm" class="space-y-3"><input type="hidden" id="quickProductId"><input type="hidden" id="quickProductName"><input type="hidden" id="quickProductPrice"><input type="text" id="quickCustomerName" class="w-full bg-white/10 border border-gray-600 rounded-lg p-3 text-white placeholder-gray-400 focus:border-[var(--akkad-gold)] outline-none" placeholder="👤 الاسم الكامل *" required><select id="quickGovernorate" class="w-full bg-white/10 border border-gray-600 rounded-lg p-3 text-white outline-none" required><option value="">🏛️ اختر المحافظة *</option><option>بغداد</option><option>البصرة</option><option>نينوى</option><option>أربيل</option><option>السليمانية</option><option>دهوك</option><option>كركوك</option><option>صلاح الدين</option><option>ديالى</option><option>الأنبار</option><option>بابل</option><option>الكوت</option><option>المثنى</option><option>ذي قار</option><option>القادسية</option><option>ميسان</option><option>النجف</option><option>كربلاء</option></select><input type="tel" id="quickPhone" class="w-full bg-white/10 border border-gray-600 rounded-lg p-3 text-white placeholder-gray-400 focus:border-[var(--akkad-gold)] outline-none dir-ltr" placeholder="📱 رقم الهاتف *" required><textarea id="quickAddress" class="w-full bg-white/10 border border-gray-600 rounded-lg p-3 text-white placeholder-gray-400 focus:border-[var(--akkad-gold)] outline-none" rows="2" placeholder="📍 العنوان التفصيلي (اختياري)"></textarea><textarea id="quickNotes" class="w-full bg-white/10 border border-gray-600 rounded-lg p-3 text-white placeholder-gray-400 focus:border-[var(--akkad-gold)] outline-none" rows="2" placeholder="💬 ملاحظات إضافية (اختياري)"></textarea><button type="submit" class="btn-akkad w-full py-3 rounded-xl flex items-center justify-center gap-2"><i class="fab fa-whatsapp"></i> إرسال الطلب</button></form></div></div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAEH25yJ-pwfgFUMjLZNgDyNqw8Rcv9S6E",
            authDomain: "akkad-store-ab5a1.firebaseapp.com",
            databaseURL: "https://akkad-store-ab5a1-default-rtdb.firebaseio.com",
            projectId: "akkad-store-ab5a1",
            storageBucket: "akkad-store-ab5a1.firebasestorage.app",
            messagingSenderId: "456810444639",
            appId: "1:456810444639:web:a706dc19781cd7738e28ea"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allProducts = [], categories = {}, categoryOrder = [], currentSearchTerm = '', currentCategory = 'all', currentProductForOrder = null;

        function showToast(msg, type = 'success') { let t = document.getElementById('toast'); t.textContent = msg; t.style.background = type === 'error' ? '#dc2626' : '#1a4d7a'; t.classList.remove('hidden'); setTimeout(() => t.classList.add('hidden'), 3000); }
        function shareStore() { if (navigator.share) navigator.share({ title: 'متجر أكاد الرقمي', url: window.location.href }); else { navigator.clipboard.writeText(window.location.href); showToast('✅ تم نسخ الرابط'); } }

        // 🎯 دالة قوية لاستخراج ID الفيديو من أي رابط يوتيوب
        function extractYouTubeId(url) {
            if (!url) return null;
            // تنظيف الرابط
            let cleanUrl = url.trim();
            // حالات خاصة
            if (cleanUrl.includes('youtube.com/watch')) {
                let params = new URLSearchParams(cleanUrl.split('?')[1]);
                return params.get('v');
            }
            if (cleanUrl.includes('youtu.be/')) {
                let parts = cleanUrl.split('youtu.be/');
                let id = parts[1].split('?')[0];
                return id;
            }
            if (cleanUrl.includes('youtube.com/embed/')) {
                let parts = cleanUrl.split('embed/');
                let id = parts[1].split('?')[0];
                return id;
            }
            if (cleanUrl.includes('youtube.com/shorts/')) {
                let parts = cleanUrl.split('shorts/');
                let id = parts[1].split('?')[0];
                return id;
            }
            // محاولة regex شامل
            let regex = /(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/;
            let match = cleanUrl.match(regex);
            return match ? match[1] : null;
        }

        // تشغيل الفيديو مع تنبيهات للمساعدة
        function playVideo(videoUrl, event) {
            if (event) event.stopPropagation();
            console.log("محاولة تشغيل الفيديو باستخدام الرابط:", videoUrl);
            if (!videoUrl) { showToast('⚠️ لا يوجد رابط فيديو لهذا المنتج', 'error'); return; }
            let videoId = extractYouTubeId(videoUrl);
            console.log("الـ ID المستخرج:", videoId);
            if (videoId) {
                let iframe = document.getElementById('videoIframe');
                let embedUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
                iframe.src = embedUrl;
                document.getElementById('videoModal').style.display = 'flex';
                showToast('🎬 يتم تشغيل الفيديو...');
            } else {
                console.error("فشل استخراج ID من الرابط:", videoUrl);
                showToast('⚠️ رابط الفيديو غير صالح. تأكد من نسخ الرابط الصحيح من يوتيوب', 'error');
            }
        }
        function closeVideoModal() { document.getElementById('videoModal').style.display = 'none'; document.getElementById('videoIframe').src = ''; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function closeQuickOrder() { document.getElementById('quickOrderModal').style.display = 'none'; }

        async function loadData() {
            try {
                let catsSnap = await db.ref('categories').once('value'); categories = catsSnap.val() || {};
                let orderSnap = await db.ref('categoryOrder').once('value'); categoryOrder = orderSnap.val() || [];
                let prodsSnap = await db.ref('products').once('value'); let products = prodsSnap.val() || {};
                allProducts = Object.entries(products).map(([id, val]) => ({ id, ...val }));
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('products-grid').classList.remove('hidden');
                renderCategories(); renderProducts();
            } catch(e) { console.error(e); document.getElementById('loading').classList.add('hidden'); document.getElementById('error-message').classList.remove('hidden'); document.getElementById('errorDetail').innerHTML = e.message; }
        }
        function retryConnection() { document.getElementById('error-message').classList.add('hidden'); document.getElementById('loading').classList.remove('hidden'); loadData(); }
        function escapeHtml(t) { if(!t) return ''; return String(t).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
        function renderCategories() {
            let container = document.getElementById('categories-nav');
            let catsList = [];
            categoryOrder.forEach(k => { if(categories[k]) catsList.push({key:k, name:categories[k]}); });
            Object.keys(categories).forEach(k => { if(!categoryOrder.includes(k)) catsList.push({key:k, name:categories[k]}); });
            let html = `<button onclick="filterByCategory('all')" class="category-chip px-4 py-2 rounded-full text-sm border transition whitespace-nowrap ${currentCategory==='all'?'active':''}" style="border-color:rgba(201,169,97,0.3)">🏠 الكل</button>`;
            catsList.forEach(c => { html += `<button onclick="filterByCategory('${c.key}')" class="category-chip px-4 py-2 rounded-full text-sm border transition whitespace-nowrap ${currentCategory===c.key?'active':''}" style="border-color:rgba(201,169,97,0.3)">📁 ${escapeHtml(c.name)}</button>`; });
            container.innerHTML = html;
        }
        function filterByCategory(k) { currentCategory = k; renderCategories(); renderProducts(); }
        function searchProducts() { currentSearchTerm = document.getElementById('searchInput').value.trim().toLowerCase(); renderProducts(); }
        function resetSearch() { document.getElementById('searchInput').value = ''; currentSearchTerm = ''; renderProducts(); document.getElementById('no-results').classList.add('hidden'); }
        function handleImageClick(pid) { let p = allProducts.find(p=>p.id===pid); if(p && p.video && p.video.trim()) playVideo(p.video); else showProductDetails(pid); }
        function showProductDetails(pid) { let p = allProducts.find(p=>p.id===pid); if(!p) return; document.getElementById('modalTitle').innerHTML = p.name; let dh = p.desc ? `<div class="mb-4">${escapeHtml(p.desc).replace(/\n/g,'<br>')}</div>` : ''; dh += `<div class="bg-white/5 p-3 rounded-lg"><span class="text-[var(--akkad-gold)]">💰 السعر:</span> ${Number(p.price).toLocaleString()} د.ع</div>`; document.getElementById('modalDesc').innerHTML = dh; document.getElementById('descModal').style.display = 'flex'; }
        function openQuickOrderFromCard(pid) { let p = allProducts.find(p=>p.id===pid); if(p) openQuickOrder(p); }
        function openQuickOrder(p) { if(!p) return; currentProductForOrder=p; document.getElementById('quickProductId').value=p.id; document.getElementById('quickProductName').value=p.name; document.getElementById('quickProductPrice').value=p.price; document.getElementById('quickProductInfo').innerHTML=`<div class="flex justify-between"><span class="font-bold">${escapeHtml(p.name)}</span><span class="text-[var(--akkad-gold)] font-bold">${Number(p.price).toLocaleString()} د.ع</span></div>`; ['quickCustomerName','quickGovernorate','quickPhone','quickAddress','quickNotes'].forEach(id=>{ let el=document.getElementById(id); if(el && el.tagName==='SELECT') el.value=''; else if(el) el.value=''; }); document.getElementById('quickOrderModal').style.display='flex'; }
        
        function renderProducts() {
            let container = document.getElementById('products-grid');
            let filtered = [...allProducts];
            if(currentCategory !== 'all') filtered = filtered.filter(p=>p.category === currentCategory);
            if(currentSearchTerm) filtered = filtered.filter(p=>p.name && p.name.toLowerCase().includes(currentSearchTerm));
            if(filtered.length === 0) { document.getElementById('products-grid').classList.add('hidden'); document.getElementById('no-results').classList.remove('hidden'); return; }
            document.getElementById('products-grid').classList.remove('hidden'); document.getElementById('no-results').classList.add('hidden');
            container.innerHTML = filtered.map(p => { let hasVideo = p.video && p.video.trim(); return `<div class="akkad-card overflow-hidden fade-in-up"><div class="product-media-container" onclick="handleImageClick('${p.id}')"><img src="${p.img || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22%3E%3Crect width=%22200%22 height=%22200%22 fill=%22%231a1a2e%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23c9a961%22%3E📦%3C/text%3E%3C/svg%3E'}" alt="${escapeHtml(p.name)}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22%3E%3Crect width=%22200%22 height=%22200%22 fill=%22%231a1a2e%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23c9a961%22 font-size=%2240%22%3E📦%3C/text%3E%3C/svg%3E'">${hasVideo ? `<div class="video-play-btn" onclick="playVideo('${escapeHtml(p.video)}', event)"><i class="fas fa-play"></i></div><div class="video-badge-bar"><i class="fas fa-video"></i> فيديو</div>` : ''}<div class="media-overlay"></div></div><div class="p-4"><h3 class="font-bold text-base mb-1 line-clamp-2">${escapeHtml(p.name)}</h3><div class="text-[var(--akkad-gold)] font-bold text-lg mb-3">${Number(p.price).toLocaleString()} د.ع</div><div class="flex gap-2"><button onclick="showProductDetails('${p.id}')" class="btn-outline-akkad flex-1 py-2 rounded-lg text-sm transition">📖 تفاصيل</button><button onclick="openQuickOrderFromCard('${p.id}')" class="whatsapp-icon-btn w-10 h-10 rounded-lg flex items-center justify-center transition"><i class="fab fa-whatsapp text-lg"></i></button></div></div></div>`; }).join('');
        }
        
        // إرسال الطلب
        document.getElementById('quickOrderForm').addEventListener('submit', async function(e) { e.preventDefault(); let name=document.getElementById('quickCustomerName').value.trim(); let gov=document.getElementById('quickGovernorate').value; let phone=document.getElementById('quickPhone').value.trim(); let addr=document.getElementById('quickAddress').value.trim(); let notes=document.getElementById('quickNotes').value.trim(); let pid=document.getElementById('quickProductId').value; let pname=document.getElementById('quickProductName').value; let pprice=document.getElementById('quickProductPrice').value; if(!name||!gov||!phone){ showToast('⚠️ الرجاء ملء الحقول المطلوبة','error'); return; } let orderData={orderId:Date.now().toString(),customerName:name,governorate:gov,phone:phone,address:addr,notes:notes,productId:pid,productName:pname,productPrice:pprice,status:'جديد',createdAt:new Date().toISOString(),createdAtTimestamp:Date.now()}; try{ await db.ref('orders/'+orderData.orderId).set(orderData); let msg=`🛍️ *طلب جديد من متجر أكاد*\n\n👤 *الاسم:* ${name}\n📱 *الهاتف:* ${phone}\n🏛️ *المحافظة:* ${gov}\n📦 *المنتج:* ${pname}\n💰 *السعر:* ${Number(pprice).toLocaleString()} د.ع`; if(addr) msg+=`\n📍 *العنوان:* ${addr}`; if(notes) msg+=`\n💬 *ملاحظات:* ${notes}`; msg+=`\n\n📅 ${new Date().toLocaleString('ar-IQ')}`; window.open(`https://wa.me/9647730492020?text=${encodeURIComponent(msg)}`,'_blank'); showToast('✅ تم إرسال الطلب بنجاح!'); setTimeout(()=>closeQuickOrder(),1500); } catch(err){ showToast('❌ فشل إرسال الطلب','error'); } });
        
        loadData();
    </script>
</body>
</html>
