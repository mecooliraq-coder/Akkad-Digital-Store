<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاد | متجر بلاد الرافدين الرقمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=Lateef&display=swap');
        
        :root {
            --mesopotamia-dark: #0a0f12;
            --akkad-gold: #d4af37;
            --cuneiform-glow: rgba(212, 175, 55, 0.1);
        }
        
        body { 
            font-family: 'Tajawal', sans-serif; 
            background: var(--mesopotamia-dark); 
            color: #f0e6d0; 
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        /* نظام الخلفية المسمارية */
        #cuneiform-background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
            background: radial-gradient(circle at center, #141a1f 0%, #0a0f12 100%);
        }

        .cuneiform-char {
            position: absolute; color: var(--cuneiform-glow);
            user-select: none; animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }

        .akkad-nav {
            background: rgba(10, 15, 18, 0.9); backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--akkad-gold);
        }

        .akkad-card { 
            background: rgba(20, 26, 31, 0.7); backdrop-filter: blur(10px); 
            border: 1px solid rgba(212, 175, 55, 0.15); 
            border-radius: 1rem; transition: 0.4s; overflow: hidden;
        }
        
        .akkad-card:hover { 
            border-color: var(--akkad-gold); transform: translateY(-5px);
        }

        .btn-akkad { 
            background: linear-gradient(135deg, var(--akkad-gold), #b8942e); 
            color: #0a0f12; font-weight: 800;
        }

        .product-media-container { height: 160px; overflow: hidden; position: relative; }
        .product-media-container img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .akkad-card:hover .product-media-container img { transform: scale(1.1); }

        .modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.95); z-index: 1000;
            align-items: center; justify-content: center; backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

    <div id="cuneiform-background"></div>

    <nav class="akkad-nav sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3">
            <div class="flex justify-between items-center mb-3">
                <div class="flex items-center gap-3">
                    <img src="https://www.raed.net/img?id=1539063" class="w-12 h-12 rounded-full border-2 border-[var(--akkad-gold)]">
                    <div class="text-right">
                        <div class="text-xl font-black text-[var(--akkad-gold)]">أَكَّد</div>
                        <div class="text-[7px] tracking-widest opacity-60">DIGITAL STORE</div>
                    </div>
                </div>
                <div class="flex gap-2">
                    <a href="https://wa.me/9647730492020" class="bg-[#25D366] px-4 py-2 rounded-lg text-white font-bold text-xs"><i class="fab fa-whatsapp"></i></a>
                </div>
            </div>
            <input type="text" id="searchInput" onkeyup="searchProducts()" class="w-full bg-black/40 border border-white/10 rounded-xl py-3 px-4 text-center outline-none focus:border-[var(--akkad-gold)]" placeholder="ابحث عن منتجك...">
            <div id="categories-nav" class="flex gap-2 mt-4 overflow-x-auto pb-2 no-scrollbar text-[10px]"></div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-6">
        <div id="loading" class="text-center py-20">
            <div class="w-10 h-10 border-2 border-[var(--akkad-gold)] border-t-transparent rounded-full animate-spin mx-auto"></div>
            <p class="mt-4 text-xs opacity-50">جاري تحميل البيانات...</p>
        </div>
        <div id="products-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 hidden"></div>
    </main>

    <div id="descModal" class="modal" onclick="this.style.display='none'">
        <div class="bg-[#141a1f] border border-white/10 p-6 rounded-2xl max-w-md w-[90%]" onclick="event.stopPropagation()">
            <h2 id="modalTitle" class="text-xl font-bold text-[var(--akkad-gold)] mb-4"></h2>
            <div id="modalDesc" class="text-sm opacity-80 leading-relaxed mb-6 whitespace-pre-line"></div>
            <button onclick="document.getElementById('descModal').style.display='none'" class="w-full bg-white/5 py-3 rounded-xl">إغلاق</button>
        </div>
    </div>

    <div id="quickOrderModal" class="modal">
        <div class="bg-[#141a1f] border border-[var(--akkad-gold)] p-6 rounded-2xl max-w-md w-[90%]" onclick="event.stopPropagation()">
            <h3 class="text-lg font-bold mb-4 text-center">تفاصيل التوصيل</h3>
            <form id="quickOrderForm" class="space-y-3">
                <input type="text" id="custName" placeholder="الاسم الكامل" class="w-full bg-black/40 border border-white/10 p-3 rounded-xl outline-none" required>
                <div class="grid grid-cols-2 gap-2">
                    <select id="custGov" class="bg-black border border-white/10 p-3 rounded-xl text-xs outline-none" required>
                        <option value="">المحافظة</option>
                        <option>بغداد</option><option>البصرة</option><option>نينوى</option><option>بابل</option><option>النجف</option><option>كربلاء</option>
                    </select>
                    <input type="text" id="custCity" placeholder="المدينة/المنطقة" class="w-full bg-black/40 border border-white/10 p-3 rounded-xl outline-none text-xs" required>
                </div>
                <input type="tel" id="custPhone" placeholder="رقم الهاتف" class="w-full bg-black/40 border border-white/10 p-3 rounded-xl outline-none" required>
                <input type="text" id="custLandmark" placeholder="أقرب نقطة دالة" class="w-full bg-black/40 border border-white/10 p-3 rounded-xl outline-none text-xs">
                <button type="submit" class="btn-akkad w-full py-4 rounded-xl text-sm font-bold">تأكيد الطلب عبر واتساب</button>
                <button type="button" onclick="closeModal('quickOrderModal')" class="w-full text-xs opacity-50">إلغاء</button>
            </form>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAEH25yJ-pwfgFUMjLZNgDyNqw8Rcv9S6E",
            authDomain: "akkad-store-ab5a1.firebaseapp.com",
            databaseURL: "https://akkad-store-ab5a1-default-rtdb.firebaseio.com",
            projectId: "akkad-store-ab5a1",
            storageBucket: "akkad-store-ab5a1.firebasestorage.app",
            messagingSenderId: "456810444639",
            appId: "1:456810444639:web:a706dc19781cd7738e28ea"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allProducts = [], categories = {}, currentCategory = 'all', currentSearch = '';
        let selectedProduct = null;

        // تفعيل الخلفية المسمارية
        const cuneiformChars = ['𒀀', '𒀁', '𒀂', '𒀃', '𒀄', '𒀅', '𒀆', '𒀇'];
        function createCuneiform() {
            const container = document.getElementById('cuneiform-background');
            if(!container) return;
            const char = document.createElement('div');
            char.className = 'cuneiform-char';
            char.textContent = cuneiformChars[Math.floor(Math.random()*cuneiformChars.length)];
            char.style.left = Math.random()*100 + '%';
            char.style.fontSize = (Math.random()*20 + 10) + 'px';
            char.style.animationDuration = (Math.random()*10 + 10) + 's';
            container.appendChild(char);
            setTimeout(() => char.remove(), 15000);
        }
        setInterval(createCuneiform, 500);

        // تحميل البيانات من Firebase
        async function loadStore() {
            try {
                const [pSnap, cSnap] = await Promise.all([
                    db.ref('products').once('value'),
                    db.ref('categories').once('value')
                ]);
                allProducts = Object.entries(pSnap.val() || {}).map(([id, data]) => ({id, ...data}));
                categories = cSnap.val() || {};
                renderCategories();
                renderProducts();
                document.getElementById('loading').style.display = 'none';
            } catch(e) { console.error("Error loading:", e); }
        }

        function renderCategories() {
            const nav = document.getElementById('categories-nav');
            let html = `<button onclick="filterCat('all')" class="px-4 py-2 rounded-full border border-white/10 whitespace-nowrap">الكل</button>`;
            for(let id in categories) html += `<button onclick="filterCat('${id}')" class="px-4 py-2 rounded-full border border-white/10 whitespace-nowrap">${categories[id]}</button>`;
            nav.innerHTML = html;
        }

        function filterCat(id) { currentCategory = id; renderProducts(); }
        function searchProducts() { currentSearch = document.getElementById('searchInput').value.toLowerCase(); renderProducts(); }

        function renderProducts() {
            const grid = document.getElementById('products-grid');
            const filtered = allProducts.filter(p => {
                const matchCat = currentCategory === 'all' || p.category === currentCategory;
                const matchSearch = p.name.toLowerCase().includes(currentSearch);
                return matchCat && matchSearch;
            });

            grid.innerHTML = filtered.map(p => `
                <div class="akkad-card">
                    <div class="product-media-container">
                        <img src="${p.img}" loading="lazy">
                    </div>
                    <div class="p-3">
                        <h3 class="text-[10px] font-bold h-8 overflow-hidden mb-1">${p.name}</h3>
                        <div class="text-[var(--akkad-gold)] text-xs font-black mb-3">${Number(p.price).toLocaleString()} د.ع</div>
                        <div class="flex flex-col gap-2">
                            <button onclick="openOrder('${p.id}')" class="btn-akkad w-full py-2 rounded-lg text-[10px]">شراء الآن</button>
                            <button onclick="showDetails('${p.id}')" class="bg-white/5 w-full py-2 rounded-lg text-[10px] border border-white/10">المواصفات</button>
                        </div>
                    </div>
                </div>
            `).join('');
            grid.classList.remove('hidden');
        }

        function showDetails(id) {
            const p = allProducts.find(x => x.id === id);
            document.getElementById('modalTitle').innerText = p.name;
            document.getElementById('modalDesc').innerText = p.desc || 'لا توجد مواصفات';
            document.getElementById('descModal').style.display = 'flex';
        }

        function openOrder(id) {
            selectedProduct = allProducts.find(x => x.id === id);
            document.getElementById('quickOrderModal').style.display = 'flex';
        }

        document.getElementById('quickOrderForm').onsubmit = function(e) {
            e.preventDefault();
            const msg = `*طلب شراء جديد*%0A*المنتج:* ${selectedProduct.name}%0A*الاسم:* ${document.getElementById('custName').value}%0A*المحافظة:* ${document.getElementById('custGov').value}%0A*المنطقة:* ${document.getElementById('custCity').value}%0A*الهاتف:* ${document.getElementById('custPhone').value}%0A*نقطة دالة:* ${document.getElementById('custLandmark').value}`;
            window.open(`https://wa.me/9647730492020?text=${encodeURIComponent(msg)}`);
        };

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        loadStore();
    </script>
</body>
</html>
