<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | متجر أكاد الرقمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: #f1f5f9; scroll-behavior: smooth; }
        .glass-panel { background: white; border-radius: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid rgba(226, 232, 240, 0.8); }
        .stat-card { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); color: white; border-radius: 1.5rem; padding: 1.5rem; position: relative; overflow: hidden; transition: transform 0.3s; }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-card.orange { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); }
        .stat-card.green { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .stat-card.red { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); }
        .notification-toast { position: fixed; bottom: 20px; left: 20px; z-index: 9999; background: #1e293b; color: white; border-radius: 1rem; padding: 1rem 1.5rem; box-shadow: 0 10px 40px rgba(0,0,0,0.2); animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-overlay.active { display: flex; }
        .modal-box { background: white; border-radius: 1.5rem; padding: 2rem; width: 90%; max-width: 500px; }
        .product-card { transition: all 0.3s; border: 1px solid #e2e8f0; }
        .product-card:hover { box-shadow: 0 10px 30px rgba(0,0,0,0.1); transform: translateY(-3px); }
        .btn-icon { transition: all 0.2s; cursor: pointer; border: none; background: none; }
        .btn-icon:hover { transform: scale(1.1); }
        .search-box { background: white; border: 2px solid #e2e8f0; transition: all 0.3s; }
        .search-box:focus-within { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .empty-state { text-align: center; padding: 3rem; color: #94a3b8; }
        .img-preview { width: 100%; height: 150px; object-fit: cover; border-radius: 1rem; margin-top: 0.5rem; display: none; }
        .img-preview.active { display: block; }
        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 9998; display: none; align-items: center; justify-content: center; flex-direction: column; }
        .loading-overlay.active { display: flex; }
    </style>
</head>
<body class="p-4 md:p-8 text-right">

    <!-- شاشة تسجيل الدخول -->
    <div id="loginScreen" class="fixed inset-0 bg-gradient-to-br from-blue-600 to-blue-800 z-50 flex items-center justify-center">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md mx-4">
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 text-white">
                    <i class="fas fa-shield-alt text-2xl"></i>
                </div>
                <h2 class="text-2xl font-bold text-slate-800">تسجيل الدخول</h2>
                <p class="text-sm text-gray-400 mt-2">لوحة تحكم متجر أكاد الرقمي</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="text-sm text-gray-600 block mb-2">كلمة المرور</label>
                    <input id="loginPassword" type="password" class="w-full p-3 border rounded-xl outline-none text-sm focus:border-blue-500 transition" placeholder="••••••••">
                </div>
                <button onclick="login()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg flex items-center justify-center gap-2">
                    <span id="loginBtnText">دخول</span>
                    <div id="loginSpinner" class="loading-spinner hidden"></div>
                </button>
                <p id="loginError" class="text-red-500 text-sm text-center hidden"></p>
            </div>
            <div class="mt-6 p-4 bg-yellow-50 rounded-xl border border-yellow-200">
                <p class="text-xs text-yellow-700">
                    <i class="fas fa-info-circle ml-1"></i>
                    كلمة المرور الافتراضية: ashd1980
                </p>
            </div>
        </div>
    </div>

    <!-- شاشة التحميل -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner mb-4"></div>
        <p class="text-gray-600 font-bold">جاري تحميل البيانات...</p>
    </div>

    <!-- المحتوى الرئيسي -->
    <div id="mainContent" class="max-w-7xl mx-auto hidden">
        <header class="mb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg text-white">
                    <i class="fas fa-tools text-xl"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold text-slate-800">لوحة تحكم أكاد</h1>
                    <p class="text-xs text-gray-400" id="currentTime"></p>
                </div>
            </div>
            <div class="flex gap-3 flex-wrap">
                <button onclick="exportToCSV()" class="bg-green-600 text-white px-4 py-2.5 rounded-xl font-bold hover:bg-green-700 transition flex items-center gap-2 text-sm">
                    <i class="fas fa-file-csv"></i> تصدير
                </button>
                <button onclick="openCategoryModal()" class="bg-orange-500 text-white px-4 py-2.5 rounded-xl font-bold hover:bg-orange-600 transition flex items-center gap-2 text-sm">
                    <i class="fas fa-tags"></i> الأقسام
                </button>
                <a href="index.html" target="_blank" class="bg-slate-800 text-white px-4 py-2.5 rounded-xl font-bold text-sm">المتجر</a>
                <button onclick="logout()" class="bg-red-500 text-white px-4 py-2.5 rounded-xl font-bold hover:bg-red-600 transition text-sm">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </header>

        <!-- الإحصائيات -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="stat-card">
                <div class="flex justify-between items-start">
                    <div>
                        <div class="text-3xl font-bold" id="statTotalProducts">0</div>
                        <div class="text-xs opacity-75 mt-1">منتجاً متوفراً</div>
                    </div>
                    <i class="fas fa-box text-2xl opacity-30"></i>
                </div>
            </div>
            <div class="stat-card orange">
                <div class="flex justify-between items-start">
                    <div>
                        <div class="text-3xl font-bold" id="statLowStock">0</div>
                        <div class="text-xs opacity-75 mt-1">مخزون منخفض</div>
                    </div>
                    <i class="fas fa-exclamation-triangle text-2xl opacity-30"></i>
                </div>
            </div>
            <div class="stat-card red">
                <div class="flex justify-between items-start">
                    <div>
                        <div class="text-3xl font-bold" id="statOutOfStock">0</div>
                        <div class="text-xs opacity-75 mt-1">نفذ من المخزون</div>
                    </div>
                    <i class="fas fa-times-circle text-2xl opacity-30"></i>
                </div>
            </div>
            <div class="stat-card green">
                <div class="flex justify-between items-start">
                    <div>
                        <div class="text-3xl font-bold" id="statCategories">0</div>
                        <div class="text-xs opacity-75 mt-1">قسم نشط</div>
                    </div>
                    <i class="fas fa-folder text-2xl opacity-30"></i>
                </div>
            </div>
        </div>

        <!-- البحث والف
