<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>أكاد | متجر بلاد الرافدين الرقمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap');
        
        :root {
            --bg-dark: #0a0f12;
            --gold: #d4af37;
            --gold-dark: #b8942e;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg-dark);
            color: #e0d6c0;
            min-height: 100vh;
        }
        
        /* خلفية متحركة */
        .bg-pattern {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 30%, rgba(212, 175, 55, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(212, 175, 55, 0.03) 0%, transparent 40%),
                repeating-linear-gradient(45deg, rgba(139, 90, 43, 0.02) 0px, rgba(139, 90, 43, 0.02) 2px, transparent 2px, transparent 8px);
        }
        
        /* شريط علوي ذهبي */
        .gold-border {
            border-bottom: 2px solid var(--gold);
            box-shadow: 0 2px 10px rgba(212, 175, 55, 0.2);
        }
        
        /* أزرار الأقسام */
        .cat-btn {
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.2);
        }
        .cat-btn.active {
            background: var(--gold);
            color: #0a0f12;
            border-color: var(--gold);
        }
        .cat-btn:hover:not(.active) {
            background: rgba(212, 175, 55, 0.15);
            border-color: var(--gold);
        }
        
        /* بطاقات المنتجات */
        .product-card {
            background: rgba(20, 26, 31, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 1rem;
            transition: all 0.3s ease;
            overflow: hidden;
        }
        .product-card:hover {
            transform: translateY(-5px);
            border-color: var(--gold);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3), 0 0 15px rgba(212, 175, 55, 0.1);
        }
        
        .media-box {
            height: 170px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        .media-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .product-card:hover .media-box img {
            transform: scale(1.05);
        }
        .video-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: 0.3s;
        }
        .media-box:hover .video-overlay {
            opacity: 1;
        }
        
        .btn-gold {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: #0a0f12;
            font-weight: 700;
            transition: all 0.3s ease;
        }
        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
        }
        
        .btn-outline {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.3);
            transition: all 0.3s ease;
        }
        .btn-outline:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: var(--gold);
        }
        
        /* شريط المنتجات المتحرك */
        .marquee-container {
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.05), transparent);
            border-top: 1px solid rgba(212, 175, 55, 0.15);
            border-bottom: 1px solid rgba(212, 175, 55, 0.15);
            padding: 15px 0;
            overflow: hidden;
        }
        .marquee-track {
            display: flex;
            gap: 20px;
            width: max-content;
            animation: scroll 35s linear infinite;
        }
        @keyframes scroll {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }
        .marquee-item {
            width: 180px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            padding: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid rgba(212, 175, 55, 0.1);
        }
        .marquee-item:hover {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.05);
        }
        .marquee-item img {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: cover;
        }
        .marquee-item span {
            font-size: 11px;
            font-weight: 500;
        }
        
        /* مودال */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }
        .modal-content {
            background: #141a1f;
            border-radius: 1rem;
            padding: 1.5rem;
            max-width: 450px;
            width: 90%;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }
        
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: #1a1f24; }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(212, 175, 55, 0.2);
            border-top: 3px solid var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>

    <!-- الهيدر -->
    <nav class="sticky top-0 z-50 bg-[#0a0f12]/95 backdrop-blur gold-border">
        <div class="container mx-auto px-4 py-3">
            <div class="flex justify-between items-center mb-3">
                <div class="flex items-center gap-3">
                    <img src="https://www.raed.net/img?id=1539063" class="w-12 h-12 rounded-full border-2 border-[var(--gold)] bg-[#1a1108]" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ccircle cx=%2250%22 cy=%2250%22 r=%2245%22 fill=%22%23d4af37%22/%3E%3Ctext x=%2250%22 y=%2270%22 text-anchor=%22middle%22 fill=%22%23000%22 font-size=%2235%22%3Eأ%3C/text%3E%3C/svg%3E'">
                    <div>
                        <div class="text-xl font-black text-[var(--gold)]">أَكَّد</div>
                        <div class="text-[10px] text-white/40 tracking-wider">Akkad Digital Store</div>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="shareStore()" class="w-10 h-10 rounded-lg bg-white/10 border border-white/10 flex items-center justify-center hover:bg-white/20 transition">
                        <i class="fas fa-share-alt text-sm"></i>
                    </button>
                    <a href="https://wa.me/9647730492020" class="w-10 h-10 rounded-lg bg-[#25D366] flex items-center justify-center text-white text-lg hover:bg-[#128C7E] transition" target="_blank">
                        <i class="fab fa-whatsapp"></i>
                    </a>
                </div>
            </div>
            
            <!-- شريط البحث -->
            <div class="relative">
                <input type="text" id="searchInput" onkeyup="searchProducts()" class="w-full bg-black/40 border border-white/10 rounded-xl py-2.5 px-4 pr-10 text-white placeholder:text-white/30 outline-none focus:border-[var(--gold)] transition" placeholder="🔍 ابحث عن منتج...">
                <i class="fas fa-search absolute right-3 top-3 text-white/30"></i>
            </div>
            
            <!-- الأقسام (ستتعبأ ديناميكياً مع الترتيب) -->
            <div id="categoriesContainer" class="flex gap-2 mt-3 overflow-x-auto no-scrollbar pb-2"></div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-6">
        <!-- شريط المنتجات المتحرك -->
        <div id="marqueeSection" class="marquee-container hidden">
            <div class="marquee-track" id="marqueeTrack"></div>
        </div>
        
        <!-- شاشة التحميل -->
        <div id="loadingScreen" class="text-center py-20">
            <div class="loader"></div>
            <p class="text-white/50 text-sm">جاري تحميل المتجر...</p>
        </div>
        
        <!-- شبكة المنتجات -->
        <div id="productsGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 hidden"></div>
        
        <!-- لا توجد نتائج -->
        <div id="noResults" class="hidden text-center py-20">
            <i class="fas fa-box-open text-5xl text-white/20 mb-3"></i>
            <p class="text-white/40">لا توجد منتجات مطابقة للبحث</p>
        </div>
    </main>

    <!-- مودال التفاصيل -->
    <div id="detailsModal" class="modal" onclick="closeModal('detailsModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-4">
                <h2 id="modalTitle" class="text-xl font-bold text-[var(--gold)]"></h2>
                <button onclick="closeModal('detailsModal')" class="text-white/50 hover:text-white text-2xl">&times;</button>
            </div>
            <div id="modalDesc" class="text-sm text-white/70 leading-relaxed mb-6 whitespace-pre-line max-h-[50vh] overflow-y-auto"></div>
            <button onclick="closeModal('detailsModal')" class="w-full btn-outline py-2 rounded-lg text-sm">إغلاق</button>
        </div>
    </div>

    <!-- مودال الطلب السريع -->
    <div id="orderModal" class="modal" onclick="closeModal('orderModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold text-[var(--gold)]"><i class="fab fa-whatsapp ml-2"></i>طلب سريع</h3>
                <button onclick="closeModal('orderModal')" class="text-white/50 hover:text-white text-2xl">&times;</button>
            </div>
            <div id="orderProductInfo" class="bg-white/5 p-3 rounded-lg text-sm mb-4"></div>
            <form id="orderForm" class="space-y-3">
                <input type="text" id="custName" placeholder="👤 الاسم الكامل *" class="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-white placeholder:text-white/30 outline-none focus:border-[var(--gold)]" required>
                <div class="grid grid-cols-2 gap-2">
                    <select id="custGov" class="bg-black/40 border border-white/10 rounded-xl p-3 text-white text-sm outline-none focus:border-[var(--gold)]" required>
                        <option value="">المحافظة</option>
                        <option>بغداد</option><option>البصرة</option><option>نينوى</option><option>أربيل</option><option>السليمانية</option>
                        <option>دهوك</option><option>كركوك</option><option>صلاح الدين</option><option>ديالى</option><option>الأنبار</option>
                        <option>بابل</option><option>الكوت</option><option>المثنى</option><option>ذي قار</option><option>القادسية</option>
                        <option>ميسان</option><option>النجف</option><option>كربلاء</option>
                    </select>
                    <input type="text" id="custCity" placeholder="المنطقة *" class="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-white placeholder:text-white/30 outline-none focus:border-[var(--gold)]" required>
                </div>
                <input type="tel" id="custPhone" placeholder="📱 رقم الهاتف *" class="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-white placeholder:text-white/30 outline-none focus:border-[var(--gold)]" required>
                <textarea id="custAddress" rows="2" placeholder="📍 العنوان التفصيلي (اختياري)" class="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-white placeholder:text-white/30 outline-none focus:border-[var(--gold)]"></textarea>
                <button type="submit" class="btn-gold w-full py-3 rounded-xl font-bold"><i class="fab fa-whatsapp ml-2"></i>إرسال الطلب</button>
            </form>
        </div>
    </div>

    <!-- مودال الفيديو -->
    <div id="videoModal" class="modal" onclick="closeVideo()">
        <div class="relative w-[90%] max-w-3xl aspect-video bg-black rounded-xl overflow-hidden border border-[var(--gold)]/30">
            <button onclick="closeVideo()" class="absolute -top-10 left-0 text-white/70 hover:text-white text-2xl">&times;</button>
            <iframe id="videoFrame" class="w-full h-full" src="" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        // ========================================
        // إعدادات Firebase
        // ========================================
        const firebaseConfig = {
            apiKey: "AIzaSyAEH25yJ-pwfgFUMjLZNgDyNqw8Rcv9S6E",
            authDomain: "akkad-store-ab5a1.firebaseapp.com",
            databaseURL: "https://akkad-store-ab5a1-default-rtdb.firebaseio.com",
            projectId: "akkad-store-ab5a1",
            storageBucket: "akkad-store-ab5a1.firebasestorage.app",
            messagingSenderId: "456810444639",
            appId: "1:456810444639:web:a706dc19781cd7738e28ea"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        // المتغيرات العامة
        let allProducts = [];
        let categories = {};
        let categoryOrder = [];
        let currentCategory = 'all';
        let currentSearch = '';
        let selectedProduct = null;
        
        // ========================================
        // دوال مساعدة
        // ========================================
        function showToast(msg, isError = false) {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-5 left-5 z-[9999] px-4 py-2 rounded-lg text-white text-sm animate-[slideIn_0.3s_ease] ${isError ? 'bg-red-600' : 'bg-[#1a4d7a]'}`;
            toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'} ml-2"></i>${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            return String(text).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m] || m);
        }
        
        function shareStore() {
            if (navigator.share) {
                navigator.share({ title: 'متجر أكاد', text: 'اكتشف كنوز بلاد الرافدين الرقمية', url: window.location.href });
            } else {
                navigator.clipboard.writeText(window.location.href);
                showToast('✅ تم نسخ رابط المتجر');
            }
        }
        
        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }
        
        function closeVideo() {
            document.getElementById('videoModal').style.display = 'none';
            document.getElementById('videoFrame').src = '';
        }
        
        // استخراج ID الفيديو من رابط يوتيوب
        function getYouTubeId(url) {
            if (!url) return null;
            let video = url.trim();
            if (video.length === 11 && /^[a-zA-Z0-9_-]{11}$/.test(video)) return video;
            let match = video.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/);
            if (match) return match[1];
            match = video.match(/[?&]v=([a-zA-Z0-9_-]{11})/);
            return match ? match[1] : null;
        }
        
        function playVideo(videoUrl) {
            const videoId = getYouTubeId(videoUrl);
            if (videoId) {
                document.getElementById('videoFrame').src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
                document.getElementById('videoModal').style.display = 'flex';
            } else {
                showToast('⚠️ رابط الفيديو غير صالح', true);
            }
        }
        
        // ========================================
        // تحميل البيانات من Firebase (Realtime)
        // ========================================
        function loadData() {
            // تحميل الأقسام
            db.ref('categories').on('value', (snapshot) => {
                categories = snapshot.val() || {};
                renderCategories();
            });
            
            // تحميل ترتيب الأقسام
            db.ref('categoryOrder').on('value', (snapshot) => {
                categoryOrder = snapshot.val() || [];
                renderCategories();
            });
            
            // تحميل المنتجات
            db.ref('products').on('value', (snapshot) => {
                const products = snapshot.val() || {};
                allProducts = Object.entries(products).map(([id, data]) => ({ id, ...data }));
                renderProducts();
                renderMarquee();
                
                // إخفاء شاشة التحميل
                document.getElementById('loadingScreen').classList.add('hidden');
                document.getElementById('productsGrid').classList.remove('hidden');
            });
        }
        
        // ترتيب الأقسام حسب categoryOrder
        function getSortedCategories() {
            const sorted = [];
            // الأقسام المرتبة أولاً
            categoryOrder.forEach(key => {
                if (categories[key]) sorted.push({ key, name: categories[key] });
            });
            // الأقسام غير المرتبة في النهاية
            Object.keys(categories).forEach(key => {
                if (!categoryOrder.includes(key)) sorted.push({ key, name: categories[key] });
            });
            return sorted;
        }
        
        // عرض الأقسام
        function renderCategories() {
            const container = document.getElementById('categoriesContainer');
            const sortedCats = getSortedCategories();
            
            let html = `<button onclick="filterByCategory('all')" class="cat-btn px-4 py-2 rounded-full text-sm whitespace-nowrap transition ${currentCategory === 'all' ? 'active' : ''}">🏠 الكل</button>`;
            sortedCats.forEach(cat => {
                html += `<button onclick="filterByCategory('${cat.key}')" class="cat-btn px-4 py-2 rounded-full text-sm whitespace-nowrap transition ${currentCategory === cat.key ? 'active' : ''}">📁 ${escapeHtml(cat.name)}</button>`;
            });
            container.innerHTML = html;
        }
        
        function filterByCategory(categoryKey) {
            currentCategory = categoryKey;
            renderCategories();
            renderProducts();
        }
        
        function searchProducts() {
            currentSearch = document.getElementById('searchInput').value.trim().toLowerCase();
            renderProducts();
        }
        
        // عرض المنتجات
        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            const noResults = document.getElementById('noResults');
            
            let filtered = [...allProducts];
            
            // تصفية حسب القسم
            if (currentCategory !== 'all') {
                filtered = filtered.filter(p => p.category === currentCategory);
            }
            
            // تصفية حسب البحث
            if (currentSearch) {
                filtered = filtered.filter(p => p.name && p.name.toLowerCase().includes(currentSearch));
            }
            
            if (filtered.length === 0) {
                grid.classList.add('hidden');
                noResults.classList.remove('hidden');
                return;
            }
            
            grid.classList.remove('hidden');
            noResults.classList.add('hidden');
            
            grid.innerHTML = filtered.map(product => {
                const hasVideo = product.video && product.video.trim();
                return `
                    <div class="product-card">
                        <div class="media-box" onclick="handleMediaClick('${product.id}')">
                            <img src="${product.img || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22%3E%3Crect width=%22200%22 height=%22200%22 fill=%22%231a1a2e%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23d4af37%22%3E📦%3C/text%3E%3C/svg%3E'}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22%3E%3Crect width=%22200%22 height=%22200%22 fill=%22%231a1a2e%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23d4af37%22%3E📦%3C/text%3E%3C/svg%3E'">
                            ${hasVideo ? `
                                <div class="video-overlay">
                                    <i class="fas fa-play text-white text-3xl"></i>
                                </div>
                                <div class="absolute top-2 left-2 bg-[var(--gold)] text-black text-[9px] font-bold px-2 py-0.5 rounded-full flex items-center gap-1">
                                    <i class="fas fa-video text-[8px]"></i> فيديو
                                </div>
                            ` : ''}
                        </div>
                        <div class="p-3 text-center">
                            <h3 class="text-sm font-bold h-10 overflow-hidden line-clamp-2">${escapeHtml(product.name)}</h3>
                            <div class="text-[var(--gold)] text-base font-black my-2">${Number(product.price).toLocaleString()} د.ع</div>
                            <div class="flex gap-2">
                                <button onclick="openOrderModal('${product.id}')" class="btn-gold flex-1 py-2 rounded-lg text-xs font-bold"><i class="fab fa-whatsapp ml-1"></i> شراء</button>
                                <button onclick="showDetails('${product.id}')" class="btn-outline py-2 rounded-lg text-xs w-10"><i class="fas fa-info"></i></button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function handleMediaClick(productId) {
            const product = allProducts.find(p => p.id === productId);
            if (product && product.video && product.video.trim()) {
                playVideo(product.video);
            } else {
                showDetails(productId);
            }
        }
        
        function showDetails(productId) {
            const product = allProducts.find(p => p.id === productId);
            if (!product) return;
            document.getElementById('modalTitle').innerHTML = product.name;
            let desc = product.desc || 'لا توجد مواصفات';
            desc += `\n\n💰 السعر: ${Number(product.price).toLocaleString()} دينار عراقي`;
            document.getElementById('modalDesc').innerHTML = escapeHtml(desc).replace(/\n/g, '<br>');
            document.getElementById('detailsModal').style.display = 'flex';
        }
        
        function openOrderModal(productId) {
            selectedProduct = allProducts.find(p => p.id === productId);
            if (!selectedProduct) return;
            document.getElementById('orderProductInfo').innerHTML = `
                <div class="flex justify-between items-center">
                    <span class="font-bold">${escapeHtml(selectedProduct.name)}</span>
                    <span class="text-[var(--gold)] font-bold">${Number(selectedProduct.price).toLocaleString()} د.ع</span>
                </div>
            `;
            // تفريغ الحقول
            document.getElementById('custName').value = '';
            document.getElementById('custGov').value = '';
            document.getElementById('custCity').value = '';
            document.getElementById('custPhone').value = '';
            document.getElementById('custAddress').value = '';
            document.getElementById('orderModal').style.display = 'flex';
        }
        
        // شريط المنتجات المتحرك
        function renderMarquee() {
            const container = document.getElementById('marqueeSection');
            const track = document.getElementById('marqueeTrack');
            if (allProducts.length === 0) return;
            
            const items = allProducts.slice(0, 15).map(product => `
                <div class="marquee-item" onclick="showDetails('${product.id}')">
                    <img src="${product.img || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22%3E%3Crect width=%22200%22 height=%22200%22 fill=%22%231a1a2e%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23d4af37%22%3E📦%3C/text%3E%3C/svg%3E'}">
                    <span>${escapeHtml(product.name.substring(0, 25))}...</span>
                </div>
            `).join('');
            track.innerHTML = items + items;
            container.classList.remove('hidden');
        }
        
        // إرسال الطلب
        document.getElementById('orderForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('custName').value.trim();
            const governorate = document.getElementById('custGov').value;
            const city = document.getElementById('custCity').value.trim();
            const phone = document.getElementById('custPhone').value.trim();
            const address = document.getElementById('custAddress').value.trim();
            
            if (!name || !governorate || !city || !phone) {
                showToast('⚠️ الرجاء ملء جميع الحقول المطلوبة', true);
                return;
            }
            
            const orderData = {
                orderId: Date.now().toString(),
                customerName: name,
                governorate: governorate,
                city: city,
                phone: phone,
                address: address,
                productId: selectedProduct.id,
                productName: selectedProduct.name,
                productPrice: selectedProduct.price,
                status: 'جديد',
                createdAt: new Date().toISOString(),
                createdAtTimestamp: Date.now()
            };
            
            try {
                // حفظ الطلب في Firebase
                await db.ref('orders/' + orderData.orderId).set(orderData);
                
                // إرسال واتساب
                const adminWhatsapp = '9647730492020';
                let message = `🛍️ *طلب جديد - متجر أكاد*%0A%0A`;
                message += `📦 *المنتج:* ${selectedProduct.name}%0A`;
                message += `💰 *السعر:* ${Number(selectedProduct.price).toLocaleString()} د.ع%0A%0A`;
                message += `👤 *الاسم:* ${name}%0A`;
                message += `🏛️ *المحافظة:* ${governorate}%0A`;
                message += `📍 *المنطقة:* ${city}%0A`;
                message += `📱 *الهاتف:* ${phone}%0A`;
                if (address) message += `🏠 *العنوان:* ${address}%0A`;
                message += `%0A📅 ${new Date().toLocaleString('ar-IQ')}`;
                
                window.open(`https://wa.me/${adminWhatsapp}?text=${message}`, '_blank');
                showToast('✅ تم إرسال الطلب بنجاح!');
                closeModal('orderModal');
            } catch (error) {
                console.error(error);
                showToast('❌ فشل إرسال الطلب', true);
            }
        });
        
        // بدء التحميل
        loadData();
    </script>
</body>
</html>
