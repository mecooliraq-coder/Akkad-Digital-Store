<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر أكاد الرقمي | Akkad Digital Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        
        body { 
            font-family: 'Tajawal', sans-serif; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a); 
            color: white; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* شريط المنتجات المتحرك */
        .ticker-wrapper {
            overflow: hidden;
            white-space: nowrap;
            background: rgba(30, 41, 59, 0.8);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
        }
        .ticker-content {
            display: inline-block;
            white-space: nowrap;
            padding-right: 100%;
            animation: ticker 40s linear infinite;
        }
        @keyframes ticker {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        .ticker-item {
            display: inline-block;
            padding: 10px 25px;
            font-size: 13px;
            color: #60a5fa;
            font-weight: bold;
        }

        /* كروت المنتجات الزجاجية */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover {
            transform: translateY(-12px);
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
        }

        /* زر واتساب المتوهج */
        .wa-glow {
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.3);
            animation: pulse-wa 2s infinite;
        }
        @keyframes pulse-wa {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); box-shadow: 0 0 25px rgba(34, 197, 94, 0.5); }
            100% { transform: scale(1); }
        }

        /* مودال الفيديو */
        #videoModal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.92); 
            z-index: 1000; 
            align-items: center; 
            justify-content: center; 
            backdrop-filter: blur(10px); 
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 bg-slate-900/90 backdrop-blur-xl border-b border-white/5 shadow-2xl">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center mb-5">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                        <i class="fas fa-satellite text-2xl text-white"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl font-bold tracking-tight">AKKAD <span class="text-blue-500">DIGITAL</span></h1>
                        <p class="text-[9px] text-gray-400 uppercase tracking-[0.2em] font-bold">The Future of Media</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <span class="hidden md:block text-[10px] text-blue-400 bg-blue-500/10 px-3 py-1 rounded-full border border-blue-500/20 italic">توصيل لكافة محافظات العراق</span>
                    <a href="https://wa.me/9647730492020" class="text-green-500 hover:scale-110 transition-transform">
                        <i class="fab fa-whatsapp text-3xl"></i>
                    </a>
                </div>
            </div>

            <div class="relative group max-w-2xl mx-auto">
                <input type="text" id="searchInput" onkeyup="searchProducts()" 
                    class="w-full bg-white/5 border border-white/10 rounded-2xl py-3 px-12 outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all placeholder:text-gray-500 text-sm"
                    placeholder="ابحث عن أجهزة TV BOX، ستلايت، أو مراجعات...">
                <i class="fas fa-search absolute right-5 top-4 text-gray-500"></i>
            </div>
        </div>

        <div id="categories-nav" class="flex gap-3 px-4 py-3 overflow-x-auto scrollbar-hide bg-slate-900/40 border-t border-white/5">
            </div>
    </nav>

    <div class="ticker-wrapper">
        <div id="product-ticker" class="ticker-content text-right">
            جاري تحميل آخر الأجهزة والأسعار من متجر أكاد... 
        </div>
    </div>

    <main class="container mx-auto px-4 py-10">
        <div id="products-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 md:gap-8">
            </div>
    </main>

    <div id="videoModal" onclick="closeVideo()">
        <div class="relative w-[95%] max-w-4xl aspect-video rounded-3xl overflow-hidden shadow-2xl border border-white/10" onclick="event.stopPropagation()">
            <iframe id="ytPlayer" class="w-full h-full" src="" frameborder="0" allowfullscreen allow="autoplay"></iframe>
            <button class="absolute top-5 left-5 bg-black/50 hover:bg-red-600 w-10 h-10 rounded-full flex items-center justify-center transition-all" onclick="closeVideo()">
                <i class="fas fa-times text-white"></i>
            </button>
        </div>
    </div>

    <footer class="py-12 text-center border-t border-white/5">
        <div class="opacity-30 text-[10px] uppercase tracking-widest">
            <p>© 2026 Akkad Digital Store Iraq</p>
            <p class="mt-2">Professional IPTV & TV Box Solutions</p>
        </div>
    </footer>

    <script>
        // إعدادات Firebase
        const firebaseConfig = { databaseURL: "https://akkad-store-ab5a1-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myPhone = "9647730492020";
        let allProducts = [];

        // 1. جلب الأقسام
        db.ref('categories').on('value', snap => {
            const cats = snap.val();
            const nav = document.getElementById('categories-nav');
            nav.innerHTML = `<button onclick="filterByCat('all')" class="bg-blue-600 px-6 py-1.5 rounded-xl text-xs font-bold shadow-lg shadow-blue-600/30 whitespace-nowrap">الكل</button>`;
            for(let key in cats) {
                nav.innerHTML += `<button onclick="filterByCat('${cats[key]}')" class="bg-white/5 border border-white/5 px-6 py-1.5 rounded-xl text-xs hover:bg-white/10 transition-all whitespace-nowrap font-medium text-gray-300">${cats[key]}</button>`;
            }
        });

        // 2. جلب المنتجات وتحديث الشريط المتحرك
        db.ref('products').on('value', snap => {
            const data = snap.val();
            allProducts = data ? Object.entries(data).map(([id, val]) => ({id, ...val})).reverse() : [];
            
            // تحديث الواجهة
            displayProducts(allProducts);
            
            // تحديث الشريط العلوي
            const ticker = document.getElementById('product-ticker');
            if(allProducts.length > 0) {
                ticker.innerHTML = allProducts.map(p => `
                    <span class="ticker-item">
                        <i class="fas fa-bolt ml-2 text-yellow-500"></i> ${p.name} 
                        <span class="text-white mr-2">(${p.price} د.ع)</span>
                        <span class="mx-6 opacity-20">|</span>
                    </span>
                `).join('');
            }
        });

        // 3. عرض المنتجات في الشبكة
        function displayProducts(items) {
            const grid = document.getElementById('products-grid');
            if (items.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-20 text-center opacity-40">لم يتم العثور على نتائج..</div>`;
                return;
            }
            grid.innerHTML = items.map((p, index) => `
                <div class="glass-card rounded-[2.5rem] p-5 flex flex-col group relative overflow-hidden">
                    ${index < 4 ? '<div class="absolute -top-1 -left-1 bg-gradient-to-br from-red-500 to-pink-600 text-[9px] font-bold px-4 py-1.5 rounded-br-2xl shadow-lg z-10 uppercase tracking-widest border-b border-r border-white/20">NEW</div>' : ''}
                    
                    <div class="h-44 mb-6 bg-white/5 rounded-3xl flex items-center justify-center p-5 relative overflow-hidden">
                        <img src="${p.img || 'https://via.placeholder.com/200'}" class="max-h-full max-w-full object-contain group-hover:scale-110 transition-transform duration-700 z-10">
                        <div class="absolute inset-0 bg-blue-600/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                        
                        ${p.video ? `
                            <button onclick="openVideo('${p.video}')" class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-all duration-300 flex items-center justify-center z-20 backdrop-blur-sm">
                                <div class="w-14 h-14 bg-red-600 rounded-full flex items-center justify-center shadow-2xl scale-75 group-hover:scale-100 transition-transform">
                                    <i class="fas fa-play text-white ml-1"></i>
                                </div>
                                <span class="absolute bottom-4 text-[10px] font-bold text-white tracking-widest">مشاهدة المراجعة</span>
                            </button>
                        ` : ''}
                    </div>

                    <div class="flex-1 px-1">
                        <span class="text-[10px] text-blue-400 font-bold uppercase tracking-widest mb-2 block opacity-60">${p.cat || 'أجهزة ذكية'}</span>
                        <h3 class="font-bold text-sm text-gray-100 mb-4 line-clamp-2 h-10 leading-relaxed">${p.name}</h3>
                        <div class="flex items-end gap-1 mb-6">
                            <span class="text-2xl font-bold text-white tracking-tighter">${p.price}</span>
                            <span class="text-[10px] text-gray-500 mb-1 uppercase font-bold">د.ع</span>
                        </div>
                    </div>

                    <a href="https://wa.me/${myPhone}?text=سلام عليكم، أرغب بطلب المنتج التالي من متجر أكاد: %0A ${p.name}" target="_blank" 
                       class="wa-glow w-full bg-green-600 hover:bg-green-500 text-white py-4 rounded-2xl flex items-center justify-center gap-3 transition-all active:scale-95 shadow-xl shadow-green-900/20">
                        <i class="fab fa-whatsapp text-xl"></i> 
                        <span class="text-xs font-bold">اطلب الآن</span>
                    </a>
                </div>
            `).join('');
        }

        // وظائف ميكانيكية
        function openVideo(id) {
            document.getElementById('ytPlayer').src = `https://www.youtube.com/embed/${id}?autoplay=1&rel=0&modestbranding=1`;
            document.getElementById('videoModal').style.display = 'flex';
        }

        function closeVideo() {
            document.getElementById('ytPlayer').src = "";
            document.getElementById('videoModal').style.display = 'none';
        }

        function searchProducts() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allProducts.filter(p => p.name.toLowerCase().includes(term) || (p.cat && p.cat.toLowerCase().includes(term)));
            displayProducts(filtered);
        }

        function filterByCat(category) {
            displayProducts(category === 'all' ? allProducts : allProducts.filter(p => p.cat === category));
        }
    </script>
</body>
</html>
