        :root {

        /* 1. الخلفية المسمارية المتحركة */
        #cuneiform-background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; pointer-events: none;
            background: radial-gradient(circle at center, #141a1f 0%, #0a0f12 100%);
        }
        .cuneiform-char {
            position: absolute; color: var(--cuneiform-glow);
            user-select: none; animation: floatUp linear infinite;
            font-family: 'serif';
        }
        @keyframes floatUp {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }

        /* 2. شريط المنتجات المتداول Marquee */
        #marquee-container {
            background: rgba(212, 175, 55, 0.05);
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            padding: 10px 0;
            overflow: hidden;
            position: relative;
            z-index: 10;
        }
        #marquee-track {
            display: flex;
            gap: 15px;
            animation: marqueeScroll 25s linear infinite;
            width: fit-content;
        }
        #marquee-track:hover { animation-play-state: paused; }
        @keyframes marqueeScroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(50%); } /* للاتجاه RTL */
        }
        .marquee-item {
            width: 120px; flex-shrink: 0; background: rgba(255,255,255,0.03);
            border-radius: 8px; padding: 5px; text-align: center;
        }

        /* 3. تنسيق بطاقة المنتج و أيقونة الفيديو */
        .akkad-card { 
            background: rgba(20, 26, 31, 0.8); backdrop-filter: blur(10px); 
            border: 1px solid rgba(212, 175, 55, 0.15); 
            border-radius: 1rem; transition: 0.4s; overflow: hidden;
            z-index: 10; position: relative;
        }
        .akkad-card:hover { border-color: var(--akkad-gold); transform: translateY(-3px); }

        .product-media-container { height: 160px; overflow: hidden; position: relative; }
        .product-media-container img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .akkad-card:hover .product-media-container img { transform: scale(1.05); }

        /* أيقونة الفيديو عند التمرير */
        .video-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: 0.3s; z-index: 5;
        }
        .akkad-card:hover .video-overlay.has-video { opacity: 1; }
        
        .btn-akkad {

        .modal {

            background: rgba(0, 0, 0, 0.95); z-index: 1000;
            align-items: center; justify-content: center; backdrop-filter: blur(10px);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
