<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر أكاد | AKKAD STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Amiri:wght@700&display=swap');
        
        :root {
            --akkad-dark: #030508;
            --akkad-gold: #c9a961;
            --neon-cyan: #00f2ff;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--akkad-dark);
            color: #fff;
            background-image: radial-gradient(circle at top, #0a1018, #030508);
            min-height: 100vh;
        }

        .gold-text { font-family: 'Amiri', serif; color: var(--akkad-gold); }
        
        /* تصميم كرت المنتج */
        .product-card {
            background: rgba(15, 26, 36, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(201, 169, 97, 0.15);
            border-radius: 1.5rem;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .product-card:hover {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.15);
            transform: translateY(-5px);
        }

        /* الأزرار المنفصلة */
        .btn-details {
            border: 1px solid var(--akkad-gold);
            color: var(--akkad-gold);
            font-size: 0.75rem;
            padding: 0.5rem;
            border-radius: 0.75rem;
            transition: 0.3s;
        }
        .btn-details:hover { background: var(--akkad-gold); color: #000; }

        .btn-order {
            background: linear-gradient(135deg, var(--neon-cyan), #00a8b5);
            color: #000;
            font-size: 0.75rem;
            font-weight: bold;
            padding: 0.5rem;
            border-radius: 0.75rem;
            box-shadow: 0 4px 10px rgba(0, 242, 255, 0.2);
        }

        /* المودال (النافذة المنبثقة) */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .modal-content {
            background: #0a0f18;
            border: 1px solid rgba(255,255,255,0.1);
            width: 100%;
            max-width: 500px;
            border-radius: 2rem;
            position: relative;
            animation: scaleUp 0.3s ease-out;
        }

        @keyframes scaleUp { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <header class="py-12 text-center border-b border-white/5 bg-black/20">
        <h1 class="text-5xl md:text-6xl gold-text tracking-widest mb-2">AKKAD</h1>
        <p class="text-cyan-400 text-[10px] tracking-[0.6em] uppercase">The Digital Civilization</p>
    </header>

    <nav id="catNav" class="flex justify-center gap-3 py-6 sticky top-0 bg-[#030508]/90 z-50 overflow-x-auto px-4 no-scrollbar">
        </nav>

    <main class="max-w-7xl mx-auto p-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6" id="productsGrid">
        </main>

    <div id="detailsModal" class="modal-overlay">
        <div class="modal-content overflow-hidden">
            <div id="detailsBody"></div>
            <button onclick="closeModals()" class="absolute top-4 left-4 text-white/50 hover:text-white text-xl">✕</button>
        </div>
    </div>

    <div id="orderModal" class="modal-overlay">
        <div class="modal-content p-8">
            <h3 class="text-2xl gold-text mb-6 text-center">استمارة طلب سريع</h3>
            <form id="quickOrderForm" class="space-y-4">
                <input type="hidden" id="targetProduct">
                <div>
                    <label class="text-xs text-gray-400 block mb-1 mr-2">الاسم الكامل</label>
                    <input type="text" id="custName" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl outline-none focus:border-cyan-400 text-sm" required>
                </div>
                <div>
                    <label class="text-xs text-gray-400 block mb-1 mr-2">رقم الهاتف</label>
                    <input type="tel" id="custPhone" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl outline-none focus:border-cyan-400 text-sm text-left" dir="ltr" placeholder="07XXXXXXXX" required>
                </div>
                <div>
                    <label class="text-xs text-gray-400 block mb-1 mr-2">العنوان بالتفصيل</label>
                    <textarea id="custAddress" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl outline-none focus:border-cyan-400 text-sm h-20" required></textarea>
                </div>
                <button type="submit" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-4 rounded-xl transition flex items-center justify-center gap-2">
                    <i class="fab fa-whatsapp text-xl"></i> إرسال الطلب عبر واتساب
                </button>
                <button type="button" onclick="closeModals()" class="w-full text-gray-500 text-xs mt-2">إلغاء الأمر</button>
            </form>
        </div>
    </div>

    <script>
        // إعدادات Firebase من لوحتك
        const firebaseConfig = {
            apiKey: "AIzaSyAEH25yJ-pwfgFUMjLZNgDyNqw8Rcv9S6E",
            authDomain: "akkad-store-ab5a1.firebaseapp.com",
            databaseURL: "https://akkad-store-ab5a1-default-rtdb.firebaseio.com",
            projectId: "akkad-store-ab5a1",
            storageBucket: "akkad-store-ab5a1.firebasestorage.app",
            messagingSenderId: "456810444639",
            appId: "1:456810444639:web:a706dc19781cd7738e28ea"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allProducts = [];
        let activeCategory = "الكل";

        // 1. جلب الأقسام والمنتجات
        function initStore() {
            db.ref('categories').on('value', snap => {
                const cats = snap.val() || {};
                renderNav(["الكل", ...Object.values(cats)]);
            });

            db.ref('products').on('value', snap => {
                const data = snap.val() || {};
                allProducts = Object.entries(data).map(([id, val]) => ({ id, ...val }));
                renderProducts();
            });
        }

        // 2. عرض القائمة العلوية
        function renderNav(list) {
            const nav = document.getElementById('catNav');
            nav.innerHTML = list.map(c => `
                <button onclick="setCategory('${c}')" 
                        class="px-5 py-2 rounded-full text-xs font-bold transition-all whitespace-nowrap
                        ${activeCategory === c ? 'bg-[var(--akkad-gold)] text-black' : 'bg-white/5 text-gray-400 border border-white/5'}">
                    ${c}
                </button>
            `).join('');
        }

        function setCategory(c) {
            activeCategory = c;
            renderProducts();
            // تحديث شكل الأزرار
            db.ref('categories').once('value', s => renderNav(["الكل", ...Object.values(s.val() || {})]));
        }

        // 3. عرض المنتجات (مع حل مشكلة الصورة والزر المنفصل)
        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            const filtered = activeCategory === "الكل" ? allProducts : allProducts.filter(p => p.category === activeCategory);
            
            grid.innerHTML = filtered.map(p => `
                <div class="product-card flex flex-col">
                    <div class="relative overflow-hidden group">
                        <img src="${p.pImg || p.image || 'https://via.placeholder.com/400x400/111/c9a961?text=Akkad+Product'}" 
                             class="w-full h-64 object-cover transition duration-500 group-hover:scale-110"
                             onerror="this.src='https://via.placeholder.com/400x400/111/c9a961?text=No+Image'">
                    </div>
                    <div class="p-5 flex flex-col flex-grow">
                        <h3 class="text-lg font-bold text-gray-100 mb-1">${p.pName || p.name}</h3>
                        <div class="text-[var(--neon-cyan)] font-bold text-xl mb-4">
                            ${Number(p.pPrice || p.price).toLocaleString()} <span class="text-[10px]">د.ع</span>
                        </div>
                        <div class="grid grid-cols-2 gap-2 mt-auto">
                            <button onclick="showDetails('${p.id}')" class="btn-details">قراءة التفاصيل</button>
                            <button onclick="openOrderForm('${p.pName || p.name}')" class="btn-order">طلب سريع</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 4. نافذة التفاصيل
        function showDetails(id) {
            const p = allProducts.find(x => x.id === id);
            document.getElementById('detailsBody').innerHTML = `
                <img src="${p.pImg || p.image}" class="w-full h-64 object-cover">
                <div class="p-6">
                    <h2 class="text-2xl gold-text mb-2">${p.pName || p.name}</h2>
                    <p class="text-gray-400 text-sm leading-relaxed mb-6">${p.pDesc || p.description || 'لا يوجد وصف متاح.'}</p>
                    <div class="flex justify-between items-center border-t border-white/5 pt-4">
                        <span class="text-2xl font-bold">${Number(p.pPrice || p.price).toLocaleString()} د.ع</span>
                        <button onclick="closeModals(); openOrderForm('${p.pName || p.name}')" class="btn-order px-8">اطلب الآن</button>
                    </div>
                </div>
            `;
            document.getElementById('detailsModal').style.display = 'flex';
        }

        // 5. نظام الطلب السريع
        function openOrderForm(name) {
            document.getElementById('targetProduct').value = name;
            document.getElementById('orderModal').style.display = 'flex';
        }

        function closeModals() {
            document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none');
        }

        document.getElementById('quickOrderForm').onsubmit = (e) => {
            e.preventDefault();
            const prod = document.getElementById('targetProduct').value;
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const addr = document.getElementById('custAddress').value;

            const message = `طلب جديد من المتجر:
---
المنتج: ${prod}
اسم الزبون: ${name}
رقم الهاتف: ${phone}
العنوان: ${addr}
---
تم الطلب عبر الموقع الرسمي.`;

            const whatsappUrl = `https://wa.me/9647800000000?text=${encodeURIComponent(message)}`;
            window.open(whatsappUrl, '_blank');
            closeModals();
        };

        // إغلاق عند الضغط خارج النافذة
        window.onclick = (e) => {
            if (e.target.classList.contains('modal-overlay')) closeModals();
        };

        initStore();
    </script>
</body>
</html>
