<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر أكاد الرقمي | Akkad Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; scroll-behavior: smooth; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50">
    <nav class="bg-slate-900 text-white shadow-2xl sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="fas fa-satellite-dish text-blue-400 text-2xl"></i>
                <h1 class="text-xl font-bold tracking-wide">متجر أكاد الرقمي</h1>
            </div>
            <a href="https://wa.me/9647730492020" class="text-green-400 hover:scale-110 transition"><i class="fab fa-whatsapp text-2xl"></i></a>
        </div>
        <div id="categories-nav" class="bg-slate-800 flex gap-4 px-4 py-3 overflow-x-auto scrollbar-hide border-t border-slate-700">
            <button onclick="filterByCat('all')" class="bg-blue-600 px-5 py-1 rounded-full whitespace-nowrap text-sm">الكل</button>
        </div>
    </nav>

    <div class="bg-gradient-to-b from-slate-900 to-blue-900 text-white py-12 text-center px-4">
        <h2 class="text-3xl font-bold mb-2">أحدث تقنيات الترفيه المنزلي</h2>
        <p class="opacity-70 text-sm">أجهزة TV Box، ستلايت، وإكسسوارات بأفضل الأسعار</p>
    </div>

    <main class="container mx-auto px-4 py-10">
        <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            </div>
    </main>

    <script>
        const firebaseConfig = { databaseURL: "https://akkad-store-ab5a1-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myPhone = "9647730492020"; 
        let allProducts = [];

        // Fetch Categories
        db.ref('categories').on('value', snap => {
            const cats = snap.val();
            const nav = document.getElementById('categories-nav');
            nav.innerHTML = `<button onclick="filterByCat('all')" class="bg-blue-600 px-5 py-1 rounded-full whitespace-nowrap text-sm text-white">الكل</button>`;
            for(let key in cats) {
                nav.innerHTML += `<button onclick="filterByCat('${cats[key]}')" class="bg-slate-700 hover:bg-blue-500 px-5 py-1 rounded-full whitespace-nowrap text-sm text-white transition">${cats[key]}</button>`;
            }
        });

        // Fetch Products
        db.ref('products').on('value', snap => {
            const data = snap.val();
            allProducts = data ? Object.entries(data).map(([id, val]) => ({id, ...val})) : [];
            displayProducts(allProducts);
        });

        function displayProducts(items) {
            const grid = document.getElementById('products-grid');
            if (items.length === 0) {
                grid.innerHTML = `<p class="text-center col-span-full py-20 text-gray-400">لا توجد منتجات حالياً.</p>`;
                return;
            }
            grid.innerHTML = items.map(p => `
                <div class="bg-white rounded-2xl shadow-sm hover:shadow-2xl transition-all duration-300 overflow-hidden border border-gray-100 flex flex-col">
                    <div class="h-52 bg-gray-50 flex items-center justify-center p-4">
                        <img src="${p.img || 'https://via.placeholder.com/200'}" class="max-h-full max-w-full object-contain">
                    </div>
                    <div class="p-5 flex-1 flex flex-col">
                        <span class="text-blue-500 text-xs font-bold mb-1">${p.cat || 'عام'}</span>
                        <h3 class="font-bold text-slate-800 text-lg mb-4 h-14 overflow-hidden">${p.name}</h3>
                        <div class="mt-auto">
                            <div class="text-2xl font-bold text-slate-900 mb-4">${p.price} <span class="text-sm font-normal text-gray-500">د.ع</span></div>
                            <a href="https://wa.me/${myPhone}?text=سلام عليكم، أرغب بطلب: ${p.name}" target="_blank" 
                               class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2 transition active:scale-95">
                                <i class="fab fa-whatsapp text-xl"></i> اطلب الآن
                            </a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterByCat(category) {
            const filtered = category === 'all' ? allProducts : allProducts.filter(p => p.cat === category);
            displayProducts(filtered);
        }
    </script>
</body>
</html>
