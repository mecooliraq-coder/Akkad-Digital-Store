<script>
        const firebaseConfig = {
            databaseURL: "https://akkad-store-ab5a1-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function displayProducts(items) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = items.map(p => `
                <div class="bg-white rounded-2xl shadow-sm p-4 border border-gray-100">
                    <div class="h-48 bg-gray-50 rounded-xl mb-4 flex items-center justify-center overflow-hidden">
                        <img src="${p.img || 'https://via.placeholder.com/150'}" class="h-full object-contain">
                    </div>
                    <span class="text-xs font-bold text-blue-500 uppercase">${p.cat}</span>
                    <h3 class="text-lg font-bold text-slate-800">${p.name}</h3>
                    <div class="flex justify-between items-center mt-6">
                        <span class="text-xl font-bold text-slate-900">${p.price} د.ع</span>
                        <button class="bg-blue-600 text-white w-10 h-10 rounded-full">+</button>
                    </div>
                </div>
            `).join('');
        }

        // جلب البيانات من Firebase
        db.ref('products').on('value', (snapshot) => {
            const data = snapshot.val();
            const productList = data ? Object.values(data) : [];
            displayProducts(productList);
        });
    </script>
