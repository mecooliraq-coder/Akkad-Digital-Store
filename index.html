<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>أكاد | متجر بلاد الرافدين الرقمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background: #0a0f12;
            color: #e0d6c0;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* الخلفية والأنماط المسمارية الخفيفة */
        .bg-pattern {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 30%, rgba(212, 175, 55, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(212, 175, 55, 0.04) 0%, transparent 40%),
                repeating-linear-gradient(45deg, rgba(139, 90, 43, 0.02) 0px, rgba(139, 90, 43, 0.02) 2px, transparent 2px, transparent 8px);
            animation: slowZoom 20s ease-in-out infinite alternate;
        }
        
        @keyframes slowZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        .product-card {
            background: rgba(20, 26, 31, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 1.25rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        .product-card:hover {
            transform: translateY(-8px);
            border-color: #d4af37;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.1);
        }

        .media-box { height: 180px; position: relative; overflow: hidden; background: #000; }
        .media-box img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .product-card:hover .media-box img { transform: scale(1.1); }

        .btn-gold { background: linear-gradient(135deg, #d4af37, #b8942e); color: #0a0f12; font-weight: 700; transition: 0.3s; }
        .btn-gold:hover { transform: scale(1.02); box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3); }

        /* شريط الصور المتحركة المحسن */
        .marquee-section { padding: 20px 0; overflow: hidden; background: rgba(212, 175, 55, 0.03); border-y: 1px solid rgba(212, 175, 55, 0.1); }
        .marquee-track { display: flex; gap: 20px; width: max-content; animation: scrollMarquee 40s linear infinite; }
        @keyframes scrollMarquee {
            from { transform: translateX(0); }
            to { transform: translateX(50%); }
        }
        .marquee-item { width: 220px; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 15px; border: 1px solid rgba(212, 175, 55, 0.1); display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .marquee-item img { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; }

        .cat-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(212, 175, 55, 0.2); padding: 8px 16px; border-radius: 50px; white-space: nowrap; transition: 0.3s; font-size: 14px; }
        .cat-btn.active { background: #d4af37; color: #0a0f12; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-content { background: #141a1f; border-radius: 20px; padding: 25px; width: 90%; max-width: 450px; border: 1px solid #d4af37; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>

    <nav class="sticky top-0 z-50 bg-[#0a0f12]/90 backdrop-blur-md border-b border-[#d4af37]/30">
        <div class="container mx-auto px-4 py-3">
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-3">
                    <img src="https://dso5.raed.net:449/files/Gemini-Generated-Image-wgpl90wgpl90wgpl.png" class="w-12 h-12 rounded-full border-2 border-[#d4af37]">
                    <div>
                        <h1 class="text-[#d4af37] font-bold text-lg leading-none">أَكَّد</h1>
                        <span class="text-[8px] text-white/50 tracking-widest uppercase">Akkad Store</span>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="toggleCart()" class="relative w-10 h-10 bg-white/5 rounded-full flex items-center justify-center border border-white/10">
                        <i class="fas fa-shopping-basket"></i>
                        <span id="cartCount" class="absolute -top-1 -right-1 bg-[#d4af37] text-[#0a0f12] text-[10px] font-bold w-5 h-5 rounded-full hidden flex items-center justify-center">0</span>
                    </button>
                    <a href="https://wa.me/9647730492020" class="w-10 h-10 bg-[#25D366] rounded-full flex items-center justify-center shadow-lg"><i class="fab fa-whatsapp"></i></a>
                </div>
            </div>
            <div id="categoriesContainer" class="flex gap-2 overflow-x-auto no-scrollbar pb-2"></div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-4">
        <!-- قسم الصور المتحركة -->
        <div id="marqueeSection" class="marquee-section hidden mb-8">
            <h3 class="text-xs font-bold text-[#d4af37] mb-3 px-2 flex items-center gap-2">
                <span class="w-2 h-2 bg-[#d4af37] rounded-full animate-pulse"></span> أبرز العروض الذكية
            </h3>
            <div class="marquee-track" id="marqueeTrack"></div>
        </div>

        <div id="loadingScreen" class="text-center py-20">
            <div class="w-10 h-10 border-4 border-[#d4af37]/20 border-t-[#d4af37] rounded-full animate-spin mx-auto mb-4"></div>
            <p class="text-white/40">جاري استدعاء البيانات...</p>
        </div>

        <div id="productsGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 hidden"></div>
    </main>

    <!-- مودال الطلب السريع -->
    <div id="orderModal" class="modal" onclick="closeModal('orderModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 class="text-lg font-bold text-[#d4af37] mb-4">تأكيد الطلب السريع</h3>
            <div id="orderProductInfo" class="bg-white/5 p-3 rounded-lg mb-4 text-sm"></div>
            <form id="orderForm" class="space-y-3">
                <input type="text" id="custName" placeholder="الاسم الكامل" class="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-white outline-none focus:border-[#d4af37]" required>
                <select id="custGov" class="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-white outline-none focus:border-[#d4af37]" required>
                    <option value="">اختر المحافظة</option>
                    <option>بغداد</option><option>البصرة</option><option>نينوى</option><option>أربيل</option><option>النجف</option><option>كربلاء</option><option>بابل</option><option>ذي قار</option><option>كركوك</option><option>الأنبار</option><option>ديالى</option><option>المثنى</option><option>القادسية</option><option>ميسان</option><option>واسط</option><option>صلاح الدين</option><option>دهوك</option><option>السليمانية</option>
                </select>
                <input type="text" id="custCity" placeholder="المنطقة / القضاء" class="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-white outline-none focus:border-[#d4af37]" required>
                <input type="text" id="custPoint" placeholder="أقرب نقطة دالة" class="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-white outline-none focus:border-[#d4af37]" required>
                <input type="tel" id="custPhone" placeholder="رقم الهاتف" class="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-white outline-none focus:border-[#d4af37]" required>
                <button type="submit" class="btn-gold w-full py-4 rounded-xl shadow-xl mt-2">إرسال الطلب عبر واتساب</button>
            </form>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAEH25yJ-pwfgFUMjLZNgDyNqw8Rcv9S6E",
            authDomain: "akkad-store-ab5a1.firebaseapp.com",
            databaseURL: "https://akkad-store-ab5a1-default-rtdb.firebaseio.com",
            projectId: "akkad-store-ab5a1",
            storageBucket: "akkad-store-ab5a1.firebasestorage.app",
            messagingSenderId: "456810444639",
            appId: "1:456810444639:web:a706dc19781cd7738e28ea"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allProducts = [], categories = {}, currentCategory = 'all', selectedProduct = null;

        async function loadData() {
            try {
                const [catsSnap, prodsSnap] = await Promise.all([
                    db.ref('categories').once('value'),
                    db.ref('products').once('value')
                ]);
                
                categories = catsSnap.val() || {};
                const prodsData = prodsSnap.val() || {};
                allProducts = Object.entries(prodsData).map(([id, data]) => ({ id, ...data }));

                document.getElementById('loadingScreen').classList.add('hidden');
                document.getElementById('productsGrid').classList.remove('hidden');
                
                renderCategories();
                renderProducts();
                renderMarquee();
            } catch (e) {
                console.error(e);
                alert("عذراً، حدث خطأ في الاتصال بالسيرفر");
            }
        }

        function renderCategories() {
            const container = document.getElementById('categoriesContainer');
            // فرز الأقسام حسب الأرقام في البداية (مثال: 01_هواتف)
            const sortedKeys = Object.keys(categories).sort((a, b) => a.localeCompare(b, undefined, {numeric: true}));
            
            let html = `<button onclick="filterCat('all')" class="cat-btn ${currentCategory==='all'?'active':''}">الكل</button>`;
            sortedKeys.forEach(key => {
                const cleanName = categories[key].replace(/^\d+_/, '');
                html += `<button onclick="filterCat('${key}')" class="cat-btn ${currentCategory===key?'active':''}"> ${cleanName} </button>`;
            });
            container.innerHTML = html;
        }

        function renderMarquee() {
            const track = document.getElementById('marqueeTrack');
            const section = document.getElementById('marqueeSection');
            const topProducts = allProducts.slice(0, 10); // عرض أول 10 منتجات

            if(topProducts.length > 0) {
                let itemsHtml = topProducts.map(p => `
                    <div class="marquee-item">
                        <img src="${p.img}">
                        <div>
                            <div class="text-[10px] font-bold text-white truncate w-32">${p.name}</div>
                            <div class="text-[10px] text-[#d4af37]">${Number(p.price).toLocaleString()} د.ع</div>
                        </div>
                    </div>
                `).join('');
                track.innerHTML = itemsHtml + itemsHtml; // مضاعفة العناصر لضمان استمرارية الحركة
                section.classList.remove('hidden');
            }
        }

        function filterCat(key) {
            currentCategory = key;
            renderCategories();
            renderProducts();
        }

        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            const filtered = allProducts.filter(p => currentCategory === 'all' || p.category === currentCategory);
            
            grid.innerHTML = filtered.map(p => `
                <div class="product-card">
                    <div class="media-box">
                        <img src="${p.img}" loading="lazy">
                    </div>
                    <div class="p-3">
                        <h3 class="text-xs font-bold line-clamp-2 mb-2 h-8">${p.name}</h3>
                        <div class="text-[#d4af37] font-black mb-3">${Number(p.price).toLocaleString()} <span class="text-[10px]">د.ع</span></div>
                        <button onclick="openOrder('${p.id}')" class="btn-gold w-full py-2 rounded-lg text-xs">اطلب الآن</button>
                    </div>
                </div>
            `).join('');
        }

        function openOrder(id) {
            selectedProduct = allProducts.find(p => p.id === id);
            document.getElementById('orderProductInfo').innerHTML = `
                <div class="flex justify-between font-bold">
                    <span>${selectedProduct.name}</span>
                    <span class="text-[#d4af37]">${Number(selectedProduct.price).toLocaleString()} د.ع</span>
                </div>
            `;
            document.getElementById('orderModal').style.display = 'flex';
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        document.getElementById('orderForm').onsubmit = (e) => {
            e.preventDefault();
            const name = document.getElementById('custName').value;
            const gov = document.getElementById('custGov').value;
            const city = document.getElementById('custCity').value;
            const point = document.getElementById('custPoint').value;
            const phone = document.getElementById('custPhone').value;

            const message = `🛍️ *طلب شراء جديد من متجر أكاد*%0A%0A` +
                            `📦 *المنتج:* ${selectedProduct.name}%0A` +
                            `💰 *السعر:* ${Number(selectedProduct.price).toLocaleString()} د.ع%0A%0A` +
                            `👤 *الاسم:* ${name}%0A` +
                            `🏛️ *المحافظة:* ${gov}%0A` +
                            `📍 *المنطقة:* ${city}%0A` +
                            `🚩 *أقرب نقطة دالة:* ${point}%0A` +
                            `📱 *الهاتف:* ${phone}%0A%0A` +
                            `-- تم الإرسال عبر النظام الرقمي --`;

            window.open(`https://wa.me/9647730492020?text=${message}`, '_blank');
            closeModal('orderModal');
        };

        window.onload = loadData;
    </script>
</body>
</html>
