<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر أكاد | عراقة وجمال</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Amiri:wght@700&display=swap');
        
        :root {
            --akkad-dark: #05070a;
            --akkad-gold: #c9a961;
            --neon-cyan: #00f2ff;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--akkad-dark);
            color: #fff;
            background-image: radial-gradient(circle at top, #0a1018, #05070a);
        }

        .gold-text { font-family: 'Amiri', serif; color: var(--akkad-gold); }
        
        .product-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(201, 169, 97, 0.15);
            border-radius: 20px;
            overflow: hidden;
            transition: 0.3s;
        }

        .product-card:hover {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
            transform: translateY(-5px);
        }

        .btn-neon {
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            transition: 0.3s;
        }

        .btn-neon:hover {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        .btn-gold {
            border: 1px solid var(--akkad-gold);
            color: var(--akkad-gold);
        }

        .btn-gold:hover {
            background: var(--akkad-gold);
            color: #000;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <header class="py-10 text-center border-b border-white/5 bg-[#080a0f]">
        <div class="flex flex-col items-center">
            <h1 class="text-5xl gold-text mb-2">مـتـجـر أكاد</h1>
            <div class="h-1 w-24 bg-gradient-to-r from-transparent via-[var(--akkad-gold)] to-transparent"></div>
            <p class="text-cyan-400 text-xs tracking-widest mt-3 uppercase">Ancient Spirit - Digital Style</p>
        </div>
    </header>

    <nav id="catNav" class="flex justify-center gap-4 py-6 overflow-x-auto px-4 sticky top-0 bg-[#05070a]/90 z-50">
        </nav>

    <main class="max-w-7xl mx-auto p-6 grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-8" id="productsContainer">
        </main>

    <div id="detailsModal" class="modal p-4">
        <div class="bg-[#0f141d] max-w-2xl w-full rounded-3xl overflow-hidden relative border border-white/10">
            <div id="detailsContent"></div>
            <button onclick="closeModals()" class="absolute top-4 right-4 bg-black/50 w-10 h-10 rounded-full text-white">✕</button>
        </div>
    </div>

    <div id="orderModal" class="modal p-4">
        <div class="bg-[#0f141d] max-w-md w-full rounded-3xl p-8 border border-cyan-500/30">
            <h2 class="text-2xl gold-text mb-6 text-center">استمارة الطلب السريع</h2>
            <form id="orderForm" class="space-y-4">
                <input type="hidden" id="orderProdName">
                <input type="text" id="custName" placeholder="الاسم الكامل" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl outline-none focus:border-cyan-400" required>
                <input type="tel" id="custPhone" placeholder="رقم الهاتف" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl outline-none focus:border-cyan-400" required>
                <input type="text" id="custAddress" placeholder="العنوان (المدينة / المنطقة)" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl outline-none focus:border-cyan-400" required>
                <button type="submit" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-3 rounded-xl transition">تأكيد الطلب عبر واتساب</button>
                <button type="button" onclick="closeModals()" class="w-full text-gray-500 text-sm">إلغاء</button>
            </form>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAEH25yJ-pwfgFUMjLZNgDyNqw8Rcv9S6E",
            authDomain: "akkad-store-ab5a1.firebaseapp.com",
            databaseURL: "https://akkad-store-ab5a1-default-rtdb.firebaseio.com",
            projectId: "akkad-store-ab5a1",
            storageBucket: "akkad-store-ab5a1.firebasestorage.app",
            messagingSenderId: "456810444639",
            appId: "1:456810444639:web:a706dc19781cd7738e28ea"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let products = [];
        let activeCat = "الكل";

        // تحميل البيانات
        db.ref('categories').on('value', s => {
            const cats = s.val() || {};
            renderCats(Object.values(cats));
        });

        db.ref('products').on('value', s => {
            const data = s.val() || {};
            products = Object.entries(data).map(([id, val]) => ({id, ...val}));
            renderProds();
        });

        function renderCats(catList) {
            const nav = document.getElementById('catNav');
            const list = ["الكل", ...catList];
            nav.innerHTML = list.map(c => `
                <button onclick="filterCat('${c}')" class="px-6 py-2 rounded-full text-sm border ${activeCat === c ? 'bg-[var(--akkad-gold)] text-black border-[var(--akkad-gold)]' : 'border-white/10 text-gray-400'}">
                    ${c}
                </button>
            `).join('');
        }

        function filterCat(c) {
            activeCat = c;
            renderProds();
            db.ref('categories').once('value', s => renderCats(Object.values(s.val() || {})));
        }

        function renderProds() {
            const grid = document.getElementById('productsContainer');
            const filtered = activeCat === "الكل" ? products : products.filter(p => p.category === activeCat);
            
            grid.innerHTML = filtered.map(p => `
                <div class="product-card flex flex-col">
                    <img src="${p.image}" class="w-full h-64 object-cover" onerror="this.src='https://via.placeholder.com/400x500?text=No+Image'">
                    <div class="p-5 flex-grow">
                        <h3 class="text-lg font-bold mb-1">${p.name}</h3>
                        <p class="text-[var(--akkad-gold)] font-bold text-xl mb-4">${Number(p.price).toLocaleString()} <small>د.ع</small></p>
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="showDetails('${p.id}')" class="btn btn-gold py-2 rounded-lg text-xs">قراءة التفاصيل</button>
                            <button onclick="showOrderForm('${p.name}')" class="btn btn-neon py-2 rounded-lg text-xs font-bold">طلب سريع</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // وظائف الموديول
        function showDetails(id) {
            const p = products.find(x => x.id === id);
            document.getElementById('detailsContent').innerHTML = `
                <img src="${p.image}" class="w-full h-72 object-cover">
                <div class="p-8">
                    <h2 class="text-3xl gold-text mb-2">${p.name}</h2>
                    <p class="text-cyan-400 text-sm mb-4">${p.category}</p>
                    <p class="text-gray-300 mb-6 leading-relaxed">${p.description || 'لا يوجد وصف متاح.'}</p>
                    <div class="text-2xl font-bold">${Number(p.price).toLocaleString()} د.ع</div>
                </div>
            `;
            document.getElementById('detailsModal').style.display = 'flex';
        }

        function showOrderForm(name) {
            document.getElementById('orderProdName').value = name;
            document.getElementById('orderModal').style.display = 'flex';
        }

        function closeModals() {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        }

        // معالجة الطلب
        document.getElementById('orderForm').onsubmit = e => {
            e.preventDefault();
            const prod = document.getElementById('orderProdName').value;
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const addr = document.getElementById('custAddress').value;
            
            const msg = `طلب جديد من متجر أكاد:%0A---%0Aالمنتج: ${prod}%0Aالاسم: ${name}%0Aالهاتف: ${phone}%0Aالعنوان: ${addr}`;
            window.open(`https://wa.me/9647800000000?text=${msg}`, '_blank'); // ضع رقمك هنا
            closeModals();
        };

        window.onclick = e => {
            if(e.target.className.includes('modal')) closeModals();
        };
    </script>
</body>
</html>
