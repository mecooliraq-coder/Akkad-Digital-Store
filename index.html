            });
            localStorage.setItem('akkad_reviews', JSON.stringify(reviews));
            renderProducts();
            showToast('✅ تم إضافة تقييمك بنجاح!');
        }
        
        function getProductReviews(productId) {
            return reviews[productId] || [];
        }
        
        function getAverageRating(productId) {
            const productReviews = getProductReviews(productId);
            if(productReviews.length === 0) return 0;
            const sum = productReviews.reduce((acc, r) => acc + r.rating, 0);
            return (sum / productReviews.length).toFixed(1);
        }
        
        function getRatingCount(productId) {
            return getProductReviews(productId).length;
        }
        
        function displayReviews(productId) {
            const productReviews = getProductReviews(productId);
            if(productReviews.length === 0) return '<div class="review-item"><div class="review-text">لا توجد تقييمات بعد. كن أول من يقيم هذا المنتج!</div></div>';
            
            return productReviews.map(r => `
                <div class="review-item">
                    <div class="review-header">
                        <span>⭐ ${r.rating}/5</span>
                        <span class="review-date">${new Date(r.date).toLocaleDateString('ar-IQ')}</span>
                    </div>
                    <div class="review-text">${escapeHtml(r.text)}</div>
                </div>
            `).join('');
        }
        
        // ========================================
        // تبديل الوضع (ليلي/نهاري)
        // ========================================
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const icon = document.getElementById('themeIcon');
            if(document.body.classList.contains('light-mode')) {
                icon.className = 'fas fa-moon';
                localStorage.setItem('akkad_theme', 'light');
            } else {
                icon.className = 'fas fa-sun';
                localStorage.setItem('akkad_theme', 'dark');
            }
        }
        
        function loadTheme() {
            const savedTheme = localStorage.getItem('akkad_theme');
            if(savedTheme === 'light') {
                document.body.classList.add('light-mode');
                document.getElementById('themeIcon').className = 'fas fa-moon';
            } else {
                document.body.classList.remove('light-mode');
                document.getElementById('themeIcon').className = 'fas fa-sun';
            }
        }
        // ========================================
        
        function showToast(msg, isError = false) { let t = document.createElement('div'); t.className = `toast ${isError ? 'error' : ''}`; t.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'} ml-2"></i>${msg}`; document.body.appendChild(t); setTimeout(() => t.remove(), 3000); }
        function shareStore() { if(navigator.share) navigator.share({ title: 'متجر أكاد', url: window.location.href }); else { navigator.clipboard.writeText(window.location.href); showToast('✅ تم نسخ رابط المتجر'); } }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function closeVideo() { document.getElementById('videoModal').style.display = 'none'; document.getElementById('videoFrame').src = ''; }
        function escapeHtml(t) { if(!t) return ''; return String(t).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
        
        function getYouTubeId(url) { if(!url) return null; let m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/); return m ? m[1] : null; }
        function playVideo(url) { let id = getYouTubeId(url); if(id) { document.getElementById('videoFrame').src = `https://www.youtube.com/embed/${id}?autoplay=1&rel=0`; document.getElementById('videoModal').style.display = 'flex'; } else showToast('⚠️ رابط الفيديو غير صالح', true); }
        window.scrollCategories = function(d) { const c = document.getElementById('categoriesContainer'); c.scrollLeft += d === 'left' ? -250 : 250; }
        window.addEventListener('scroll', () => { document.getElementById('scrollTopBtn').classList.toggle('visible', window.scrollY > 300); });
        function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }

        async function loadData() {
            document.getElementById('skeletonLoading').style.display = 'grid';
            document.getElementById('productsGrid').classList.add('hidden');
            try {
                let [catsSnap, orderSnap, prodsSnap] = await Promise.all([db.ref('categories').once('value'), db.ref('categoryOrder').once('value'), db.ref('products').once('value')]);
                categories = catsSnap.val() || {}; categoryOrder = orderSnap.val() || []; allProducts = Object.entries(prodsSnap.val() || {}).map(([id,data])=>({id,...data}));
                document.getElementById('skeletonLoading').style.display = 'none';
                document.getElementById('productsGrid').classList.remove('hidden');
                renderCategories(); renderProducts(); renderMarquee();
            } catch(e) { showToast('❌ فشل التحميل', true); console.error(e); }
        }

        function getSortedCategories() { let s = []; categoryOrder.forEach(k => { if(categories[k]) s.push({key:k, name:categories[k]}); }); Object.keys(categories).forEach(k => { if(!categoryOrder.includes(k)) s.push({key:k, name:categories[k]}); }); return s; }
        function renderCategories() { let c = document.getElementById('categoriesContainer'); let s = getSortedCategories(); let h = `<button onclick="filterCategory('all')" class="cat-btn ${currentCategory === 'all' ? 'active' : ''}">🏠 الكل</button>`; s.forEach(cat => { let dn = cat.name.replace(/^\d+_/, ''); h += `<button onclick="filterCategory('${cat.key}')" class="cat-btn ${currentCategory === cat.key ? 'active' : ''}">📁 ${escapeHtml(dn)}</button>`; }); c.innerHTML = h; }
        function filterCategory(key) { currentCategory = key; renderCategories(); renderProducts(); }
        function searchProducts() { currentSearch = document.getElementById('searchInput').value.toLowerCase(); renderProducts(); }
        function updateProductCount(c) { document.getElementById('productCount').innerText = c; }

        function renderProducts() {
            let filtered = allProducts.filter(p => (currentCategory === 'all' || p.category === currentCategory) && (!currentSearch || p.name.toLowerCase().includes(currentSearch)));
            let grid = document.getElementById('productsGrid'), noRes = document.getElementById('noResults');
            updateProductCount(filtered.length);
            if(filtered.length === 0) { grid.classList.add('hidden'); noRes.classList.remove('hidden'); return; }
            grid.classList.remove('hidden'); noRes.classList.add('hidden');
            
            grid.innerHTML = filtered.map(p => {
                const avgRating = getAverageRating(p.id);
                const ratingCount = getRatingCount(p.id);
                const productReviews = getProductReviews(p.id);
                
                return `<div class="product-card">
                    <div class="media-box" onclick="handleMediaClick('${p.id}')">
                        <img src="${p.img || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22%3E%3Crect width=%22200%22 height=%22200%22 fill=%22%231a1a2e%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23d4af37%22%3E📦%3C/text%3E%3C/svg%3E'}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22%3E%3Crect width=%22200%22 height=%22200%22 fill=%22%231a1a2e%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23d4af37%22%3E📦%3C/text%3E%3C/svg%3E'}">
                        ${p.video ? `<div class="video-badge"><i class="fas fa-video"></i> فيديو</div><div class="video-overlay"><i class="fas fa-play-circle text-white text-4xl"></i></div>` : ''}
                    </div>
                    <div class="p-4">
                        <h3 class="font-bold text-sm line-clamp-2 mb-1">${escapeHtml(p.name)}</h3>
                        <div class="average-rating">
                            ${avgRating > 0 ? `<span>⭐ ${avgRating}/5</span><span>(${ratingCount} تقييم)</span>` : '<span>⭐ لا توجد تقييمات</span>'}
                        </div>
                        <div class="text-[var(--gold)] font-bold text-lg mb-2">${escapeHtml(p.price)}</div>
                        <div class="flex gap-2 mb-3">
                            <button onclick="openOrderModal('${p.id}')" class="btn-gold flex-1 py-2 rounded-lg text-sm"><i class="fab fa-whatsapp ml-1"></i> طلب سريع</button>
                            <button onclick="showDetails('${p.id}')" class="btn-outline flex-1 py-2 rounded-lg text-sm">المواصفات</button>
                        </div>
                        <div class="rating-section" onclick="event.stopPropagation()">
                            <div class="stars-container" id="stars-${p.id}">
                                ${[1,2,3,4,5].map(star => `<i class="fas fa-star star-rating" data-rating="${star}" onclick="selectRating('${p.id}', ${star}, event)"></i>`).join('')}
                            </div>
                            <textarea id="review-text-${p.id}" class="review-input" rows="2" placeholder="اكتب تقييمك للمنتج (اختياري)..."></textarea>
                            <button onclick="submitReview('${p.id}')" class="review-submit"><i class="fas fa-paper-plane ml-1"></i> إضافة تقييم</button>
                            <div class="reviews-list" id="reviews-${p.id}">
                                ${displayReviews(p.id)}
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');
            
            // تحديث النجوم بعد التصيير
            filtered.forEach(p => {
                const avgRating = getAverageRating(p.id);
                const starsContainer = document.getElementById(`stars-${p.id}`);
                if(starsContainer) {
                    const stars = starsContainer.querySelectorAll('.star-rating');
                    stars.forEach((star, idx) => {
                        if(idx + 1 <= Math.round(avgRating)) star.classList.add('active');
                        else star.classList.remove('active');
                    });
                }
            });
        }
        
        function selectRating(productId, rating, event) {
            event.stopPropagation();
            const starsContainer = document.getElementById(`stars-${productId}`);
            const stars = starsContainer.querySelectorAll('.star-rating');
            stars.forEach((star, idx) => {
                if(idx + 1 <= rating) star.classList.add('active');
                else star.classList.remove('active');
            });
            window.tempRating = rating;
        }
        
        function submitReview(productId) {
            const rating = window.tempRating || 0;
            const reviewText = document.getElementById(`review-text-${productId}`).value.trim();
            if(rating === 0) {
                showToast('⚠️ الرجاء اختيار تقييم بالنجوم أولاً', true);
                return;
            }
            if(!reviewText) {
                showToast('⚠️ الرجاء كتابة تعليقك على المنتج', true);
                return;
            }
            saveReview(productId, rating, reviewText);
            document.getElementById(`review-text-${productId}`).value = '';
            window.tempRating = 0;
        }

        function handleMediaClick(id) { let p = allProducts.find(x => x.id === id); if(p?.video) playVideo(p.video); else showDetails(id); }
        function showDetails(id) { let p = allProducts.find(x => x.id === id); if(!p) return; document.getElementById('modalTitle').innerHTML = p.name; let d = p.desc || 'لا توجد مواصفات تفصيلية'; document.getElementById('modalDesc').innerHTML = escapeHtml(d).replace(/\n/g,'<br>'); document.getElementById('detailsModal').style.display = 'flex'; }
        function openOrderModal(id) { selectedProduct = allProducts.find(x => x.id === id); if(!selectedProduct) return; document.getElementById('orderProductInfo').innerHTML = `<div class="flex justify-between"><span>${escapeHtml(selectedProduct.name)}</span><span class="text-[var(--gold)]">${escapeHtml(selectedProduct.price)}</span></div>`; document.getElementById('custName').value = ''; document.getElementById('custGov').value = ''; document.getElementById('custCity').value = ''; document.getElementById('custLandmark').value = ''; document.getElementById('custPhone').value = ''; document.getElementById('orderModal').style.display = 'flex'; }
        function renderMarquee() { let container = document.getElementById('marqueeSection'), track = document.getElementById('marqueeTrack'); if(allProducts.length === 0) return; let items = allProducts.slice(0,12).map(p => `<div class="marquee-item" onclick="showDetails('${p.id}')"><img src="${p.img || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22%3E%3Crect width=%22200%22 height=%22200%22 fill=%22%231a1a2e%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23d4af37%22%3E📦%3C/text%3E%3C/svg%3E'}"><div class="info"><div class="name">${escapeHtml(p.name)}</div><div class="price">${escapeHtml(p.price)}</div></div></div>`).join(''); track.innerHTML = items + items; container.classList.remove('hidden'); }
        
        // إرسال الطلب
        document.getElementById('orderForm').addEventListener('submit', async e => {
            e.preventDefault();
            let name = document.getElementById('custName').value.trim();
            let governorate = document.getElementById('custGov').value;
            let city = document.getElementById('custCity').value.trim();
            let landmark = document.getElementById('custLandmark').value.trim();
            let phone = document.getElementById('custPhone').value.trim();
            
            if(!name || !governorate || !city || !phone) {
                showToast('⚠️ الرجاء ملء جميع الحقول المطلوبة', true);
                return;
            }
            
            let orderData = {
                orderId: Date.now().toString(),
                customerName: name,
                governorate: governorate,
                city: city,
                landmark: landmark,
                phone: phone,
                productId: selectedProduct.id,
                productName: selectedProduct.name,
                productPrice: selectedProduct.price,
                status: 'جديد',
                createdAt: new Date().toISOString(),
                createdAtTimestamp: Date.now()
            };
            
            try {
                await db.ref('orders/' + orderData.orderId).set(orderData);
                
                let msg = "";
                msg += "[طلب جديد] - متجر أكاد الرقمي\n";
                msg += "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n";
                msg += "- الاسم: " + name + "\n";
                msg += "- العنوان: " + governorate + " - " + city + "\n";
                if(landmark) msg += "- نقطة دالة: " + landmark + "\n";
                msg += "- الموبايل: " + phone + "\n";
                msg += "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n";
                msg += "- المنتج: " + selectedProduct.name + "\n";
                msg += "- السعر: " + selectedProduct.price + "\n";
                msg += "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n";
                msg += "- الوقت: " + new Date().toLocaleString('ar-IQ') + "\n";
                msg += "- شكراً لتسوقك مع أكاد";
                
                let encodedMsg = encodeURIComponent(msg);
                window.open(`https://wa.me/9647730492020?text=${encodedMsg}`, '_blank');
                showToast('✅ تم إرسال الطلب بنجاح!');
                closeModal('orderModal');
            } catch(err) {
                console.error(err);
                showToast('❌ فشل إرسال الطلب، حاول مرة أخرى', true);
            }
        });
        
        db.ref('categoryOrder').on('value', (s) => { categoryOrder = s.val() || []; renderCategories(); });
        
        loadTheme();
        loadData();
        setInterval(() => loadData(), 30000);
    </script>
</body>
</html>
