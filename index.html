<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>خلفية الكتابة المسمارية المتحركة</title>
    <style>
        :root {
            --bg-color: #0a0f12; /* لون الخلفية الأساسي */
            --cuneiform-color: rgba(212, 175, 55, 0.15); /* لون ذهبي شفاف جداً */
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            overflow: hidden; /* لمنع ظهور شريط التمرير */
        }

        /* حاوية الخلفية */
        #cuneiform-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* لجعلها خلف العناصر الأخرى */
            pointer-events: none; /* لكي لا تعيق النقر على الأزرار */
        }

        /* تصميم الحرف الواحد */
        .cuneiform-char {
            position: absolute;
            font-family: 'serif';
            color: var(--cuneiform-color);
            user-select: none;
            white-space: nowrap;
            filter: blur(0.5px); /* لمسة جمالية لجعلها تبدو قديمة */
            animation: move linear infinite;
        }

        /* حركة الصعود من الأسفل للأعلى مع الدوران */
        @keyframes move {
            0% {
                transform: translateY(110vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-20vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div id="cuneiform-container"></div>

    <div style="position: relative; z-index: 1; color: white; text-align: center; margin-top: 20%; font-family: sans-serif;">
        <h1 style="color: #d4af37; font-size: 3rem;">أَكَّد</h1>
        <p>خلفية متحركة برموز مسمارية أصلية</p>
    </div>

    <script>
        const container = document.getElementById('cuneiform-container');
        
        // قائمة ببعض الحروف المسمارية الحقيقية من نظام اليونيكود
        const cuneiformChars = [
            '𒀀', '𒀁', '𒀂', '𒀃', '𒀄', '𒀅', '𒀆', '𒀇', '𒀈', '𒀉', 
            '𒀊', '𒀋', '𒀌', '𒀍', '𒀎', '𒀏', '𒀐', '嶙', '𒀭', '𒂗', 'ުން'
        ];

        function createChar() {
            const charElement = document.createElement('div');
            charElement.className = 'cuneiform-char';
            
            // اختيار حرف عشوائي
            const randomChar = cuneiformChars[Math.floor(Math.random() * cuneiformChars.length)];
            charElement.textContent = randomChar;

            // إعدادات عشوائية لكل حرف
            const size = Math.random() * (40 - 15) + 15; // حجم بين 15px و 40px
            const left = Math.random() * 100; // موقع أفقي عشوائي
            const duration = Math.random() * (20 - 10) + 10; // سرعة الحركة بين 10 و 20 ثانية
            const delay = Math.random() * 5; // تأخير البداية لجعل الحركة مستمرة وغير منتظمة

            charElement.style.fontSize = `${size}px`;
            charElement.style.left = `${left}%`;
            charElement.style.animationDuration = `${duration}s`;
            charElement.style.animationDelay = `${delay}s`;

            container.appendChild(charElement);

            // إزالة العنصر بعد انتهاء الحركة لتوفير الذاكرة
            setTimeout(() => {
                charElement.remove();
            }, (duration + delay) * 1000);
        }

        // إنشاء حروف جديدة بانتظام
        setInterval(createChar, 400); // ينشئ حرفاً جديداً كل 400 مللي ثانية

        // إنشاء دفعة أولى فورية عند التحميل
        for(let i = 0; i < 20; i++) {
            createChar();
        }
    </script>
</body>
</html>
