<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاد | متجر بلاد الرافدين الرقمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=Lateef&display=swap');
        
        :root {
            --mesopotamia-dark: #0a0f12;
            --akkad-gold: #d4af37;
            --cuneiform-glow: rgba(212, 175, 55, 0.08);
        }
        
        body { 
            font-family: 'Tajawal', sans-serif; 
            background: var(--mesopotamia-dark); 
            color: #f0e6d0; 
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        /* الخلفية المسمارية */
        #cuneiform-background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; pointer-events: none;
            background: radial-gradient(circle at center, #141a1f 0%, #0a0f12 100%);
        }
        .cuneiform-char {
            position: absolute; color: var(--cuneiform-glow);
            user-select: none; animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }

        /* شريط المنتجات المتحرك (الماركي المكبّر) */
        #marquee-container {
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.08), transparent);
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            padding: 20px 0; overflow: hidden; margin-bottom: 30px;
        }
        .marquee-track {
            display: flex; gap: 30px; width: max-content;
            animation: scroll 40s linear infinite;
        }
        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(50%); } }
        .marquee-item {
            width: 220px; flex-shrink: 0; background: rgba(255, 255, 255, 0.05);
            border-radius: 12px; padding: 10px; display: flex; align-items: center; gap: 12px; border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .marquee-item img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; border: 1px solid var(--akkad-gold); }
        .marquee-item span { font-size: 11px; font-weight: bold; color: #fff; }

        /* بطاقة المنتج */
        .akkad-card { 
            background: rgba(20, 26, 31, 0.8); backdrop-filter: blur(10px); 
            border: 1px solid rgba(212, 175, 55, 0.15); border-radius: 1rem; transition: 0.4s; overflow: hidden;
        }
        .akkad-card:hover { border-color: var(--akkad-gold); transform: translateY(-5px); }
        .media-box { height: 160px; position: relative; overflow: hidden; cursor: pointer; }
        .media-box img { width: 100%; height: 100%; object-fit: cover; }
        .video-icon { position: absolute; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.3s; }
        .media-box:hover .video-icon { opacity: 1; }
        .btn-akkad { background: linear-gradient(135deg, var(--akkad-gold), #b8942e); color: #0a0f12; font-weight: 800; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.95); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="cuneiform-background"></div>

    <nav class="sticky top-0 z-50 bg-[#0a0f12]/90 backdrop-blur border-b-2 border-[var(--akkad-gold)]">
        <div class="container mx-auto px-4 py-3">
            <div class="flex justify-between items-center mb-3">
                <div class="flex items-center gap-3">
                    <img src="https://www.raed.net/img?id=1539063" class="w-10 h-10 rounded-full border border-[var(--akkad-gold)]">
                    <span class="text-xl font-black text-[var(--akkad-gold)]">أَكَّد</span>
                </div>
                <div class="flex gap-2">
                    <button onclick="shareApp()" class="bg-white/10 w-10 h-10 rounded-lg flex items-center justify-center text-white border border-white/10 hover:bg-white/20 transition">
                        <i class="fas fa-share-alt"></i>
                    </button>
                    <a href="https://wa.me/9647730492020" class="bg-[#25D366] w-10 h-10 rounded-lg flex items-center justify-center text-white text-xl">
                        <i class="fab fa-whatsapp"></i>
                    </a>
                </div>
            </div>
            <input type="text" id="searchInput" onkeyup="searchProducts()" class="w-full bg-black/40 border border-white/10 rounded-xl py-2 px-4 text-center outline-none focus:border-[var(--akkad-gold)]" placeholder="ابحث في المتجر...">
            <div id="categories-nav" class="flex gap-2 mt-3 overflow-x-auto no-scrollbar text-[10px]"></div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-6">
        <div id="marquee-container" class="hidden"><div class="marquee-track" id="marquee-track"></div></div>
        <div id="loading" class="text-center py-20"><div class="w-10 h-10 border-2 border-[var(--akkad-gold)] border-t-transparent rounded-full animate-spin mx-auto"></div></div>
        <div id="products-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4 hidden"></div>
    </main>

    <div id="descModal" class="modal" onclick="this.style.display='none'">
        <div class="bg-[#141a1f] p-6 rounded-2xl max-w-md w-[90%]" onclick="event.stopPropagation()">
            <h2 id="modalTitle" class="text-lg font-bold text-[var(--akkad-gold)] mb-4"></h2>
            <div id="modalDesc" class="text-xs opacity-80 leading-relaxed mb-6 whitespace-pre-line overflow-y-auto max-h-[60vh] no-scrollbar"></div>
            <button onclick="document.getElementById('descModal').style.display='none'" class="w-full bg-white/10 py-2 rounded-lg">إغلاق</button>
        </div>
    </div>

    <div id="quickOrderModal" class="modal">
        <div class="bg-[#141a1f] p-6 rounded-2xl max-w-md w-[90%]" onclick="event.stopPropagation()">
            <h3 class="text-center mb-4 font-bold text-[var(--akkad-gold)]">تأكيد طلب الشراء</h3>
            <form id="quickOrderForm" class="space-y-3">
                <input type="text" id="custName" placeholder="الاسم الكامل" class="w-full bg-black/40 border border-white/10 p-3 rounded-xl outline-none" required>
                <div class="grid grid-cols-2 gap-2">
                    <select id="custGov" class="bg-black border border-white/10 p-3 rounded-xl text-xs outline-none text-white" required>
                        <option value="">المحافظة</option>
                        <option>بغداد</option><option>بصرة</option><option>نينوى</option><option>أربيل</option><option>بابل</option><option>النجف</option><option>كربلاء</option><option>ذي قار</option><option>ديالى</option><option>أنبار</option><option>كركوك</option><option>صلاح الدين</option><option>ميسان</option><option>واسط</option><option>مثنى</option><option>قادسية</option><option>سليمانية</option><option>دهوك</option>
                    </select>
                    <input type="text" id="custCity" placeholder="المدينة/المنطقة" class="w-full bg-black/40 border border-white/10 p-3 rounded-xl outline-none text-xs" required>
                </div>
                <input type="tel" id="custPhone" placeholder="رقم الهاتف" class="w-full bg-black/40 border border-white/10 p-3 rounded-xl outline-none" required>
                <input type="text" id="custLandmark" placeholder="أقرب نقطة دالة" class="w-full bg-black/40 border border-white/10 p-3 rounded-xl outline-none text-xs">
                <button type="submit" class="btn-akkad w-full py-4 rounded-xl font-bold">إرسال عبر واتساب</button>
                <button type="button" onclick="closeModal('quickOrderModal')" class="w-full py-2 text-xs opacity-50">إلغاء</button>
            </form>
        </div>
    </div>

    <div id="videoModal" class="modal" onclick="closeVideo()">
        <div class="relative w-[90%] max-w-2xl aspect-video bg-black rounded-xl overflow-hidden">
            <iframe id="vFrame" class="w-full h-full" src="" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAEH25yJ-pwfgFUMjLZNgDyNqw8Rcv9S6E",
            authDomain: "akkad-store-ab5a1.firebaseapp.com",
            databaseURL: "https://akkad-store-ab5a1-default-rtdb.firebaseio.com",
            projectId: "akkad-store-ab5a1",
            storageBucket: "akkad-store-ab5a1.firebasestorage.app",
            messagingSenderId: "456810444639",
            appId: "1:456810444639:web:a706dc19781cd7738e28ea"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allProducts = [], categories = {}, currentCategory = 'all', currentSearch = '';
        let selectedProduct = null;

        // الخلفية المسمارية
        const cuneiformChars = ['𒀀', '𒀁', '𒀂', '𒀃', '𒀄', '𒀅', '𒀆', 'يد'];
        function createCuneiform() {
            const container = document.getElementById('cuneiform-background');
            const char = document.createElement('div');
            char.className = 'cuneiform-char';
            char.textContent = cuneiformChars[Math.floor(Math.random()*cuneiformChars.length)];
            char.style.left = Math.random()*100 + '%';
            char.style.fontSize = (Math.random()*20 + 10) + 'px';
            char.style.animationDuration = (Math.random()*15 + 10) + 's';
            container.appendChild(char);
            setTimeout(() => char.remove(), 25000);
        }
        setInterval(createCuneiform, 700);

        async function loadStore() {
            try {
                const [pSnap, cSnap] = await Promise.all([
                    db.ref('products').once('value'),
                    db.ref('categories').once('value')
                ]);
                allProducts = Object.entries(pSnap.val() || {}).map(([id, data]) => ({id, ...data}));
                categories = cSnap.val() || {};
                renderCategories();
                renderProducts();
                renderMarquee();
                document.getElementById('loading').style.display = 'none';
            } catch(e) { console.error(e); }
        }

        function renderCategories() {
            const nav = document.getElementById('categories-nav');
            let html = `<button onclick="filterCat('all')" class="px-4 py-2 rounded-full border border-white/10 whitespace-nowrap">الكل</button>`;
            for(let id in categories) html += `<button onclick="filterCat('${id}')" class="px-4 py-2 rounded-full border border-white/10 whitespace-nowrap">${categories[id]}</button>`;
            nav.innerHTML = html;
        }

        function filterCat(id) { currentCategory = id; renderProducts(); }
        function searchProducts() { currentSearch = document.getElementById('searchInput').value.toLowerCase(); renderProducts(); }

        function renderProducts() {
            const grid = document.getElementById('products-grid');
            const filtered = allProducts.filter(p => {
                const matchCat = currentCategory === 'all' || p.category === currentCategory;
                return matchCat && p.name.toLowerCase().includes(currentSearch);
            });
            grid.innerHTML = filtered.map(p => `
                <div class="akkad-card">
                    <div class="media-box" onclick="handleMedia('${p.id}')">
                        <img src="${p.img}">
                        <div class="video-icon">
                            ${p.video ? '<i class="fas fa-play text-white text-2xl"></i>' : '<i class="fas fa-search-plus text-white text-2xl"></i>'}
                        </div>
                    </div>
                    <div class="p-3 text-center">
                        <h3 class="text-[10px] font-bold h-8 overflow-hidden">${p.name}</h3>
                        <div class="text-[var(--akkad-gold)] text-xs font-black my-2">${Number(p.price).toLocaleString()} د.ع</div>
                        <div class="flex flex-col gap-2">
                            <button onclick="openOrder('${p.id}')" class="btn-akkad w-full py-2 rounded-lg text-[10px]">شراء الآن</button>
                            <button onclick="showDetails('${p.id}')" class="bg-white/5 w-full py-2 rounded-lg text-[10px] border border-white/10">المواصفات</button>
                        </div>
                    </div>
                </div>
            `).join('');
            grid.classList.remove('hidden');
        }

        function handleMedia(id) {
            const p = allProducts.find(x => x.id === id);
            if(p.video) {
                const vid = p.video.split('v=')[1]?.split('&')[0] || p.video.split('/').pop();
                document.getElementById('vFrame').src = `https://www.youtube.com/embed/${vid}?autoplay=1`;
                document.getElementById('videoModal').style.display = 'flex';
            } else { showDetails(id); }
        }

        function renderMarquee() {
            const track = document.getElementById('marquee-track');
            const items = allProducts.slice(0, 15).map(p => `
                <div class="marquee-item" onclick="showDetails('${p.id}')">
                    <img src="${p.img}">
                    <span>${p.name.substring(0, 20)}...</span>
                </div>
            `).join('');
            track.innerHTML = items + items;
            document.getElementById('marquee-container').classList.remove('hidden');
        }

        function showDetails(id) {
            const p = allProducts.find(x => x.id === id);
            document.getElementById('modalTitle').innerText = p.name;
            document.getElementById('modalDesc').innerText = p.desc || 'لا توجد مواصفات';
            document.getElementById('descModal').style.display = 'flex';
        }

        function shareApp() {
            if (navigator.share) {
                navigator.share({
                    title: 'متجر أَكَّد',
                    text: 'اكتشف أرقى المنتجات في متجر أَكَّد الرقمي 🏺',
                    url: window.location.href
                });
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert('تم نسخ رابط المتجر بنجاح!');
            }
        }

        function openOrder(id) { selectedProduct = allProducts.find(x => x.id === id); document.getElementById('quickOrderModal').style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function closeVideo() { document.getElementById('videoModal').style.display = 'none'; document.getElementById('vFrame').src = ''; }

        document.getElementById('quickOrderForm').onsubmit = function(e) {
            e.preventDefault();
            const msg = `*طلب شراء جديد*%0A*المنتج:* ${selectedProduct.name}%0A*الاسم:* ${document.getElementById('custName').value}%0A*المحافظة:* ${document.getElementById('custGov').value}%0A*المنطقة:* ${document.getElementById('custCity').value}%0A*الهاتف:* ${document.getElementById('custPhone').value}%0A*نقطة دالة:* ${document.getElementById('custLandmark').value}`;
            window.open(`https://wa.me/9647730492020?text=${encodeURIComponent(msg)}`);
        };

        loadStore();
    </script>
</body>
</html>
