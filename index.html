<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر أكاد الرقمي | من قلب بلاد الرافدين</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: #030508; color: #fff; }
        .glass-card { background: rgba(15,26,36,0.55); backdrop-filter: blur(16px); border: 1px solid rgba(201,169,97,0.2); border-radius: 1rem; }
        .btn-gold { background: linear-gradient(135deg, #c9a961, #8b6f47); color: #0a0f18; font-weight: 600; }
        .btn-outline { border: 1px solid rgba(201,169,97,0.35); color: #c9a961; background: rgba(201,169,97,0.04); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(3,5,8,0.95); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-content { background: #0f1a24; border: 1px solid #c9a961; border-radius: 1.5rem; max-width: 500px; width: 90%; padding: 1.5rem; }
        .toast { position: fixed; bottom: 20px; left: 20px; background: #10b981; color: white; padding: 12px 20px; border-radius: 10px; z-index: 9999; animation: slideIn 0.3s; }
        .toast.error { background: #dc2626; }
        @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .loader { border: 3px solid rgba(201,169,97,0.15); border-top: 3px solid #c9a961; border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin: 40px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .category-chip.active { background: rgba(201,169,97,0.25); border-color: #c9a961; color: #c9a961; }
        .product-img { height: 180px; object-fit: cover; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #c9a961; border-radius: 3px; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-7xl mx-auto">
        <!-- الهيدر -->
        <div class="glass-card p-4 mb-6 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-[#c9a961]">🕌 متجر أكاد الرقمي</h1>
                <p class="text-gray-400 text-sm">أفضل العروض والمنتجات الرقمية</p>
            </div>
            <div class="flex gap-2">
                <button onclick="shareStore()" class="px-3 py-2 rounded-xl text-xs" style="background: #25D366;"><i class="fab fa-whatsapp ml-1"></i> مشاركة</button>
                <a href="admin-panel.html" class="bg-white/10 px-3 py-2 rounded-xl text-xs">لوحة التحكم</a>
            </div>
        </div>

        <!-- بحث -->
        <div class="relative max-w-md mx-auto mb-6">
            <input type="text" id="searchInput" onkeyup="searchProducts()" class="w-full bg-white/5 border border-[#c9a961]/20 rounded-2xl py-3 px-12" placeholder="🔍 ابحث عن منتج...">
            <i class="fas fa-search absolute right-4 top-3.5 text-[#c9a961]/50"></i>
        </div>

        <!-- الأقسام -->
        <div id="categoriesContainer" class="flex gap-2 overflow-x-auto pb-2 mb-6"></div>

        <!-- التحميل -->
        <div id="loading" class="text-center py-20">
            <div class="loader"></div>
            <p class="text-gray-400 mt-4">جاري تحميل المنتجات...</p>
        </div>

        <!-- خطأ -->
        <div id="errorMessage" class="hidden text-center py-20">
            <p class="text-red-400">❌ فشل الاتصال بقاعدة البيانات</p>
            <button onclick="loadData()" class="btn-gold px-4 py-2 rounded-xl mt-4">إعادة المحاولة</button>
        </div>

        <!-- المنتجات -->
        <div id="productsGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5 hidden"></div>

        <!-- لا توجد نتائج -->
        <div id="noResults" class="hidden text-center py-20">
            <p class="text-gray-400">🔍 لا توجد منتجات</p>
        </div>
    </div>

    <!-- نافذة التفاصيل -->
    <div id="detailsModal" class="modal" onclick="closeModal('detailsModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-3">
                <h3 id="modalTitle" class="text-xl font-bold text-[#c9a961]"></h3>
                <button onclick="closeModal('detailsModal')" class="text-2xl">&times;</button>
            </div>
            <p id="modalDesc" class="text-gray-300 text-sm mb-4"></p>
            <button onclick="openQuickOrderFromModal()" class="w-full btn-gold py-2 rounded-xl">📱 طلب سريع</button>
        </div>
    </div>

    <!-- نافذة الطلب السريع -->
    <div id="quickModal" class="modal" onclick="if(event.target===this) closeQuickModal()">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-3">
                <h3 class="text-[#c9a961]">طلب سريع</h3>
                <button onclick="closeQuickModal()" class="text-2xl">&times;</button>
            </div>
            <div id="quickProductInfo" class="bg-white/10 p-2 rounded-lg text-sm mb-3"></div>
            <form id="quickForm">
                <input type="text" id="qName" class="w-full bg-white/10 border border-gray-600 rounded-lg p-2 mb-2 text-white" placeholder="الاسم الكامل *" required>
                <select id="qGov" class="w-full bg-white/10 border border-gray-600 rounded-lg p-2 mb-2 text-white" required>
                    <option value="">المحافظة *</option>
                    <option>بغداد</option><option>البصرة</option><option>نينوى</option><option>أربيل</option>
                </select>
                <input type="text" id="qCity" class="w-full bg-white/10 border border-gray-600 rounded-lg p-2 mb-2 text-white" placeholder="المدينة/الحي *" required>
                <input type="text" id="qLandmark" class="w-full bg-white/10 border border-gray-600 rounded-lg p-2 mb-2 text-white" placeholder="أقرب نقطة دالة">
                <input type="tel" id="qPhone" class="w-full bg-white/10 border border-gray-600 rounded-lg p-2 mb-3 text-white" placeholder="رقم الموبايل *" required>
                <button type="submit" class="w-full btn-gold py-2 rounded-xl"><i class="fab fa-whatsapp ml-1"></i> إرسال</button>
            </form>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAEH25yJ-pwfgFUMjLZNgDyNqw8Rcv9S6E",
            authDomain: "akkad-store-ab5a1.firebaseapp.com",
            databaseURL: "https://akkad-store-ab5a1-default-rtdb.firebaseio.com",
            projectId: "akkad-store-ab5a1",
            storageBucket: "akkad-store-ab5a1.firebasestorage.app",
            messagingSenderId: "456810444639",
            appId: "1:456810444639:web:a706dc19781cd7738e28ea"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allProducts = [];
        let categoryOrder = [];      // 👈 الترتيب من لوحة التحكم
        let activeCategory = "all";
        let currentProduct = null;
        const STORE_WHATSAPP = "9647730492020";

        function showToast(msg, isErr = false) {
            const t = document.createElement('div');
            t.className = `toast ${isErr ? 'error' : ''}`;
            t.innerHTML = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        function shareStore() {
            window.open(`https://wa.me/?text=${encodeURIComponent('🛍️ متجر أكاد الرقمي\n' + location.href)}`, '_blank');
        }

        function closeModal(id) { document.getElementById(id).style.display = "none"; }
        function closeQuickModal() { document.getElementById('quickModal').style.display = "none"; }

        function openQuickOrder(p) {
            currentProduct = p;
            document.getElementById('quickProductInfo').innerHTML = `🛍️ ${p.name} - ${Number(p.price).toLocaleString()} د.ع`;
            document.getElementById('quickModal').style.display = "flex";
            ['qName', 'qCity', 'qPhone'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('qGov').value = '';
            document.getElementById('qLandmark').value = '';
        }

        function openQuickOrderFromModal() {
            if(currentProduct) openQuickOrder(currentProduct);
            closeModal('detailsModal');
        }

        document.getElementById('quickForm')?.addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('qName').value.trim();
            const gov = document.getElementById('qGov').value;
            const city = document.getElementById('qCity').value.trim();
            const landmark = document.getElementById('qLandmark').value.trim();
            const phone = document.getElementById('qPhone').value.trim();
            if(!name || !gov || !city || !phone || !currentProduct) {
                showToast("❌ املأ جميع الحقول", true);
                return;
            }
            const msg = `📦 *طلب جديد*%0A👤 الاسم: ${name}%0A📍 المحافظة: ${gov}%0A🏘️ الحي: ${city}%0A🗺️ نقطة دالة: ${landmark || "غير محدد"}%0A📞 الجوال: ${phone}%0A🛍️ المنتج: ${currentProduct.name}%0A💰 السعر: ${Number(currentProduct.price).toLocaleString()} د.ع`;
            window.open(`https://wa.me/${STORE_WHATSAPP}?text=${msg}`, '_blank');
            showToast("✅ تم التوجيه إلى واتساب");
            closeQuickModal();
        });

        function showDetails(p) {
            currentProduct = p;
            document.getElementById('modalTitle').innerHTML = p.name;
            document.getElementById('modalDesc').innerHTML = p.desc || "لا يوجد وصف";
            document.getElementById('detailsModal').style.display = "flex";
        }

        function displayProducts(products) {
            const grid = document.getElementById('productsGrid');
            const loading = document.getElementById('loading');
            const errorMsg = document.getElementById('errorMessage');
            const noResults = document.getElementById('noResults');
            if(!products.length) {
                grid.classList.add('hidden'); loading.classList.add('hidden'); errorMsg.classList.add('hidden');
                noResults.classList.remove('hidden'); return;
            }
            grid.classList.remove('hidden'); loading.classList.add('hidden'); errorMsg.classList.add('hidden'); noResults.classList.add('hidden');
            grid.innerHTML = products.map(p => `
                <div class="glass-card p-3 cursor-pointer" onclick="showDetails(${JSON.stringify(p).replace(/"/g, '&quot;')})">
                    <img src="${p.img || 'https://via.placeholder.com/300'}" class="w-full h-40 object-cover rounded-lg mb-2" onerror="this.src='https://via.placeholder.com/300'">
                    <h3 class="font-bold line-clamp-2">${escapeHtml(p.name)}</h3>
                    <div class="flex justify-between items-center mt-2">
                        <span class="text-[#c9a961] font-bold">${Number(p.price).toLocaleString()} د.ع</span>
                        <button onclick="event.stopPropagation(); openQuickOrder(${JSON.stringify(p).replace(/"/g, '&quot;')})" class="btn-outline px-2 py-1 rounded-lg text-xs">طلب سريع</button>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(t) { return t ? t.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]) : ''; }

        // ========== عرض الأقسام حسب الترتيب من لوحة التحكم ==========
        function renderCategories() {
            const container = document.getElementById('categoriesContainer');
            if(!container) return;
            // استخراج الأقسام الفريدة من المنتجات
            const catsFromProducts = [...new Set(allProducts.map(p => p.category).filter(Boolean))];
            // ترتيب حسب categoryOrder من Firebase
            let sorted = [];
            if(categoryOrder.length) {
                categoryOrder.forEach(catKey => {
                    if(catsFromProducts.includes(catKey) && !sorted.includes(catKey)) sorted.push(catKey);
                });
            }
            catsFromProducts.forEach(c => { if(!sorted.includes(c)) sorted.push(c); });
            const allCats = ["all", ...sorted];
            container.innerHTML = allCats.map(cat => `
                <button onclick="filterByCategory('${cat}')" 
                    class="px-4 py-1 rounded-full border text-sm whitespace-nowrap transition ${activeCategory === cat ? 'category-chip' : 'border-white/20'}">
                    ${cat === "all" ? "🌟 الكل" : escapeHtml(cat)}
                </button>
            `).join('');
        }

        function filterProducts() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            let filtered = [...allProducts];
            if(activeCategory !== "all") filtered = filtered.filter(p => p.category === activeCategory);
            if(search) filtered = filtered.filter(p => p.name?.toLowerCase().includes(search) || p.desc?.toLowerCase().includes(search));
            displayProducts(filtered);
        }

        function searchProducts() { filterProducts(); }
        function filterByCategory(cat) { activeCategory = cat; renderCategories(); filterProducts(); }
        function resetSearch() { document.getElementById('searchInput').value = ''; activeCategory = "all"; renderCategories(); filterProducts(); }

        function loadData() {
            const loading = document.getElementById('loading');
            const errorMsg = document.getElementById('errorMessage');
            loading.classList.remove('hidden');
            errorMsg.classList.add('hidden');
            // جلب المنتجات
            db.ref('products').once('value').then(snap => {
                const data = snap.val() || {};
                allProducts = Object.keys(data).map(k => ({ id: k, ...data[k] }));
                // جلب ترتيب الأقسام من Firebase (الأهم!)
                return db.ref('categoryOrder').once('value');
            }).then(snap => {
                categoryOrder = snap.val() || [];
                console.log("✅ ترتيب الأقسام من Firebase:", categoryOrder);
                renderCategories();
                filterProducts();
                showToast(`✅ تم تحميل ${allProducts.length} منتج`);
            }).catch(err => {
                console.error(err);
                loading.classList.add('hidden');
                errorMsg.classList.remove('hidden');
                showToast("❌ فشل التحميل", true);
            });
        }

        loadData();
    </script>
</body>
</html>
