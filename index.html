<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>أكاد | متجر بلاد الرافدين الرقمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background: #0a0f12;
            color: #e0d6c0;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* خلفية متحركة */
        .bg-pattern {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 30%, rgba(212, 175, 55, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(212, 175, 55, 0.04) 0%, transparent 40%),
                repeating-linear-gradient(45deg, rgba(139, 90, 43, 0.02) 0px, rgba(139, 90, 43, 0.02) 2px, transparent 2px, transparent 8px);
            animation: slowZoom 20s ease-in-out infinite alternate;
        }
        
        @keyframes slowZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }
        
        .gold-border-bottom {
            border-bottom: 2px solid #d4af37;
            box-shadow: 0 2px 15px rgba(212, 175, 55, 0.15);
        }
        
        /* أزرار */
        .btn-gold {
            background: linear-gradient(135deg, #d4af37, #b8942e);
            color: #0a0f12;
            font-weight: 700;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }
        
        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.4);
        }
        
        .btn-outline {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(212, 175, 55, 0.3);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .btn-outline:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: #d4af37;
        }
        
        /* بطاقات المنتجات */
        .product-card {
            background: rgba(20, 26, 31, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 1.25rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            position: relative;
        }
        
        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .product-card:hover {
            transform: translateY(-8px);
            border-color: #d4af37;
            box-shadow: 0 20px 35px rgba(0,0,0,0.4), 0 0 20px rgba(212,175,55,0.15);
        }
        
        .product-card:hover::before { opacity: 1; }
        
        .media-box {
            height: 180px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        
        .media-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        
        .product-card:hover .media-box img { transform: scale(1.08); }
        
        .video-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.3s ease;
        }
        
        .media-box:hover .video-overlay { opacity: 1; }
        
        .video-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: #d4af37;
            color: #0a0f12;
            font-size: 10px;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
            z-index: 2;
        }

        /* أزرار الأقسام */
        .cat-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(212, 175, 55, 0.25);
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
            white-space: nowrap;
        }
        
        .cat-btn.active { background: #d4af37; color: #0a0f12; border-color: #d4af37; box-shadow: 0 0 12px rgba(212, 175, 55, 0.3); }
        .cat-btn:hover:not(.active) { background: rgba(212, 175, 55, 0.15); border-color: #d4af37; }
        
        /* ======================================== */
        /* شريط المنتجات المتحرك - النسخة المكبرة */
        /* ======================================== */
        .marquee-section {
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.08), transparent);
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            padding: 20px 0;
            overflow: hidden;
            margin: 20px 0 30px;
        }
        
        .marquee-track {
            display: flex;
            gap: 30px;
            width: max-content;
            animation: scrollMarquee 40s linear infinite;
        }
        
        .marquee-section:hover .marquee-track { animation-play-state: paused; }
        
        @keyframes scrollMarquee {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }
        
        /* عنصر المنتج في الشريط - تم تكبيره */
        .marquee-item {
            width: 280px;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(4px);
            border-radius: 16px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }
        
        .marquee-item:hover {
            border-color: #d4af37;
            background: rgba(212, 175, 55, 0.12);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        
        /* صورة المنتج في الشريط - أكبر */
        .marquee-item img {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            object-fit: cover;
            border: 1px solid rgba(212, 175, 55, 0.4);
        }
        
        /* معلومات المنتج */
        .marquee-item .info { flex: 1; }
        .marquee-item .name { 
            font-size: 14px; 
            font-weight: 700; 
            line-height: 1.4; 
            margin-bottom: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .marquee-item .price { 
            font-size: 13px; 
            color: #d4af37; 
            font-weight: bold;
        }
        /* ======================================== */
        
        /* مودال التفاصيل */
        .modal { display: none; position: fixed; inset: 0; background: rgba(10, 15, 18, 0.97); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(12px); }
        .modal-content { background: linear-gradient(145deg, #141a1f, #0f1419); border-radius: 1.5rem; padding: 1.75rem; max-width: 500px; width: 90%; border: 1px solid rgba(212, 175, 55, 0.4); box-shadow: 0 25px 40px rgba(0,0,0,0.5); max-height: 85vh; overflow-y: auto; }
        .detail-spec { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 12px; margin-top: 12px; }
        .spec-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px dashed rgba(255,255,255,0.1); }
        .spec-label { color: #d4af37; font-weight: 500; }
        
        .loader { width: 45px; height: 45px; border: 3px solid rgba(212, 175, 55, 0.2); border-top: 3px solid #d4af37; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: #1a1f24; }
        ::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 3px; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        .toast { position: fixed; bottom: 20px; left: 20px; background: #10b981; color: white; padding: 12px 20px; border-radius: 10px; z-index: 9999; animation: slideIn 0.3s ease; }
        .toast.error { background: #dc2626; }
        @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>

    <!-- الهيدر -->
    <nav class="sticky top-0 z-50 bg-[#0a0f12]/95 backdrop-blur-lg gold-border-bottom">
        <div class="container mx-auto px-4 py-3">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-4 cursor-pointer" onclick="window.location.reload();">
                    <img src="https://dso5.raed.net:449/files/Gemini-Generated-Image-wgpl90wgpl90wgpl.png" alt="شعار أكاد" class="w-16 h-16 rounded-full border-2 border-[#d4af37] object-cover bg-[#1a1108] shadow-lg transition-transform hover:scale-105">
                    <div>
                        <div class="text-2xl font-black text-[#d4af37] tracking-wide">أَكَّد</div>
                        <div class="text-[10px] text-white/40 tracking-wider">AKKAD DIGITAL STORE</div>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="shareStore()" class="w-10 h-10 rounded-lg bg-white/10 hover:bg-white/20 transition flex items-center justify-center"><i class="fas fa-share-alt"></i></button>
                    <a href="https://wa.me/9647730492020" class="w-10 h-10 rounded-lg bg-[#25D366] flex items-center justify-center hover:bg-[#128C7E] transition shadow-lg" target="_blank"><i class="fab fa-whatsapp text-lg"></i></a>
                </div>
            </div>
            
            <div class="relative mt-4">
                <input type="text" id="searchInput" onkeyup="searchProducts()" class="w-full bg-black/40 border border-white/10 rounded-xl py-3 px-4 pr-12 text-white placeholder:text-white/30 outline-none focus:border-[#d4af37] transition" placeholder="🔍 ابحث عن منتج...">
                <i class="fas fa-search absolute right-4 top-1/2 -translate-y-1/2 text-white/30"></i>
            </div>
            
            <div id="categoriesContainer" class="flex gap-2 mt-4 overflow-x-auto no-scrollbar pb-2"></div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-6">
        <!-- شريط أبرز المنتجات - تم تكبيره -->
        <div id="marqueeSection" class="marquee-section hidden">
            <div class="flex justify-between items-center mb-4 px-2">
                <h3 class="text-base font-bold text-[#d4af37]"><i class="fas fa-star-of-life ml-1"></i> أبرز المنتجات</h3>
                <span class="text-[11px] text-white/30">اسحب للمزيد ←</span>
            </div>
            <div class="marquee-track" id="marqueeTrack"></div>
        </div>
        
        <div id="loadingScreen" class="text-center py-20">
            <div class="loader"></div>
            <p class="text-white/50 text-sm mt-3">جاري تحميل كنوز بلاد الرافدين...</p>
        </div>
        
        <div id="productsGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5 hidden"></div>
        
        <div id="noResults" class="hidden text-center py-20">
            <i class="fas fa-search text-5xl text-white/20 mb-4"></i>
            <p class="text-white/40">لا توجد منتجات مطابقة للبحث</p>
        </div>
    </main>

    <!-- مودال التفاصيل -->
    <div id="detailsModal" class="modal" onclick="closeModal('detailsModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-4">
                <h2 id="modalTitle" class="text-xl font-bold text-[#d4af37]"></h2>
                <button onclick="closeModal('detailsModal')" class="text-white/50 hover:text-white text-2xl">&times;</button>
            </div>
            <div id="modalDesc" class="text-sm text-white/70 leading-relaxed mb-4 whitespace-pre-line max-h-[50vh] overflow-y-auto"></div>
            <div id="modalSpecs" class="detail-spec"></div>
            <div class="flex gap-3 mt-6">
                <button onclick="closeModal('detailsModal')" class="flex-1 btn-outline py-2 rounded-lg text-sm">إغلاق</button>
            </div>
        </div>
    </div>

    <!-- مودال الطلب السريع -->
    <div id="orderModal" class="modal" onclick="closeModal('orderModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold text-[#d4af37]"><i class="fab fa-whatsapp ml-2"></i>طلب سريع</h3>
                <button onclick="closeModal('orderModal')" class="text-white/50 hover:text-white text-2xl">&times;</button>
            </div>
            <div id="orderProductInfo" class="bg-white/5 p-3 rounded-lg text-sm mb-4"></div>
            <form id="orderForm" class="space-y-3">
                <input type="text" id="custName" placeholder="👤 اسم الزبون *" class="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-white outline-none focus:border-[#d4af37]" required>
                <select id="custGov" class="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-white outline-none focus:border-[#d4af37]" required>
                    <option value="">🏛️ المحافظة *</option>
                    <option>بغداد</option><option>البصرة</option><option>نينوى</option><option>أربيل</option><option>السليمانية</option>
                    <option>دهوك</option><option>كركوك</option><option>صلاح الدين</option><option>ديالى</option><option>الأنبار</option>
                    <option>بابل</option><option>الكوت</option><option>المثنى</option><option>ذي قار</option><option>القادسية</option>
                    <option>ميسان</option><option>النجف</option><option>كربلاء</option>
                </select>
                <input type="text" id="custCity" placeholder="📍 المدينة / الحي *" class="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-white outline-none focus:border-[#d4af37]" required>
                <input type="text" id="custLandmark" placeholder="📍 أقرب نقطة دالة (مدرسة، جامع، محطة)" class="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-white outline-none focus:border-[#d4af37]">
                <input type="tel" id="custPhone" placeholder="📱 رقم الموبايل *" class="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-white outline-none focus:border-[#d4af37]" required>
                <button type="submit" class="btn-gold w-full py-3 rounded-xl font-bold"><i class="fab fa-whatsapp ml-2"></i>إرسال الطلب</button>
                <button type="button" onclick="closeModal('orderModal')" class="w-full py-2 text-xs text-white/40">إلغاء</button>
            </form>
        </div>
    </div>

    <!-- مودال الفيديو -->
    <div id="videoModal" class="modal" onclick="closeVideo()">
        <div class="relative w-[90%] max-w-3xl aspect-video bg-black rounded-xl overflow-hidden border border-[#d4af37]/30">
            <button onclick="closeVideo()" class="absolute -top-10 left-0 text-white/70 hover:text-white text-2xl">&times;</button>
            <iframe id="videoFrame" class="w-full h-full" src="" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        // ========================================
        // إعدادات Firebase
        // ========================================
        const firebaseConfig = {
            apiKey: "AIzaSyAEH25yJ-pwfgFUMjLZNgDyNqw8Rcv9S6E",
            authDomain: "akkad-store-ab5a1.firebaseapp.com",
            databaseURL: "https://akkad-store-ab5a1-default-rtdb.firebaseio.com",
            projectId: "akkad-store-ab5a1",
            storageBucket: "akkad-store-ab5a1.firebasestorage.app",
            messagingSenderId: "456810444639",
            appId: "1:456810444639:web:a706dc19781cd7738e28ea"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let allProducts = [], categories = {}, currentCategory = 'all', currentSearch = '', selectedProduct = null;
        
        function showToast(msg, isError = false) {
            let toast = document.createElement('div');
            toast.className = `toast ${isError ? 'error' : ''}`;
            toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'} ml-2"></i>${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function shareStore() { if(navigator.share) navigator.share({ title: 'متجر أكاد', text: 'اكتشف كنوز بلاد الرافدين الرقمية', url: window.location.href }); else { navigator.clipboard.writeText(window.location.href); showToast('✅ تم نسخ رابط المتجر'); } }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function closeVideo() { document.getElementById('videoModal').style.display = 'none'; document.getElementById('videoFrame').src = ''; }
        function escapeHtml(t) { if(!t) return ''; return String(t).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
        
        function getYouTubeId(url) { if(!url) return null; let m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/); return m ? m[1] : null; }
        function playVideo(url) { let id = getYouTubeId(url); if(id) { document.getElementById('videoFrame').src = `https://www.youtube.com/embed/${id}?autoplay=1&rel=0`; document.getElementById('videoModal').style.display = 'flex'; } else showToast('⚠️ رابط الفيديو غير صالح', true); }
        
        async function loadData() {
            try {
                let [catsSnap, prodsSnap] = await Promise.all([db.ref('categories').once('value'), db.ref('products').once('value')]);
                categories = catsSnap.val() || {};
                allProducts = Object.entries(prodsSnap.val() || {}).map(([id,data])=>({id,...data}));
                document.getElementById('loadingScreen').classList.add('hidden');
                document.getElementById('productsGrid').classList.remove('hidden');
                renderCategories();
                renderProducts();
                renderMarquee();
            } catch(e) { showToast('❌ فشل التحميل', true); }
        }
        
        function getSortedCategories() { return Object.entries(categories).sort((a,b)=>(parseInt(a[0])||999)-(parseInt(b[0])||999)); }
        function renderCategories() {
            let container = document.getElementById('categoriesContainer');
            let sorted = getSortedCategories();
            let html = `<button onclick="filterCategory('all')" class="cat-btn ${currentCategory === 'all' ? 'active' : ''}">🏠 الكل</button>`;
            sorted.forEach(([key, name]) => { html += `<button onclick="filterCategory('${key}')" class="cat-btn ${currentCategory === key ? 'active' : ''}">📁 ${escapeHtml(name.replace(/^\d+_/, ''))}</button>`; });
            container.innerHTML = html;
        }
        function filterCategory(key) { currentCategory = key; renderCategories(); renderProducts(); }
        function searchProducts() { currentSearch = document.getElementById('searchInput').value.toLowerCase(); renderProducts(); }
        
        function renderProducts() {
            let filtered = allProducts.filter(p => (currentCategory === 'all' || p.category === currentCategory) && (!currentSearch || p.name.toLowerCase().includes(currentSearch)));
            let grid = document.getElementById('productsGrid'), noRes = document.getElementById('noResults');
            if(filtered.length === 0) { grid.classList.add('hidden'); noRes.classList.remove('hidden'); return; }
            grid.classList.remove('hidden'); noRes.classList.add('hidden');
            
            grid.innerHTML = filtered.map(p => `
                <div class="product-card">
                    <div class="media-box" onclick="handleMediaClick('${p.id}')">
                        <img src="${p.img || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22%3E%3Crect width=%22200%22 height=%22200%22 fill=%22%231a1a2e%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23d4af37%22%3E📦%3C/text%3E%3C/svg%3E'}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22%3E%3Crect width=%22200%22 height=%22200%22 fill=%22%231a1a2e%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23d4af37%22%3E📦%3C/text%3E%3C/svg%3E'}">
                        ${p.video ? `<div class="video-badge"><i class="fas fa-video text-xs"></i> فيديو</div><div class="video-overlay"><i class="fas fa-play-circle text-white text-4xl"></i></div>` : ''}
                    </div>
                    <div class="p-4">
                        <h3 class="font-bold text-sm line-clamp-2 mb-1">${escapeHtml(p.name)}</h3>
                        <div class="text-[#d4af37] font-bold text-lg mb-3">${Number(p.price).toLocaleString()} د.ع</div>
                        <div class="flex gap-2">
                            <button onclick="openOrderModal('${p.id}')" class="btn-gold flex-1 py-2 rounded-lg text-sm"><i class="fab fa-whatsapp ml-1"></i> طلب سريع</button>
                            <button onclick="showDetails('${p.id}')" class="btn-outline flex-1 py-2 rounded-lg text-sm"><i class="fas fa-file-alt ml-1"></i> المواصفات</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function handleMediaClick(id) { let p = allProducts.find(x => x.id === id); if(p?.video) playVideo(p.video); else showDetails(id); }
        
        function showDetails(id) {
            let p = allProducts.find(x => x.id === id);
            if(!p) return;
            document.getElementById('modalTitle').innerHTML = p.name;
            let desc = p.desc || 'لا توجد مواصفات تفصيلية';
            document.getElementById('modalDesc').innerHTML = escapeHtml(desc).replace(/\n/g,'<br>');
            let specsHtml = `<div class="spec-item"><span class="spec-label">💰 السعر:</span><span>${Number(p.price).toLocaleString()} دينار عراقي</span></div>`;
            specsHtml += `<div class="spec-item"><span class="spec-label">📦 القسم:</span><span>${escapeHtml(categories[p.category]?.replace(/^\d+_/, '') || 'عام')}</span></div>`;
            document.getElementById('modalSpecs').innerHTML = specsHtml;
            document.getElementById('detailsModal').style.display = 'flex';
        }
        
        function openOrderModal(id) {
            selectedProduct = allProducts.find(x => x.id === id);
            if(!selectedProduct) return;
            document.getElementById('orderProductInfo').innerHTML = `<div class="flex justify-between"><span>${escapeHtml(selectedProduct.name)}</span><span class="text-[#d4af37]">${Number(selectedProduct.price).toLocaleString()} د.ع</span></div>`;
            document.getElementById('custName').value = '';
            document.getElementById('custGov').value = '';
            document.getElementById('custCity').value = '';
            document.getElementById('custLandmark').value = '';
            document.getElementById('custPhone').value = '';
            document.getElementById('orderModal').style.display = 'flex';
        }
        
        function renderMarquee() {
            let container = document.getElementById('marqueeSection'), track = document.getElementById('marqueeTrack');
            if(allProducts.length === 0) return;
            let topProducts = [...allProducts].sort((a,b) => b.price - a.price).slice(0, 12);
            let items = topProducts.map(p => `
                <div class="marquee-item" onclick="showDetails('${p.id}')">
                    <img src="${p.img || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22%3E%3Crect width=%22200%22 height=%22200%22 fill=%22%231a1a2e%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23d4af37%22%3E📦%3C/text%3E%3C/svg%3E'}">
                    <div class="info">
                        <div class="name">${escapeHtml(p.name)}</div>
                        <div class="price">${Number(p.price).toLocaleString()} د.ع</div>
                    </div>
                </div>
            `).join('');
            track.innerHTML = items + items;
            container.classList.remove('hidden');
        }
        
        document.getElementById('orderForm').addEventListener('submit', async e => {
            e.preventDefault();
            let name = document.getElementById('custName').value.trim();
            let governorate = document.getElementById('custGov').value;
            let city = document.getElementById('custCity').value.trim();
            let landmark = document.getElementById('custLandmark').value.trim();
            let phone = document.getElementById('custPhone').value.trim();
            
            if(!name || !governorate || !city || !phone) {
                showToast('⚠️ الرجاء ملء جميع الحقول المطلوبة', true);
                return;
            }
            
            let orderData = {
                orderId: Date.now().toString(),
                customerName: name,
                governorate: governorate,
                city: city,
                landmark: landmark,
                phone: phone,
                productId: selectedProduct.id,
                productName: selectedProduct.name,
                productPrice: selectedProduct.price,
                status: 'جديد',
                createdAt: new Date().toISOString(),
                createdAtTimestamp: Date.now()
            };
            
            try {
                await db.ref('orders/' + orderData.orderId).set(orderData);
                let msg = `🛍️ *طلب جديد - متجر أكاد*%0A%0A` +
                    `📦 *المنتج:* ${selectedProduct.name}%0A` +
                    `💰 *السعر:* ${Number(selectedProduct.price).toLocaleString()} د.ع%0A%0A` +
                    `👤 *الاسم:* ${name}%0A` +
                    `🏛️ *المحافظة:* ${governorate}%0A` +
                    `📍 *المنطقة:* ${city}%0A` +
                    (landmark ? `📍 *نقطة دالة:* ${landmark}%0A` : '') +
                    `📱 *الجوال:* ${phone}%0A%0A` +
                    `📅 ${new Date().toLocaleString('ar-IQ')}`;
                
                window.open(`https://wa.me/9647730492020?text=${encodeURIComponent(msg)}`, '_blank');
                showToast('✅ تم إرسال الطلب بنجاح! سيتم تحويلك للواتساب');
                closeModal('orderModal');
            } catch(err) {
                console.error(err);
                showToast('❌ فشل إرسال الطلب، حاول مرة أخرى', true);
            }
        });
        
        loadData();
        setInterval(() => { loadData(); }, 30000);
    </script>
</body>
</html>
