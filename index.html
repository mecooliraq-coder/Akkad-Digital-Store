<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر أكاد الرقمي | عالم الترفيه</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Tajawal', sans-serif; 
            background: radial-gradient(circle at top right, #1e293b, #080c14); 
            color: white; 
            min-height: 100vh;
            line-height: 1.6;
        }

        /* الخلفية المتحركة */
        #bg-elements {
            position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
        }
        .floating-img {
            position: absolute; opacity: 0.06; filter: grayscale(100%) blur(1px);
            animation: float-infinite var(--duration) ease-in-out infinite;
            border-radius: 1rem;
        }
        @keyframes float-infinite {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-25px) rotate(8deg); }
        }

        /* كروت الزجاج */
        .glass-card { 
            background: rgba(255, 255, 255, 0.04); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 1.5rem;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover { 
            transform: translateY(-8px); 
            background: rgba(255, 255, 255, 0.08);
            border-color: #3b82f6;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        /* شريط الأخبار */
        .ticker-wrapper { overflow: hidden; white-space: nowrap; background: rgba(59, 130, 246, 0.08); border-bottom: 1px solid rgba(255,255,255,0.08); }
        .ticker-content { display: inline-block; animation: ticker 45s linear infinite; padding: 8px 0; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* النوافذ المنبثقة */
        .modal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); 
            z-index: 1000; align-items: center; justify-content: center; 
            backdrop-filter: blur(8px); padding: 16px; animation: fadeIn 0.2s;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal-content { 
            background: #1e293b; border: 1px solid rgba(255,255,255,0.15); 
            width: 100%; max-width: 500px; border-radius: 1.5rem; 
            padding: 1.5rem; animation: slideUp 0.3s;
        }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* التنبيهات */
        #toast { 
            position: fixed; top: 20px; left: 20px; z-index: 2000; 
            padding: 12px 20px; border-radius: 12px; color: white; 
            font-weight: 500; font-size: 14px; display: none; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); animation: slideIn 0.3s;
        }
        @keyframes slideIn { from { transform: translateX(-100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast-success { background: linear-gradient(135deg, #10b981, #059669); }
        .toast-error { background: linear-gradient(135deg, #ef4444, #dc2626); }

        /* التحميل */
        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 40px; height: 40px;
            animation: spin 1s linear infinite;
            margin: 40px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body>
    <!-- خلفية متحركة -->
    <div id="bg-elements"></div>

    <!-- شريط التنبيهات -->
    <div id="toast"></div>

    <!-- القائمة العلوية -->
    <nav class="sticky top-0 z-50 bg-slate-900/85 backdrop-blur-xl border-b border-white/10 shadow-2xl">
        <div class="container mx-auto px-4 py-3">
            <div class="flex justify-between items-center mb-3">
                <div class="flex items-center gap-3">
                    <div class="w-11 h-11 bg-gradient-to-br from-blue-500 to-blue-700 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/30">
                        <i class="fas fa-tv text-white text-lg"></i>
                    </div>
                    <div>
                        <h1 class="text-lg font-bold tracking-tight">AKKAD <span class="text-blue-400">STORE</span></h1>
                        <p class="text-[10px] text-gray-400">أفضل أجهزة الترفيه الرقمي</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <a href="admin.html" class="text-gray-400 hover:text-white transition text-sm flex items-center gap-1">
                        <i class="fas fa-user-cog"></i> الإدارة
                    </a>
                    <a href="https://wa.me/9647730492020" class="bg-green-600 hover:bg-green-500 text-white p-2.5 rounded-xl transition shadow-lg shadow-green-500/20">
                        <i class="fab fa-whatsapp text-xl"></i>
                    </a>
                </div>
            </div>
            
            <!-- شريط البحث -->
            <div class="relative max-w-xl mx-auto">
                <input type="text" id="searchInput" onkeyup="searchProducts()" 
                    class="w-full bg-white/5 border border-white/10 rounded-2xl py-2.5 px-12 outline-none focus:border-blue-500 focus:bg-white/10 transition text-sm" 
                    placeholder="🔍 ابحث عن جهاز، ماركة، أو ميزة...">
                <i class="fas fa-search absolute right-4 top-3.5 text-gray-500"></i>
            </div>
            
            <!-- تصنيفات -->
            <div id="categories-nav" class="flex gap-2 mt-4 overflow-x-auto scrollbar-hide pb-1">
                <button onclick="filterByCat('all')" class="bg-blue-600 text-white px-4 py-1.5 rounded-full whitespace-nowrap text-xs font-medium shadow-lg shadow-blue-500/20 transition">الكل</button>
            </div>
        </div>
    </nav>

    <!-- شريط العروض -->
    <div class="ticker-wrapper">
        <div id="product-ticker" class="ticker-content text-blue-300 font-medium tracking-wide text-[11px]"></div>
    </div>

    <!-- المحتوى الرئيسي -->
    <main class="container mx-auto px-4 py-8 relative z-10">
        <!-- حالة التحميل -->
        <div id="loading" class="text-center py-20">
            <div class="loader"></div>
            <p class="text-gray-400 mt-4 text-sm">جاري تحميل المنتجات...</p>
        </div>
        
        <!-- شبكة المنتجات -->
        <div id="products-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5 hidden">
            <!-- سيتم ملؤها ديناميكياً -->
        </div>
        
        <!-- رسالة عند عدم وجود نتائج -->
        <div id="no-results" class="hidden text-center py-20">
            <i class="fas fa-search text-5xl text-gray-600 mb-4"></i>
            <p class="text-gray-400">لم نجد منتجات تطابق بحثك 😕</p>
            <button onclick="document.getElementById('searchInput').value=''; searchProducts();" class="mt-4 text-blue-400 hover:underline text-sm">عرض كل المنتجات</button>
        </div>
    </main>

    <!-- نافذة تفاصيل المنتج -->
    <div id="descModal" class="modal" onclick="closeModal('descModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="flex justify-between items-start mb-4">
                <h2 id="modalTitle" class="text-xl font-bold text-blue-400"></h2>
                <button onclick="closeModal('descModal')" class="text-gray-400 hover:text-white text-xl">&times;</button>
            </div>
            <p id="modalDesc" class="text-gray-300 leading-relaxed text-sm whitespace-pre-line mb-6"></p>
            <div class="flex gap-3">
                <button onclick="closeModal('descModal')" class="flex-1 bg-slate-700 py-2.5 rounded-xl font-medium hover:bg-slate-600 transition text-sm">إغلاق</button>
                <a id="modalOrderBtn" href="#" target="_blank" class="flex-1 bg-green-600 text-center py-2.5 rounded-xl font-medium hover:bg-green-500 transition text-sm flex items-center justify-center gap-2">
                    <i class="fab fa-whatsapp"></i> طلب الآن
                </a>
            </div>
        </div>
    </div>

    <!-- نافذة الفيديو -->
    <div id="videoModal" class="modal" onclick="closeModal('videoModal')">
        <div class="relative w-full max-w-4xl aspect-video rounded-2xl overflow-hidden bg-black shadow-2xl" onclick="event.stopPropagation()">
            <button onclick="closeModal('videoModal')" class="absolute top-4 right-4 z-10 bg-black/60 hover:bg-black/80 text-white w-10 h-10 rounded-full flex items-center justify-center transition">&times;</button>
            <iframe id="ytPlayer" class="w-full h-full" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        // ⚙️ إعدادات التطبيق
        const APP_CONFIG = {
            firebase: { databaseURL: "https://akkad-store-ab5a1-default-rtdb.firebaseio.com" },
            whatsapp: "9647730492020",
            currency: "د.ع"
        };

        // تهيئة Firebase
        firebase.initializeApp(APP_CONFIG.firebase);
        const db = firebase.database();
        
        let allProducts = [];
        let isLoading = true;

        // 🎯 دالة عرض التنبيهات
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.className = `toast-${type}`;
            toast.innerText = message;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3500);
        }

        // 📥 جلب الأقسام
        db.ref('categories').on('value', snap => {
            const cats = snap.val() || {};
            const nav = document.getElementById('categories-nav');
            if(!nav) return;
            
            // زر "الكل"
            nav.innerHTML = `<button onclick="filterByCat('all')" class="bg-blue-600 text-white px-4 py-1.5 rounded-full whitespace-nowrap text-xs font-medium shadow-lg shadow-blue-500/20 transition hover:scale-105">الكل</button>`;
            
            // أزرار الأقسام
            Object.entries(cats).forEach(([key, name]) => {
                nav.innerHTML += `<button onclick="filterByCat('${name}')" class="bg-white/5 border border-white/10 hover:bg-white/10 hover:border-blue-500/50 px-4 py-1.5 rounded-full whitespace-nowrap text-xs text-gray-300 transition">${name}</button>`;
            });
        }, error => {
            console.error('Error loading categories:', error);
            showToast('فشل تحميل الأقسام', 'error');
        });

        // 📦 جلب المنتجات
        db.ref('products').on('value', snap => {
            const data = snap.val();
            allProducts = data ? Object.entries(data).map(([id, val]) => ({id, ...val})).reverse() : [];
            
            // إخفاء التحميل وعرض المنتجات
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('products-grid').classList.remove('hidden');
            
            displayProducts(allProducts);
            updateTicker();
            createFloatingBg();
            isLoading = false;
            
        }, error => {
            console.error('Error loading products:', error);
            document.getElementById('loading').innerHTML = '<p class="text-red-400">❌ فشل الاتصال بالخادم</p>';
            showToast('حدث خطأ في تحميل المنتجات', 'error');
        });

        // 🖥️ عرض المنتجات في الشبكة
        function displayProducts(items) {
            const grid = document.getElementById('products-grid');
            const noResults = document.getElementById('no-results');
            
            if(!grid) return;
            
            if(items.length === 0) {
                grid.classList.add('hidden');
                noResults.classList.remove('hidden');
                return;
            }
            
            noResults.classList.add('hidden');
            grid.classList.remove('hidden');
            
            grid.innerHTML = items.map(p => {
                const whatsappText = encodeURIComponent(`مرحباً، أريد طلب: ${p.name} - السعر: ${p.price} ${APP_CONFIG.currency}`);
                const whatsappLink = `https://wa.me/${APP_CONFIG.whatsapp}?text=${whatsappText}`;
                
                return `
                <div class="glass-card p-4 flex flex-col relative group h-full">
                    <!-- شارة الفيديو -->
                    ${p.video ? `<span class="absolute top-3 left-3 bg-red-600 text-white text-[10px] px-2 py-0.5 rounded-full z-10 flex items-center gap-1"><i class="fas fa-play"></i> فيديو</span>` : ''}
                    
                    <!-- صورة المنتج -->
                    <div class="h-40 mb-4 bg-white/5 rounded-2xl flex items-center justify-center p-3 relative overflow-hidden cursor-pointer" ${p.video ? `onclick="openVideo('${p.video}')"` : ''}>
                        <img src="${p.img || 'https://via.placeholder.com/150/1e293b/94a3b8?text=No+Image'}" 
                             alt="${p.name}" 
                             class="max-h-full max-w-full object-contain transition duration-500 group-hover:scale-110"
                             onerror="this.src='https://via.placeholder.com/150/1e293b/94a3b8?text=صورة+غير+متوفرة'">
                        
                        ${p.video ? `
                        <div class="absolute inset-0 bg-black/30 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-all">
                            <i class="fas fa-play-circle text-white text-4xl drop-shadow-lg"></i>
                        </div>` : ''}
                    </div>
                    
                    <!-- معلومات المنتج -->
                    <div class="flex-1 flex flex-col">
                        <h3 class="font-bold text-[13px] mb-2 line-clamp-2 min-h-[32px] text-white">${p.name}</h3>
                        <div class="text-lg font-bold text-white mb-3">${p.price} <span class="text-[10px] text-gray-400 font-normal">${APP_CONFIG.currency}</span></div>
                        
                        <button onclick="showDetails('${p.name.replace(/'/g, "\\'")}', \`${(p.desc || 'لا يوجد وصف متاح حالياً').replace(/`/g, "'").replace(/\n/g, '<br>')}\`, '${whatsappLink}')" 
                                class="w-full border border-blue-500/40 text-blue-300 py-2 rounded-xl text-[11px] font-medium mb-3 hover:bg-blue-500/15 transition flex items-center justify-center gap-1">
                            <i class="fas fa-info-circle"></i> التفاصيل
                        </button>
                    </div>
                    
                    <!-- زر الطلب -->
                    <a href="${whatsappLink}" target="_blank" 
                       class="w-full bg-gradient-to-r from-green-600 to-green-500 hover:from-green-500 hover:to-green-400 text-white py-2.5 rounded-xl flex items-center justify-center gap-2 transition font-medium text-xs shadow-lg shadow-green-500/20">
                        <i class="fab fa-whatsapp"></i> اطلب الآن
                    </a>
                </div>`;
            }).join('');
        }

        // 🎬 تحديث شريط الأخبار
        function updateTicker() {
            const ticker = document.getElementById('product-ticker');
            if(!ticker || allProducts.length === 0) return;
            
            const items = allProducts.slice(0, 10).map(p => 
                `<span class="mx-8 inline-flex items-center gap-2"><i class="fas fa-tag text-blue-400"></i> ${p.name} - ${p.price} ${APP_CONFIG.currency}</span>`
            ).join('');
            ticker.innerHTML = items + items; // تكرار لسلاسة الحركة
        }

        // 🎨 إنشاء خلفية عائمة
        function createFloatingBg() {
            const container = document.getElementById('bg-elements');
            if(!container) return;
            container.innerHTML = "";
            
            const shuffled = [...allProducts].filter(p => p.img).slice(0, 6);
            shuffled.forEach((p, i) => {
                const img = document.createElement('img');
                img.src = p.img;
                img.className = 'floating-img';
                img.style.top = `${Math.random() * 70 + 15}%`;
                img.style.left = `${Math.random() * 70 + 10}%`;
                img.style.width = `${Math.random() * 80 + 80}px`;
                img.style.setProperty('--duration', `${Math.random() * 12 + 18}s`);
                img.style.animationDelay = `${Math.random() * 5}s`;
                container.appendChild(img);
            });
        }

        // 🔍 البحث
        function searchProducts() {
            const term = document.getElementById('searchInput').value.toLowerCase().trim();
            if(term.length < 2 && term.length > 0) return; // انتظار 2 أحرف
            
            const filtered = term 
                ? allProducts.filter(p => 
                    p.name.toLowerCase().includes(term) || 
                    (p.desc && p.desc.toLowerCase().includes(term)) ||
                    (p.cat && p.cat.toLowerCase().includes(term))
                )
                : allProducts;
            displayProducts(filtered);
        }

        // 📂 التصفية حسب القسم
        function filterByCat(category) {
            // تحديث حالة الأزرار
            document.querySelectorAll('#categories-nav button').forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white', 'shadow-lg');
                btn.classList.add('bg-white/5', 'text-gray-300');
            });
            event.target.classList.remove('bg-white/5', 'text-gray-300');
            event.target.classList.add('bg-blue-600', 'text-white', 'shadow-lg');
            
            const filtered = category === 'all' 
                ? allProducts 
                : allProducts.filter(p => p.cat === category);
            displayProducts(filtered);
        }

        // 📋 عرض التفاصيل
        function showDetails(title, desc, whatsappLink) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalDesc').innerHTML = desc;
            document.getElementById('modalOrderBtn').href = whatsappLink;
            document.getElementById('descModal').style.display = 'flex';
            document.body.style.overflow = 'hidden'; // منع التمرير
        }

        // 🎥 تشغيل الفيديو
        function openVideo(videoId) {
            document.getElementById('ytPlayer').src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
            document.getElementById('videoModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        // ❌ إغلاق النوافذ
        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
            document.body.style.overflow = '';
            if(modalId === 'videoModal') {
                document.getElementById('ytPlayer').src = "";
            }
        }

        // ⌨️ إغلاق النوافذ بمفتاح Escape
        document.addEventListener('keydown', e => {
            if(e.key === 'Escape') {
                closeModal('descModal');
                closeModal('videoModal');
            }
        });

        // 🚀 تهيئة إضافية عند التحميل
        window.addEventListener('load', () => {
            // إخفاء التحميل بعد 10 ثوان كحد أقصى
            setTimeout(() => {
                if(isLoading) {
                    document.getElementById('loading').innerHTML = '<p class="text-yellow-400">⏳ التحميل يستغرق وقتاً أطول...</p>';
                }
            }, 10000);
        });
    </script>
</body>
</html>
