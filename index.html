<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>أكاد | متجر بلاد الرافدين الرقمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background: #0a0f12;
            color: #e0d6c0;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .bg-pattern {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 30%, rgba(212, 175, 55, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(212, 175, 55, 0.04) 0%, transparent 40%),
                repeating-linear-gradient(45deg, rgba(139, 90, 43, 0.02) 0px, rgba(139, 90, 43, 0.02) 2px, transparent 2px, transparent 8px);
            animation: slowZoom 20s ease-in-out infinite alternate;
        }
        
        @keyframes slowZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }
        
        .gold-border-bottom {
            border-bottom: 2px solid #d4af37;
            box-shadow: 0 2px 15px rgba(212, 175, 55, 0.15);
        }
        
        /* شريط الأقسام مع ميزة السحب */
        #categoriesContainer {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            white-space: nowrap;
            padding-bottom: 10px;
            cursor: grab;
            user-select: none;
            scroll-behavior: smooth;
        }
        #categoriesContainer:active { cursor: grabbing; }
        #categoriesContainer::-webkit-scrollbar { display: none; }

        .cat-btn {
            flex-shrink: 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(212, 175, 55, 0.25);
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 13px;
            transition: all 0.3s ease;
        }
        .cat-btn.active { background: #d4af37; color: #0a0f12; border-color: #d4af37; }

        /* بطاقات المنتجات */
        .product-card {
            background: rgba(20, 26, 31, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 1.25rem;
            transition: all 0.4s ease;
            overflow: hidden;
        }
        .product-card:hover { transform: translateY(-8px); border-color: #d4af37; }
        .media-box { height: 160px; overflow: hidden; }
        .media-box img { width: 100%; height: 100%; object-fit: cover; }

        .btn-gold { background: linear-gradient(135deg, #d4af37, #b8942e); color: #0a0f12; font-weight: bold; }
        .btn-outline { border: 1px solid rgba(212, 175, 55, 0.4); color: #d4af37; }

        /* المودال */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-content { background: #141a1f; border-radius: 1.5rem; padding: 20px; width: 90%; max-width: 450px; border: 1px solid #d4af37; }
        
        .toast { position: fixed; bottom: 20px; left: 20px; background: #10b981; color: white; padding: 10px 20px; border-radius: 8px; z-index: 2000; }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>

    <nav class="sticky top-0 z-50 bg-[#0a0f12]/95 backdrop-blur-lg gold-border-bottom">
        <div class="container mx-auto px-4 py-3">
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 border-2 border-[#d4af37] rounded-full flex items-center justify-center font-bold text-[#d4af37]">أ</div>
                    <div>
                        <div class="text-sm font-bold text-[#d4af37]">أَكَّد</div>
                        <div class="text-[8px] text-white/40">AKKAD DIGITAL</div>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="toggleCart()" class="relative w-9 h-9 bg-white/10 rounded-lg flex items-center justify-center">
                        <i class="fas fa-shopping-bag"></i>
                        <span id="cartCount" class="absolute -top-2 -right-2 bg-[#d4af37] text-[#0a0f12] text-[10px] w-5 h-5 rounded-full hidden flex items-center justify-center font-bold">0</span>
                    </button>
                    <a href="https://wa.me/9647730492020" class="w-9 h-9 bg-[#25D366] rounded-lg flex items-center justify-center"><i class="fab fa-whatsapp"></i></a>
                </div>
            </div>
            <input type="text" id="searchInput" onkeyup="searchProducts()" class="w-full bg-black/40 border border-white/10 rounded-xl py-2 px-4 text-white outline-none focus:border-[#d4af37] mb-3" placeholder="🔍 ابحث عن منتج...">
            <div id="categoriesContainer"></div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-6">
        <div id="loadingScreen" class="text-center py-20"><div class="w-10 h-10 border-4 border-t-[#d4af37] border-white/10 rounded-full animate-spin mx-auto"></div></div>
        <div id="productsGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
    </main>

    <!-- مودال التفاصيل -->
    <div id="detailsModal" class="modal" onclick="closeModal()">
        <div class="modal-content text-right" onclick="event.stopPropagation()">
            <h3 id="mTitle" class="text-lg font-bold text-[#d4af37] mb-2"></h3>
            <p id="mDesc" class="text-sm text-white/70 mb-4 whitespace-pre-line"></p>
            <div id="mSpecs" class="bg-white/5 p-3 rounded-lg text-xs space-y-2 mb-4"></div>
            <button onclick="closeModal()" class="w-full btn-gold py-2 rounded-lg">إغلاق</button>
        </div>
    </div>

    <script>
        // تكوين Firebase (استخدم بياناتك الحقيقية هنا)
        const firebaseConfig = {
            apiKey: "AIzaSyAEH25yJ-pwfgFUMjLZNgDyNqw8Rcv9S6E",
            authDomain: "akkad-store-ab5a1.firebaseapp.com",
            databaseURL: "https://akkad-store-ab5a1-default-rtdb.firebaseio.com",
            projectId: "akkad-store-ab5a1",
            storageBucket: "akkad-store-ab5a1.firebasestorage.app",
            messagingSenderId: "456810444639",
            appId: "1:456810444639:web:a706dc19781cd7738e28ea"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allProducts = [], categories = {}, currentCategory = 'all', cart = [];

        // --- تفعيل ميزة السحب لشريط الأقسام ---
        const slider = document.getElementById('categoriesContainer');
        let isDown = false, startX, scrollLeft;

        slider.addEventListener('mousedown', (e) => {
            isDown = true;
            startX = e.pageX - slider.offsetLeft;
            scrollLeft = slider.scrollLeft;
        });
        slider.addEventListener('mouseleave', () => isDown = false);
        slider.addEventListener('mouseup', () => isDown = false);
        slider.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - slider.offsetLeft;
            const walk = (x - startX) * 2;
            slider.scrollLeft = scrollLeft - walk;
        });

        async function init() {
            const [cSnap, pSnap] = await Promise.all([db.ref('categories').once('value'), db.ref('products').once('value')]);
            categories = cSnap.val() || {};
            allProducts = Object.entries(pSnap.val() || {}).map(([id, d]) => ({id, ...d}));
            document.getElementById('loadingScreen').style.display = 'none';
            renderCategories();
            renderProducts();
        }

        function renderCategories() {
            let html = `<button onclick="setCat('all')" class="cat-btn ${currentCategory==='all'?'active':''}">الكل</button>`;
            Object.entries(categories).forEach(([key, val]) => {
                let name = val.includes('_') ? val.split('_')[1] : val;
                html += `<button onclick="setCat('${key}')" class="cat-btn ${currentCategory===key?'active':''}">${name}</button>`;
            });
            slider.innerHTML = html;
        }

        function setCat(k) { currentCategory = k; renderCategories(); renderProducts(); }

        function renderProducts() {
            let search = document.getElementById('searchInput').value.toLowerCase();
            let filtered = allProducts.filter(p => (currentCategory==='all' || p.category===currentCategory) && p.name.toLowerCase().includes(search));
            
            document.getElementById('productsGrid').innerHTML = filtered.map(p => `
                <div class="product-card p-2">
                    <div class="media-box rounded-xl mb-2"><img src="${p.img}"></div>
                    <h4 class="text-xs font-bold truncate mb-1">${p.name}</h4>
                    <div class="text-[#d4af37] text-xs font-bold mb-3">${Number(p.price).toLocaleString()} د.ع</div>
                    <div class="flex flex-col gap-2">
                        <button onclick="openSpecs('${p.id}')" class="btn-outline py-1.5 rounded-lg text-[10px]">المواصفات</button>
                        <a href="https://wa.me/9647730492020?text=طلب: ${p.name}" class="btn-gold py-1.5 rounded-lg text-[10px] text-center">طلب سريع</a>
                    </div>
                </div>
            `).join('');
        }

        function openSpecs(id) {
            let p = allProducts.find(x => x.id === id);
            document.getElementById('mTitle').innerText = p.name;
            document.getElementById('mDesc').innerText = p.desc || 'لا يوجد وصف';
            document.getElementById('mSpecs').innerHTML = `
                <div class="flex justify-between"><span>الرام:</span><span>${p.ram || '-'}</span></div>
                <div class="flex justify-between"><span>الذاكرة:</span><span>${p.storage || '-'}</span></div>
            `;
            document.getElementById('detailsModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('detailsModal').style.display = 'none'; }
        function searchProducts() { renderProducts(); }

        window.onload = init;
    </script>
</body>
</html>
