<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر أكاد الرقمي | AKKAD STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Amiri:wght@700&display=swap');
        
        :root {
            --akkad-dark: #030508;
            --akkad-gold: #c9a961;
            --neon-cyan: #00f2ff;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--akkad-dark);
            color: #fff;
            background-image: radial-gradient(circle at top, #0a1018, #030508);
            min-height: 100vh;
        }

        .gold-text { font-family: 'Amiri', serif; color: var(--akkad-gold); }
        
        .product-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(201, 169, 97, 0.2);
            border-radius: 20px;
            overflow: hidden;
            transition: 0.3s;
        }

        .product-card:hover {
            border-color: var(--neon-cyan);
            transform: translateY(-5px);
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .category-btn {
            white-space: nowrap;
            transition: 0.3s;
        }
    </style>
</head>
<body>

    <header class="py-10 text-center border-b border-white/5">
        <h1 class="text-6xl gold-text tracking-tighter">AKKAD</h1>
        <p class="text-cyan-400 text-[10px] tracking-[0.5em] mt-2">THE DIGITAL CIVILIZATION</p>
    </header>

    <div id="catNav" class="flex justify-start sm:justify-center gap-3 py-6 sticky top-0 bg-[#030508]/95 z-50 overflow-x-auto px-4 no-scrollbar">
        </div>

    <main class="max-w-7xl mx-auto p-4 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4" id="productsGrid">
        <div class="col-span-full text-center py-20 text-gray-500">جاري تحميل المنتجات...</div>
    </main>

    <div id="descModal" class="modal-overlay">
        <div class="bg-[#0a0f18] p-6 rounded-3xl border border-gold-500/30 w-full max-w-lg mx-4">
            <h3 id="mTitle" class="text-2xl gold-text mb-4"></h3>
            <p id="mDesc" class="text-gray-300 leading-relaxed mb-6 whitespace-pre-wrap text-sm"></p>
            <button onclick="closeModal('descModal')" class="w-full py-3 bg-white/10 rounded-xl">إغلاق</button>
        </div>
    </div>

    <div id="orderModal" class="modal-overlay">
        <div class="bg-[#0a0f18] p-8 rounded-3xl border border-cyan-500/30 w-full max-w-md mx-4">
            <h3 class="text-2xl gold-text mb-6 text-center">تفاصيل الطلب</h3>
            <form id="orderForm" class="space-y-4">
                <input type="hidden" id="targetProd">
                <input type="text" id="custName" placeholder="الاسم الكامل" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl outline-none focus:border-cyan-400" required>
                <input type="tel" id="custPhone" placeholder="رقم الهاتف" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl outline-none focus:border-cyan-400" required>
                <textarea id="custAddr" placeholder="العنوان أو ملاحظات الطلب" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl outline-none focus:border-cyan-400 h-24" required></textarea>
                <button type="submit" class="w-full bg-green-600 py-4 rounded-xl font-bold text-white flex items-center justify-center gap-2">
                    <i class="fab fa-whatsapp"></i> إرسال عبر واتساب
                </button>
                <button type="button" onclick="closeModal('orderModal')" class="w-full text-gray-500">إلغاء</button>
            </form>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAEH25yJ-pwfgFUMjLZNgDyNqw8Rcv9S6E",
            authDomain: "akkad-store-ab5a1.firebaseapp.com",
            databaseURL: "https://akkad-store-ab5a1-default-rtdb.firebaseio.com",
            projectId: "akkad-store-ab5a1",
            storageBucket: "akkad-store-ab5a1.firebasestorage.app",
            messagingSenderId: "456810444639",
            appId: "1:456810444639:web:a706dc19781cd7738e28ea"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allProducts = [];
        let activeCategory = "الكل";

        // جلب الأقسام والمنتجات
        db.ref('categories').on('value', s => {
            const cats = s.val() ? Object.values(s.val()) : [];
            renderCategories(["الكل", ...cats]);
        });

        db.ref('products').on('value', s => {
            const data = s.val() || {};
            allProducts = Object.entries(data).map(([id, val]) => ({ id, ...val }));
            renderProducts();
        });

        function renderCategories(list) {
            const nav = document.getElementById('catNav');
            nav.innerHTML = list.map(c => `
                <button onclick="filterByCat('${c}')" class="category-btn px-6 py-2 rounded-full text-sm ${activeCategory === c ? 'bg-[var(--akkad-gold)] text-black font-bold' : 'bg-white/5 text-gray-400 hover:bg-white/10'}">
                    ${c}
                </button>
            `).join('');
        }

        function filterByCat(c) {
            activeCategory = c;
            renderCategories(Array.from(document.querySelectorAll('.category-btn')).map(b => b.innerText));
            renderProducts();
        }

        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            const filtered = activeCategory === "الكل" ? allProducts : allProducts.filter(p => p.pCat === activeCategory);
            
            if(filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-20 text-gray-500">لا توجد منتجات في هذا القسم حالياً</div>`;
                return;
            }

            grid.innerHTML = filtered.map(p => `
                <div class="product-card fade-in">
                    <div class="relative group">
                        <img src="${p.pImg}" class="w-full h-44 sm:h-64 object-cover" onerror="this.src='https://via.placeholder.com/400x500?text=AKKAD'">
                        ${p.pVid ? `
                            <button onclick="window.open('${p.pVid}')" class="absolute top-2 right-2 bg-black/60 p-2 rounded-full text-cyan-400">
                                <i class="fas fa-play text-xs"></i>
                            </button>
                        ` : ''}
                    </div>
                    <div class="p-3 sm:p-5">
                        <h3 class="text-sm sm:text-lg font-bold mb-1 truncate">${p.pName}</h3>
                        <div class="text-[var(--neon-cyan)] text-lg sm:text-xl font-bold mb-3">${Number(p.pPrice).toLocaleString()} <span class="text-[10px]">د.ع</span></div>
                        <div class="flex flex-col gap-2">
                            <button onclick="showDetails('${p.pName}', \`${p.pDesc || 'لا يوجد وصف حالياً'}\`)" class="text-[10px] sm:text-xs border border-[var(--akkad-gold)] text-[var(--akkad-gold)] py-2 rounded-lg hover:bg-[var(--akkad-gold)] hover:text-black transition">قراءة التفاصيل</button>
                            <button onclick="openOrderModal('${p.pName}')" class="text-[10px] sm:text-xs bg-cyan-500 text-black font-bold py-2 rounded-lg hover:bg-cyan-400 transition">طلب سريع</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function showDetails(title, desc) {
            document.getElementById('mTitle').innerText = title;
            document.getElementById('mDesc').innerText = desc;
            document.getElementById('descModal').style.display = 'flex';
        }

        function openOrderModal(name) {
            document.getElementById('targetProd').value = name;
            document.getElementById('orderModal').style.display = 'flex';
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        document.getElementById('orderForm').onsubmit = e => {
            e.preventDefault();
            const prod = document.getElementById('targetProd').value;
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const addr = document.getElementById('custAddr').value;
            
            const message = `مرحباً أكاد، أود طلب:%0A📦 المنتج: ${prod}%0A👤 الاسم: ${name}%0A📞 الهاتف: ${phone}%0A📍 العنوان: ${addr}`;
            window.open(`https://wa.me/9647730492020?text=${message}`, '_blank');
            closeModal('orderModal');
        };
    </script>
</body>
</html>
