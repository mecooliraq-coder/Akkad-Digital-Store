<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background: #0a0f12;
            color: #e0d6c0;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* خلفية متحركة */
        .bg-pattern {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 30%, rgba(212, 175, 55, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(212, 175, 55, 0.04) 0%, transparent 40%),
                repeating-linear-gradient(45deg, rgba(139, 90, 43, 0.02) 0px, rgba(139, 90, 43, 0.02) 2px, transparent 2px, transparent 8px);
            animation: slowZoom 20s ease-in-out infinite alternate;
        }
        
        @keyframes slowZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }
        
        /* شريط ذهبي */
        .gold-border-bottom {
            border-bottom: 2px solid #d4af37;
            box-shadow: 0 2px 15px rgba(212, 175, 55, 0.15);
        }
        
        /* بطاقات المنتجات */
        .product-card {
            background: rgba(20, 26, 31, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 1.25rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            position: relative;
        }
        
        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .product-card:hover {
            transform: translateY(-8px);
            border-color: #d4af37;
            box-shadow: 0 20px 35px rgba(0,0,0,0.4), 0 0 20px rgba(212,175,55,0.15);
        }
        
        .product-card:hover::before { opacity: 1; }
        
        .media-box {
            height: 180px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        
        .media-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        
        .product-card:hover .media-box img { transform: scale(1.08); }
        
        .video-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.3s ease;
        }
        
        .media-box:hover .video-overlay { opacity: 1; }
        
        .video-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: #d4af37;
            color: #0a0f12;
            font-size: 10px;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
            z-index: 2;
        }
        
        /* أزرار */
        .btn-gold {
            background: linear-gradient(135deg, #d4af37, #b8942e);
            color: #0a0f12;
            font-weight: 700;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }
        
        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.4);
        }
        
        .btn-outline {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(212, 175, 55, 0.3);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .btn-outline:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: #d4af37;
        }
        
        /* أزرار الأقسام */
        .cat-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(212, 175, 55, 0.25);
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
            white-space: nowrap;
        }
        
        .cat-btn.active { background: #d4af37; color: #0a0f12; border-color: #d4af37; box-shadow: 0 0 12px rgba(212, 175, 55, 0.3); }
        .cat-btn:hover:not(.active) { background: rgba(212, 175, 55, 0.15); border-color: #d4af37; }
        
        /* سلة التسوق */
        .cart-badge { position: relative; }
        .cart-count { position: absolute; top: -8px; right: -8px; background: #d4af37; color: #0a0f12; font-size: 10px; font-weight: bold; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        
        /* شريط المنتجات المتحرك (أبرز المنتجات) */
        .marquee-section {
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.08), transparent);
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            padding: 15px 0;
            overflow: hidden;
            margin: 20px 0 30px;
        }
        
        .marquee-track {
            display: flex;
            gap: 25px;
            width: max-content;
            animation: scrollMarquee 35s linear infinite;
        }
        
        .marquee-section:hover .marquee-track { animation-play-state: paused; }
        
        @keyframes scrollMarquee {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }
        
        .marquee-item {
            width: 210px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(212, 175, 55, 0.15);
        }
        
        .marquee-item:hover {
            border-color: #d4af37;
            background: rgba(212, 175, 55, 0.1);
            transform: translateY(-3px);
        }
        
        .marquee-item img {
            width: 55px;
            height: 55px;
            border-radius: 10px;
            object-fit: cover;
        }
        
        .marquee-item .info { flex: 1; }
        .marquee-item .name { font-size: 11px; font-weight: 600; line-height: 1.3; margin-bottom: 4px; }
        .marquee-item .price { font-size: 10px; color: #d4af37; font-weight: bold; }
        
        /* مودال التفاصيل المطورة */
        .modal { display: none; position: fixed; inset: 0; background: rgba(10, 15, 18, 0.97); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(12px); }
        .modal-content { background: linear-gradient(145deg, #141a1f, #0f1419); border-radius: 1.5rem; padding: 1.75rem; max-width: 500px; width: 90%; border: 1px solid rgba(212, 175, 55, 0.4); box-shadow: 0 25px 40px rgba(0,0,0,0.5); max-height: 85vh; overflow-y: auto; }
        .detail-spec { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 12px; margin-top: 12px; }
        .spec-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px dashed rgba(255,255,255,0.1); }
        .spec-label { color: #d4af37; font-weight: 500; }
        
        /* سلة التسوق الجانبية */
        .cart-sidebar { position: fixed; top: 0; left: -380px; width: 360px; height: 100%; background: #0f1419; z-index: 1100; transition: left 0.3s ease; box-shadow: -5px 0 30px rgba(0,0,0,0.5); border-left: 1px solid rgba(212, 175, 55, 0.3); display: flex; flex-direction: column; }
        .cart-sidebar.open { left: 0; }
        .cart-header { padding: 20px; border-bottom: 1px solid rgba(212, 175, 55, 0.2); display: flex; justify-content: space-between; align-items: center; }
        .cart-items { flex: 1; overflow-y: auto; padding: 15px; }
        .cart-item { display: flex; gap: 12px; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 10px; }
        .cart-item img { width: 55px; height: 55px; border-radius: 8px; object-fit: cover; }
        .cart-item-details { flex: 1; }
        .cart-item-title { font-size: 13px; font-weight: 600; }
        .cart-item-price { font-size: 12px; color: #d4af37; }
        .cart-item-quantity { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
        .cart-item-quantity button { width: 24px; height: 24px; border-radius: 6px; background: rgba(255,255,255,0.1); border: none; color: white; cursor: pointer; }
        .cart-footer { padding: 20px; border-top: 1px solid rgba(212, 175, 55, 0.2); }
        .cart-total { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 15px; font-size: 16px; }
        
        .loader { width: 45px; height: 45px; border: 3px solid rgba(212, 175, 55, 0.2); border-top: 3px solid #d4af37; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: #1a1f24; }
        ::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 3px; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        .toast { position: fixed; bottom: 20px; left: 20px; background: #10b981; color: white; padding: 12px 20px; border-radius: 10px; z-index: 9999; animation: slideIn 0.3s ease; }
        .toast.error { background: #dc2626; }
        @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>

    <script>
        // ========================================
        // إعدادات Firebase
        // ========================================
        const firebaseConfig = {
            apiKey: "AIzaSyAEH25yJ-pwfgFUMjLZNgDyNqw8Rcv9S6E",
            authDomain: "akkad-store-ab5a1.firebaseapp.com",
            databaseURL: "https://akkad-store-ab5a1-default-rtdb.firebaseio.com",
            projectId: "akkad-store-ab5a1",
            storageBucket: "akkad-store-ab5a1.firebasestorage.app",
            messagingSenderId: "456810444639",
            appId: "1:456810444639:web:a706dc19781cd7738e28ea"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let allProducts = [], categories = {}, currentCategory = 'all', currentSearch = '', selectedProduct = null;
        let cart = JSON.parse(localStorage.getItem('akkad_cart') || '[]');
        
        function showToast(msg, isError = false) {
            let toast = document.createElement('div');
            toast.className = `toast ${isError ? 'error' : ''}`;
            toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'} ml-2"></i>${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function shareStore() { if(navigator.share) navigator.share({ title: 'متجر أكاد', text: 'اكتشف كنوز بلاد الرافدين الرقمية', url: window.location.href }); else { navigator.clipboard.writeText(window.location.href); showToast('✅ تم نسخ رابط المتجر'); } }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function closeVideo() { document.getElementById('videoModal').style.display = 'none'; document.getElementById('videoFrame').src = ''; }
        function toggleCart() { document.getElementById('cartSidebar').classList.toggle('open'); }
        function escapeHtml(t) { if(!t) return ''; return String(t).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
        
        function getYouTubeId(url) { if(!url) return null; let m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/); return m ? m[1] : null; }
        function playVideo(url) { let id = getYouTubeId(url); if(id) { document.getElementById('videoFrame').src = `https://www.youtube.com/embed/${id}?autoplay=1&rel=0`; document.getElementById('videoModal').style.display = 'flex'; } else showToast('⚠️ رابط الفيديو غير صالح', true); }
        
        // سلة التسوق
        function saveCart() { localStorage.setItem('akkad_cart', JSON.stringify(cart)); updateCartUI(); }
        function addToCart(product, quantity = 1) {
            let existing = cart.find(item => item.id === product.id);
            if(existing) existing.quantity += quantity;
            else cart.push({ id: product.id, name: product.name, price: product.price, img: product.img, quantity });
            saveCart();
            showToast(`✅ تم إضافة ${product.name} إلى السلة`);
        }
        function removeFromCart(index) { cart.splice(index, 1); saveCart(); }
        function updateQuantity(index, delta) { if(cart[index].quantity + delta < 1) removeFromCart(index); else { cart[index].quantity += delta; saveCart(); } }
        
        function updateCartUI() {
            let container = document.getElementById('cartItemsList'), total = 0, itemCount = 0;
            if(cart.length === 0) container.innerHTML = '<p class="text-center text-white/40 py-8">🛒 سلة التسوق فارغة</p>';
            else {
                container.innerHTML = cart.map((item, idx) => {
                    total += item.price * item.quantity; itemCount += item.quantity;
                    return `<div class="cart-item"><img src="${item.img || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22%3E%3Crect width=%22200%22 height=%22200%22 fill=%22%231a1a2e%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23d4af37%22%3E📦%3C/text%3E%3C/svg%3E'}"><div class="cart-item-details"><div class="cart-item-title">${escapeHtml(item.name)}</div><div class="cart-item-price">${Number(item.price).toLocaleString()} د.ع</div><div class="cart-item-quantity"><button onclick="updateQuantity(${idx}, -1)">-</button><span>${item.quantity}</span><button onclick="updateQuantity(${idx}, 1)">+</button><button onclick="removeFromCart(${idx})" class="text-red-400 text-xs ml-2">حذف</button></div></div></div>`;
                }).join('');
            }
            document.getElementById('cartTotalAmount').innerHTML = `${Number(total).toLocaleString()} د.ع`;
            let badge = document.getElementById('cartCount');
            if(itemCount > 0) { badge.innerText = itemCount; badge.classList.remove('hidden'); } else badge.classList.add('hidden');
        }
        
        function checkoutFromCart() { if(cart.length === 0) { showToast('⚠️ السلة فارغة', true); return; } let total = cart.reduce((s,i)=>s+(i.price*i.quantity),0); let items = cart.map(i=>`• ${i.name} (${i.quantity} × ${Number(i.price).toLocaleString()} د.ع)`).join('%0A'); window.open(`https://wa.me/9647730492020?text=${encodeURIComponent(`🛍️ طلب جديد - متجر أكاد%0A%0A📦 المنتجات:%0A${items}%0A%0A💰 الإجمالي: ${total.toLocaleString()} د.ع`)}`, '_blank'); showToast('📱 جاري فتح واتساب'); }
        
        // تحميل البيانات
        async function loadData() {
            try {
                let [catsSnap, prodsSnap] = await Promise.all([db.ref('categories').once('value'), db.ref('products').once('value')]);
                categories = catsSnap.val() || {};
                allProducts = Object.entries(prodsSnap.val() || {}).map(([id,data])=>({id,...data}));
                document.getElementById('loadingScreen').classList.add('hidden');
                document.getElementById('productsGrid').classList.remove('hidden');
                renderCategories();
                renderProducts();
                renderMarquee();
                updateCartUI();
            } catch(e) { showToast('❌ فشل التحميل', true); }
        }
        
        function getSortedCategories() { return Object.entries(categories).sort((a,b)=>(parseInt(a[0])||999)-(parseInt(b[0])||999)); }
        function renderCategories() {
            let container = document.getElementById('categoriesContainer');
            let sorted = getSortedCategories();
            let html = `<button onclick="filterCategory('all')" class="cat-btn ${currentCategory === 'all' ? 'active' : ''}">🏠 الكل</button>`;
            sorted.forEach(([key, name]) => { html += `<button onclick="filterCategory('${key}')" class="cat-btn ${currentCategory === key ? 'active' : ''}">📁 ${escapeHtml(name.replace(/^\d+_/, ''))}</button>`; });
            container.innerHTML = html;
        }
        function filterCategory(key) { currentCategory = key; renderCategories(); renderProducts(); }
        function searchProducts() { currentSearch = document.getElementById('searchInput').value.toLowerCase(); renderProducts(); }
        
        // عرض المنتجات مع زر i
        function renderProducts() {
            let filtered = allProducts.filter(p => (currentCategory === 'all' || p.category === currentCategory) && (!currentSearch || p.name.toLowerCase().includes(currentSearch)));
            let grid = document.getElementById('productsGrid'), noRes = document.getElementById('noResults');
            if(filtered.length === 0) { grid.classList.add('hidden'); noRes.classList.remove('hidden'); return; }
            grid.classList.remove('hidden'); noRes.classList.add('hidden');
            grid.innerHTML = filtered.map(p => `
                <div class="product-card">
                    <div class="media-box" onclick="handleMediaClick('${p.id}')">
                        <img src="${p.img || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22%3E%3Crect width=%22200%22 height=%22200%22 fill=%22%231a1a2e%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23d4af37%22%3E📦%3C/text%3E%3C/svg%3E'}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22%3E%3Crect width=%22200%22 height=%22200%22 fill=%22%231a1a2e%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23d4af37%22%3E📦%3C/text%3E%3C/svg%3E'}">
                        ${p.video ? `<div class="video-badge"><i class="fas fa-video text-xs"></i> فيديو</div><div class="video-overlay"><i class="fas fa-play-circle text-white text-4xl"></i></div>` : ''}
                    </div>
                    <div class="p-4">
                        <h3 class="font-bold text-sm line-clamp-2 mb-1">${escapeHtml(p.name)}</h3>
                        <div class="text-[#d4af37] font-bold text-lg mb-3">${Number(p.price).toLocaleString()} د.ع</div>
                        <div class="flex gap-2">
                            <button onclick="quickBuy('${p.id}')" class="btn-gold flex-1 py-2 rounded-lg text-sm"><i class="fab fa-whatsapp ml-1"></i> شراء</button>
                            <button onclick="addToCartFromCard('${p.id}')" class="btn-outline w-10 py-2 rounded-lg text-sm"><i class="fas fa-cart-plus"></i></button>
                            <button onclick="showDetails('${p.id}')" class="btn-outline w-10 py-2 rounded-lg text-sm"><i class="fas fa-info-circle"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function handleMediaClick(id) { let p = allProducts.find(x => x.id === id); if(p?.video) playVideo(p.video); else showDetails(id); }
        
        // عرض التفاصيل المطورة (مع معلومات إضافية)
        function showDetails(id) {
            let p = allProducts.find(x => x.id === id);
            if(!p) return;
            document.getElementById('modalTitle').innerHTML = p.name;
            let desc = p.desc || 'لا توجد مواصفات تفصيلية';
            document.getElementById('modalDesc').innerHTML = escapeHtml(desc).replace(/\n/g,'<br>');
            let specsHtml = `<div class="spec-item"><span class="spec-label">💰 السعر:</span><span>${Number(p.price).toLocaleString()} دينار عراقي</span></div>`;
            specsHtml += `<div class="spec-item"><span class="spec-label">📦 القسم:</span><span>${escapeHtml(categories[p.category]?.replace(/^\d+_/, '') || 'عام')}</span></div>`;
            specsHtml += `<div class="spec-item"><span class="spec-label">🆔 رقم المنتج:</span><span>${p.id.substring(0, 8)}</span></div>`;
            document.getElementById('modalSpecs').innerHTML = specsHtml;
            document.getElementById('modalAddToCart').onclick = () => { addToCart(p); closeModal('detailsModal'); };
            document.getElementById('detailsModal').style.display = 'flex';
        }
        
        function addToCartFromCard(id) { let p = allProducts.find(x => x.id === id); if(p) addToCart(p); }
        function quickBuy(id) { selectedProduct = allProducts.find(x => x.id === id); openOrderModal(); }
        
        function openOrderModal() {
            document.getElementById('orderProductInfo').innerHTML = `<div class="flex justify-between"><span>${escapeHtml(selectedProduct.name)}</span><span class="text-[#d4af37]">${Number(selectedProduct.price).toLocaleString()} د.ع</span></div>`;
            ['custName','custCity','custPhone','custAddress'].forEach(i => document.getElementById(i).value = '');
            document.getElementById('custGov').value = '';
            document.getElementById('orderModal').style.display = 'flex';
        }
        
        // شريط أبرز المنتجات (أغلى 12 منتج)
        function renderMarquee() {
            let container = document.getElementById('marqueeSection'), track = document.getElementById('marqueeTrack');
            if(allProducts.length === 0) return;
            let topProducts = [...allProducts].sort((a,b) => b.price - a.price).slice(0, 12);
            let items = topProducts.map(p => `
                <div class="marquee-item" onclick="showDetails('${p.id}')">
                    <img src="${p.img || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22%3E%3Crect width=%22200%22 height=%22200%22 fill=%22%231a1a2e%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23d4af37%22%3E📦%3C/text%3E%3C/svg%3E'}">
                    <div class="info"><div class="name">${escapeHtml(p.name.substring(0, 25))}...</div><div class="price">${Number(p.price).toLocaleString()} د.ع</div></div>
                </div>
            `).join('');
            track.innerHTML = items + items;
            container.classList.remove('hidden');
        }
        
        // إرسال الطلب
        document.getElementById('orderForm').addEventListener('submit', async e => {
            e.preventDefault();
            let name = document.getElementById('custName').value, gov = document.getElementById('custGov').value, city = document.getElementById('custCity').value, phone = document.getElementById('custPhone').value, addr = document.getElementById('custAddress').value;
            if(!name || !gov || !city || !phone) return showToast('⚠️ الرجاء ملء جميع الحقول المطلوبة', true);
            let orderData = { orderId: Date.now().toString(), customerName: name, governorate: gov, city: city, phone: phone, address: addr, productId: selectedProduct.id, productName: selectedProduct.name, productPrice: selectedProduct.price, status: 'جديد', createdAt: new Date().toISOString(), createdAtTimestamp: Date.now() };
            try {
                await db.ref('orders/' + orderData.orderId).set(orderData);
                let msg = `🛍️ *طلب جديد - متجر أكاد*%0A%0A📦 *المنتج:* ${selectedProduct.name}%0A💰 *السعر:* ${Number(selectedProduct.price).toLocaleString()} د.ع%0A%0A👤 *الاسم:* ${name}%0A🏛️ *المحافظة:* ${gov}%0A📍 *المنطقة:* ${city}%0A📱 *الهاتف:* ${phone}${addr ? `%0A🏠 *العنوان:* ${addr}` : ''}%0A%0A📅 ${new Date().toLocaleString('ar-IQ')}`;
                window.open(`https://wa.me/9647730492020?text=${msg}`, '_blank');
                showToast('✅ تم إرسال الطلب بنجاح');
                closeModal('orderModal');
            } catch(err) { showToast('❌ فشل إرسال الطلب', true); }
        });
        
        loadData();
        setInterval(() => loadData(), 30000);
    </script>
</body>
</html>
