<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر أكاد الرقمي | Akkad Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; }
    </style>
</head>
<body class="bg-gray-50">

    <nav class="bg-slate-900 text-white sticky top-0 z-50 shadow-2xl">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="fas fa-satellite-dish text-blue-400 text-2xl"></i>
                <h1 class="text-xl font-bold tracking-wider">متجر أكاد الرقمي</h1>
            </div>
            
            <div class="relative">
                <button class="bg-blue-600 hover:bg-blue-700 p-2 rounded-full px-4 flex items-center gap-2 transition">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cart-count">0</span>
                </button>
            </div>
        </div>
        <div class="bg-slate-800 overflow-x-auto">
            <div class="container mx-auto px-4 flex gap-6 py-2 text-sm whitespace-nowrap">
                <button onclick="filterProducts('all')" class="hover:text-blue-400 transition">الكل</button>
                <button onclick="filterProducts('tvbox')" class="hover:text-blue-400 transition">أجهزة TV Box</button>
                <button onclick="filterProducts('satellite')" class="hover:text-blue-400 transition">ستلايت</button>
                <button onclick="filterProducts('mounts')" class="hover:text-blue-400 transition">حمالات تلفزيون</button>
                <button onclick="filterProducts('lighting')" class="hover:text-blue-400 transition">إضاءة سمارت</button>
            </div>
        </div>
    </nav>

    <header class="bg-gradient-to-r from-blue-700 to-slate-900 text-white py-12 px-4 text-center">
        <h2 class="text-3xl font-bold mb-2">عالم الترفيه الرقمي بين يديك</h2>
        <p class="opacity-80">أفضل الأجهزة بأقل الأسعار في العراق</p>
    </header>

    <main class="container mx-auto px-4 py-10">
        <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            </div>
    </main>

    <footer class="bg-slate-900 text-gray-400 py-8 mt-20 border-t border-slate-800">
        <div class="container mx-auto px-4 text-center">
            <p class="mb-2">متجر أكاد الرقمي © 2026</p>
            <div class="flex justify-center gap-4 text-xl">
                <a href="#" class="hover:text-white"><i class="fab fa-whatsapp"></i></a>
                <a href="#" class="hover:text-white"><i class="fab fa-facebook"></i></a>
                <a href="#" class="hover:text-white"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
    </footer>

    <script>
        // مصفوفة المنتجات - يمكنك تعديلها بسهولة من هنا
        const products = [
            { id: 1, name: "X96 Max Plus Ultra", price: "55,000", cat: "tvbox", img: "https://img.icons8.com/fluency/200/android-os.png" },
            { id: 2, name: "عدسة ستلايت Premium", price: "15,000", cat: "satellite", img: "https://img.icons8.com/fluency/200/satellite-dish.png" },
            { id: 3, name: "حمالة تلفزيون متحركة 55 بوصة", price: "25,000", cat: "mounts", img: "https://img.icons8.com/fluency/200/monitor.png" },
            { id: 4, name: "شريط إضاءة RGB Smart", price: "18,000", cat: "lighting", img: "https://img.icons8.com/fluency/200/light-on.png" }
        ];

        let cart = 0;

        function displayProducts(items) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = items.map(p => `
                <div class="bg-white rounded-2xl shadow-sm hover:shadow-xl transition-all duration-300 p-4 border border-gray-100 group">
                    <div class="h-48 bg-gray-50 rounded-xl mb-4 flex items-center justify-center overflow-hidden">
                        <img src="${p.img}" class="group-hover:scale-110 transition-transform duration-300">
                    </div>
                    <span class="text-xs font-bold text-blue-500 uppercase tracking-widest">${p.cat}</span>
                    <h3 class="text-lg font-bold text-slate-800 mt-1">${p.name}</h3>
                    <div class="flex justify-between items-center mt-6">
                        <span class="text-xl font-bold text-slate-900">${p.price} د.ع</span>
                        <button onclick="addToCart()" class="bg-blue-600 hover:bg-blue-700 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg transition active:scale-90">
                            <i class="fas fa-plus"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function filterProducts(category) {
            if (category === 'all') {
                displayProducts(products);
            } else {
                const filtered = products.filter(p => p.cat === category);
                displayProducts(filtered);
            }
        }

        function addToCart() {
            cart++;
            document.getElementById('cart-count').innerText = cart;
            alert("تمت الإضافة للسلة!");
        }

        // تشغيل العرض عند فتح الصفحة
        displayProducts(products);
    </script>
</body>
</html>
