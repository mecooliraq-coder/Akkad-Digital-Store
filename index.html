<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر أكاد الرقمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background: #0f172a; color: white; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 1rem; }
    </style>
</head>
<body>

    <nav class="p-4 border-b border-white/5 sticky top-0 bg-slate-900/90 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-blue-400">AKKAD STORE</h1>
            <div id="orderStats" class="text-xs text-green-400"></div>
        </div>
    </nav>

    <main class="container mx-auto p-4">
        <div id="productsGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4">
            </div>
    </main>

    <div id="orderModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-[100]">
        <div class="glass-card p-6 w-full max-w-md">
            <h2 id="modalProdName" class="text-lg font-bold mb-4"></h2>
            <form onsubmit="sendOrder(event)" class="space-y-4">
                <input type="text" id="custName" placeholder="الاسم الكامل" class="w-full bg-white/5 p-3 rounded-lg border border-white/10" required>
                <input type="tel" id="custPhone" placeholder="رقم الهاتف" class="w-full bg-white/5 p-3 rounded-lg border border-white/10" required>
                <select id="custCity" class="w-full bg-slate-800 p-3 rounded-lg border border-white/10" required>
                    <option value="بغداد">بغداد</option>
                    <option value="البصرة">البصرة</option>
                    <option value="أربيل">أربيل</option>
                </select>
                <button type="submit" class="w-full bg-green-600 p-3 rounded-lg font-bold hover:bg-green-700">تأكيد الطلب عبر واتساب</button>
            </form>
            <button onclick="document.getElementById('orderModal').classList.add('hidden')" class="w-full mt-2 text-gray-400 text-sm">إلغاء</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://akkad-store-ab5a1-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let selectedProduct = null;

        // جلب المنتجات
        db.ref('products').on('value', snap => {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = "";
            const products = snap.val();
            if (products) {
                Object.entries(products).reverse().forEach(([id, p]) => {
                    grid.innerHTML += `
                        <div class="glass-card p-3 flex flex-col">
                            <img src="${p.img}" class="h-32 object-contain mb-2">
                            <h3 class="text-sm font-bold h-10 overflow-hidden">${p.name}</h3>
                            <div class="text-blue-400 font-bold my-2">${p.price} د.ع</div>
                            <button onclick="openOrder('${p.name}', '${p.price}')" class="bg-blue-600 py-2 rounded-lg text-xs font-bold mt-auto">اطلب الآن</button>
                        </div>
                    `;
                });
            }
        });

        function openOrder(name, price) {
            selectedProduct = { name, price };
            document.getElementById('modalProdName').innerText = name;
            document.getElementById('orderModal').classList.remove('hidden');
        }

        function sendOrder(e) {
            e.preventDefault();
            const order = {
                name: document.getElementById('custName').value,
                phone: document.getElementById('custPhone').value,
                city: document.getElementById('custCity').value,
                product: selectedProduct.name,
                price: selectedProduct.price,
                time: Date.now()
            };

            // حفظ الطلب في القاعدة
            db.ref('orders').push(order).then(() => {
                db.ref('stats/todayOrders').transaction(c => (c || 0) + 1);
                const msg = `طلب جديد من: ${order.name}%0aالمنتج: ${order.product}%0aالمدينة: ${order.city}`;
                window.open(`https://wa.me/9647730492020?text=${msg}`);
                document.getElementById('orderModal').classList.add('hidden');
            });
        }
    </script>
</body>
</html>
