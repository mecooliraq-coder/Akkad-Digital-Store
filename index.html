<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاد | متجر بلاد الرافدين الرقمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=Amiri:wght@400;700&family=Lateef&display=swap');
        
        :root {
            --mesopotamia-dark: #0a0f12;
            --akkad-gold: #d4af37;
            --sumerian-blue: #1a4d8c;
            --glass-bg: rgba(10, 15, 18, 0.65);
            --gold-glow: rgba(212, 175, 55, 0.4);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Tajawal', sans-serif; 
            background: var(--mesopotamia-dark); 
            color: #f0e6d0; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* خلفية بلاد الرافدين */
        .bg-mesopotamia {
            position: fixed; inset: 0; z-index: -2;
            background: 
                radial-gradient(ellipse at 30% 40%, rgba(212, 175, 55, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 70%, rgba(26, 77, 140, 0.1) 0%, transparent 50%),
                repeating-linear-gradient(45deg, rgba(139, 90, 43, 0.03) 0px, rgba(139, 90, 43, 0.03) 2px, transparent 2px, transparent 8px),
                linear-gradient(145deg, #0a0f12 0%, #141a1f 40%, #1a1510 100%);
        }

        /* الحروف المسمارية المتحركة */
        .cuneiform-particle {
            position: fixed;
            font-family: 'Lateef', cursive;
            font-size: 22px;
            color: rgba(212, 175, 55, 0.12);
            pointer-events: none;
            z-index: -1;
            white-space: nowrap;
            animation: floatCuneiform linear infinite;
        }
        
        @keyframes floatCuneiform {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.4;
            }
            90% {
                opacity: 0.4;
            }
            100% {
                transform: translateY(-20vh) rotate(360deg);
                opacity: 0;
            }
        }

        .zigzag-pattern {
            background: repeating-linear-gradient(90deg, transparent, transparent 20px, rgba(212, 175, 55, 0.15) 20px, rgba(212, 175, 55, 0.15) 22px);
            height: 2px;
            width: 100%;
        }

        .akkad-nav {
            background: rgba(10, 15, 18, 0.95); 
            backdrop-filter: blur(20px);
            border-bottom: 2px solid var(--akkad-gold);
            box-shadow: 0 4px 30px rgba(212, 175, 55, 0.1);
            position: relative;
            z-index: 100;
        }

        .akkad-logo-img { 
            width: 55px; 
            height: 55px; 
            border-radius: 50%; 
            border: 2px solid var(--akkad-gold); 
            background: #1a1108;
            object-fit: cover;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
            transition: all 0.3s ease;
        }
        
        .akkad-logo-img:hover {
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.6);
            transform: scale(1.05);
        }
        
        .akkad-logo-text { 
            font-size: 1.5rem; 
            font-weight: 800; 
            background: linear-gradient(135deg, #f0e6d0, var(--akkad-gold), #e8c97a); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        .akkad-subtitle {
            font-family: 'Amiri', serif;
            font-size: 0.7rem;
            letter-spacing: 3px;
            color: var(--akkad-gold);
        }

        .akkad-card { 
            background: linear-gradient(145deg, rgba(20, 26, 31, 0.85), rgba(10, 15, 18, 0.75));
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(212, 175, 55, 0.25); 
            border-radius: 1rem;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }
        
        .akkad-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--akkad-gold), transparent);
            opacity: 0.5;
        }
        
        .akkad-card:hover { 
            transform: translateY(-5px); 
            border-color: rgba(212, 175, 55, 0.6);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4), 0 0 20px rgba(212, 175, 55, 0.15);
        }

        .btn-akkad { 
            background: linear-gradient(135deg, var(--akkad-gold), #b8942e); 
            color: #0a0f12; 
            font-weight: 700;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }
        
        .btn-akkad:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
        }
        
        .btn-outline-akkad { 
            border: 1px solid rgba(212, 175, 55, 0.5); 
            color: var(--akkad-gold); 
            background: rgba(212, 175, 55, 0.08);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-outline-akkad:hover {
            background: rgba(212, 175, 55, 0.18);
            border-color: var(--akkad-gold);
        }

        .whatsapp-icon-btn {
            background: #25D366;
            color: white;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .whatsapp-icon-btn:hover {
            background: #128C7E;
            transform: scale(1.05);
        }

        .modal, .quick-order-modal, .video-modal {
            display: none;
            position: fixed; inset: 0;
            background: rgba(10, 15, 18, 0.96);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(15px);
        }
        
        .modal-content, .quick-order-form {
            background: linear-gradient(145deg, rgba(20, 26, 31, 0.98), rgba(10, 15, 18, 0.95));
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 1rem;
            padding: 1.5rem;
            max-width: 500px; width: 90%;
        }

        .video-modal-content {
            position: relative;
            width: 90vw;
            max-width: 800px;
            aspect-ratio: 16/9;
            border-radius: 1rem;
            overflow: hidden;
            border: 2px solid rgba(212, 175, 55, 0.4);
        }
        
        .video-modal-content iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .video-modal-close {
            position: absolute;
            top: -40px;
            left: 0;
            color: var(--akkad-gold);
            font-size: 28px;
            cursor: pointer;
            background: none;
            border: none;
        }

        .loader { 
            border: 3px solid rgba(212, 175, 55, 0.15); 
            border-top: 3px solid var(--akkad-gold); 
            border-radius: 50%; 
            width: 45px; height: 45px; 
            animation: spin 1s linear infinite; 
            margin: 40px auto;
        }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .category-chip {
            transition: all 0.3s ease;
            background: rgba(10, 15, 18, 0.6);
            border: 1px solid rgba(212, 175, 55, 0.3);
            cursor: pointer;
        }
        
        .category-chip.active {
            background: rgba(212, 175, 55, 0.15);
            border-color: var(--akkad-gold);
            color: var(--akkad-gold);
        }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: rgba(212, 175, 55, 0.05); }
        ::-webkit-scrollbar-thumb { background: var(--akkad-gold); border-radius: 3px; }

        .search-input {
            background: rgba(10, 15, 18, 0.7);
            border: 1px solid rgba(212, 175, 55, 0.3);
            transition: all 0.3s ease;
            color: #f0e6d0;
        }
        
        .search-input:focus {
            background: rgba(10, 15, 18, 0.9);
            border-color: var(--akkad-gold);
            outline: none;
        }

        .section-title {
            position: relative;
            display: inline-block;
            font-family: 'Amiri', serif;
            font-size: 2rem;
            font-weight: bold;
            color: #f0e6d0;
        }
        
        .section-title::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 2px;
            background: var(--akkad-gold);
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.5);
        }

        .product-media-container {
            position: relative;
            overflow: hidden;
            height: 180px;
            cursor: pointer;
        }
        
        .product-media-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        
        .akkad-card:hover .product-media-container img {
            transform: scale(1.05);
        }

        .video-play-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(212, 175, 55, 0.95);
            border: 2px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 3;
            opacity: 0;
            transition: all 0.3s ease;
        }
        
        .product-media-container:hover .video-play-btn {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        
        .video-play-btn i { color: #0a0f12; font-size: 16px; }

        .video-badge-bar {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(212, 175, 55, 0.9);
            color: #0a0f12;
            padding: 3px 8px;
            border-radius: 15px;
            font-size: 10px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 4px;
            pointer-events: none;
        }

        .footer {
            background: rgba(10, 15, 18, 0.95);
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            margin-top: 50px;
        }

        .toast { 
            position: fixed; 
            bottom: 20px; 
            left: 20px; 
            background: var(--sumerian-blue); 
            color: white; 
            padding: 10px 18px; 
            border-radius: 10px; 
            z-index: 9999; 
            animation: slideIn 0.3s; 
        }
        .toast.error { background: #9e5e3a; }
        @keyframes slideIn { 
            from { transform: translateX(-100%); opacity: 0; } 
            to { transform: translateX(0); opacity: 1; } 
        }

        /* ======================================== */
        /* شريط المنتجات المتداول (Carousel) */
        /* ======================================== */
        .slider-container {
            position: relative;
            width: 100%;
            overflow: hidden;
            padding: 10px 0;
            margin: 20px 0;
        }
        
        .slider-track {
            display: flex;
            gap: 16px;
            animation: scrollProducts 30s linear infinite;
            width: fit-content;
        }
        
        .slider-container:hover .slider-track {
            animation-play-state: paused;
        }
        
        @keyframes scrollProducts {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(-50%);
            }
        }
        
        .slider-product {
            flex-shrink: 0;
            width: 160px;
            background: linear-gradient(145deg, rgba(20, 26, 31, 0.9), rgba(10, 15, 18, 0.8));
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(212, 175, 55, 0.25);
        }
        
        .slider-product:hover {
            transform: translateY(-5px);
            border-color: var(--akkad-gold);
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.2);
        }
        
        .slider-product img {
            width: 100%;
            height: 110px;
            object-fit: cover;
        }
        
        .slider-product .info {
            padding: 8px;
            text-align: center;
        }
        
        .slider-product .name {
            font-size: 12px;
            font-weight: bold;
            white-space: normal;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            height: 32px;
        }
        
        .slider-product .price {
            font-size: 12px;
            color: var(--akkad-gold);
            font-weight: bold;
            margin-top: 5px;
        }
        
        .slider-fade {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 40px;
            z-index: 5;
            pointer-events: none;
        }
        
        .slider-fade-left {
            left: 0;
            background: linear-gradient(to left, transparent, var(--mesopotamia-dark));
        }
        
        .slider-fade-right {
            right: 0;
            background: linear-gradient(to right, transparent, var(--mesopotamia-dark));
        }
        
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div class="bg-mesopotamia"></div>
    
    <!-- الحروف المسمارية المتحركة ستضاف بالجافاسكريبت -->

    <nav class="akkad-nav sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3">
            <div class="flex justify-between items-center mb-3">

                    <div>

                <div class="flex gap-2">

                        <i class="fas fa-share-nodes"></i>
                        <span class="hidden sm:inline">مشاركة</span>
                    </button>
                    <a href="https://wa.me/9647730492020" class="bg-[#25D366] text-white w-10 h-10 rounded-xl flex items-center justify-center" target="_blank">
                        <i class="fab fa-whatsapp"></i>

    <main class="container mx-auto px-4 py-6">
        
        <!-- شريط المنتجات المتداول -->
        <div class="slider-container">
            <div class="slider-track" id="sliderTrack">
                <!-- ستتم تعبئتها بالجافاسكريبت -->
            </div>
            <div class="slider-fade slider-fade-left"></div>

        <div class="zigzag-pattern my-6 w-full"></div>

        <div id="products-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5 hidden"></div>
        
        <div id="no-results" class="hidden text-center py-20">

    </main>

    <footer class="footer py-6 text-center">
        <div class="container mx-auto px-4">
            <p class="text-gray-500 text-sm">© 2024 متجر أكاد الرقمي</p>
            <p class="text-gray-600 text-xs mt-2">من قلب بلاد الرافدين</p>
        </div>
    </footer>

    <!-- نوافذ -->

        <div class="modal-content" onclick="event.stopPropagation()">

            <button class="video-modal-close" onclick="closeVideoModal()">&times;</button>
            <iframe id="videoIframe" src="" allowfullscreen></iframe>
        </div>
    </div>

                <h3 class="text-xl font-bold text-[var(--akkad-gold)]"><i class="fab fa-whatsapp ml-2"></i>طلب سريع</h3>
                <button onclick="closeQuickOrder()" class="text-gray-400 hover:text-white text-2xl">&times;</button>

    <script>
        // ========================================
        // إعدادات Firebase
        // ========================================
        const firebaseConfig = {
            apiKey: "AIzaSyAEH25yJ-pwfgFUMjLZNgDyNqw8Rcv9S6E",
            authDomain: "akkad-store-ab5a1.firebaseapp.com",
            databaseURL: "https://akkad-store-ab5a1-default-rtdb.firebaseio.com",
            projectId: "akkad-store-ab5a1",
            storageBucket: "akkad-store-ab5a1.firebasestorage.app",
            messagingSenderId: "456810444639",
            appId: "1:456810444639:web:a706dc19781cd7738e28ea"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allProducts = [], categories = {}, categoryOrder = [], currentSearchTerm = '', currentCategory = 'all';

        // ========================================
        // الحروف المسمارية المتحركة
        // ========================================
        function createCuneiformParticles() {
            const symbols = ['𒀀', '𒅗', '𒁺', '𒀭', '𒂗', '𒈪', '𒀜', '𒁾', '𒊬', '𒄑', '𒆠', '𒌷', '𒉺', '𒋰', '𒍣'];
            for (let i = 0; i < 35; i++) {
                let particle = document.createElement('div');
                particle.className = 'cuneiform-particle';
                particle.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = 8 + Math.random() * 15 + 's';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.fontSize = (16 + Math.random() * 28) + 'px';
                particle.style.opacity = 0.1 + Math.random() * 0.2;
                document.body.appendChild(particle);
            }
        }
        createCuneiformParticles();

        function showToast(msg, type = 'success') { 
            let t = document.createElement('div'); 
            t.className = `toast ${type === 'error' ? 'error' : ''}`; 
            t.innerHTML = `<i class="fas ${type === 'error' ? 'fa-exclamation-triangle' : 'fa-check-circle'} ml-2"></i>${msg}`; 
            document.body.appendChild(t); 
            setTimeout(() => t.remove(), 3000); 
        }
        
        function shareStore() { 
            if (navigator.share) navigator.share({ title: 'متجر أكاد الرقمي', url: window.location.href }); 
            else { navigator.clipboard.writeText(window.location.href); showToast('✅ تم نسخ رابط المتجر'); } 
        }

        // دوال الفيديو
        function normalizeVideoUrl(input) {
            if (!input || input.trim() === '') return null;
            let video = input.trim();
            if (video.length === 11 && /^[a-zA-Z0-9_-]{11}$/.test(video)) {
                return `https://www.youtube.com/watch?v=${video}`;
            }
            if (video.includes('youtu.be/')) {
                let id = video.split('youtu.be/')[1]?.split('?')[0];
                if (id && id.length === 11) return `https://www.youtube.com/watch?v=${id}`;
            }
            if (video.includes('youtube.com/embed/')) {
                let id = video.split('embed/')[1]?.split('?')[0];
                if (id && id.length === 11) return `https://www.youtube.com/watch?v=${id}`;
            }
            if (video.includes('youtube.com/shorts/')) {
                let id = video.split('shorts/')[1]?.split('?')[0];
                if (id && id.length === 11) return `https://www.youtube.com/watch?v=${id}`;
            }
            return video;
        }

        function extractYouTubeId(url) {
            if (!url) return null;
            let match = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/);
            if (match) return match[1];
            match = url.match(/[?&]v=([a-zA-Z0-9_-]{11})/);
            if (match) return match[1];
            if (url.length === 11 && /^[a-zA-Z0-9_-]{11}$/.test(url)) return url;
            return null;
        }

        function playVideo(videoInput, event) {
            if (event) event.stopPropagation();
            let videoUrl = normalizeVideoUrl(videoInput);
            if (!videoUrl) { showToast('⚠️ لا يوجد رابط فيديو صالح', 'error'); return; }
            let videoId = extractYouTubeId(videoUrl);
            if (videoId) {
                let iframe = document.getElementById('videoIframe');
                iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
                document.getElementById('videoModal').style.display = 'flex';
            } else { 
                showToast('⚠️ رابط الفيديو غير صالح', 'error'); 
            }
        }
        
        function closeVideoModal() { 
            document.getElementById('videoModal').style.display = 'none'; 
            document.getElementById('videoIframe').src = ''; 
        }

        async function loadData() {
            try {
                let catsSnap = await db.ref('categories').once('value'); 
                categories = catsSnap.val() || {};
                let orderSnap = await db.ref('categoryOrder').once('value'); 
                categoryOrder = orderSnap.val() || [];
                let prodsSnap = await db.ref('products').once('value'); 
                let products = prodsSnap.val() || {};
                allProducts = Object.entries(products).map(([id, val]) => ({ id, ...val }));
                
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('products-grid').classList.remove('hidden');
                renderCategories(); 
                renderProducts();
                renderSlider();
            } catch(e) { 
                console.error(e); 
                document.getElementById('loading').classList.add('hidden'); 
                document.getElementById('error-message').classList.remove('hidden'); 
            }
        }
        
        function retryConnection() { 
            document.getElementById('error-message').classList.add('hidden'); 
            document.getElementById('loading').classList.remove('hidden'); 
            loadData(); 
        }
        
        function escapeHtml(t) { 
            if(!t) return ''; 
            return String(t).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); 
        }
        
        // شريط المنتجات المتداول (مكرر مرتين للحركة المستمرة)
        function renderSlider() {
            let container = document.getElementById('sliderTrack');
            let topProducts = [...allProducts].slice(0, 12);
            let html = '';
            // نكرر المنتجات مرتين للحصول على حركة مستمرة
            for (let repeat = 0; repeat < 2; repeat++) {
                topProducts.forEach(p => {
                    html += `
                        <div class="slider-product" onclick="handleImageClick('${p.id}')">
                            <img src="${p.img || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22%3E%3Crect width=%22200%22 height=%22200%22 fill=%22%231a1a2e%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23d4af37%22%3E📦%3C/text%3E%3C/svg%3E'}" alt="${escapeHtml(p.name)}">
                            <div class="info">
                                <div class="name">${escapeHtml(p.name.length > 25 ? p.name.substring(0, 22) + '...' : p.name)}</div>
                                <div class="price">${Number(p.price).toLocaleString()} د.ع</div>
                            </div>
                        </div>
                    `;
                });
            }
            container.innerHTML = html;
        }
        
        function renderCategories() {
            let container = document.getElementById('categories-nav');
            let catsList = [];
            categoryOrder.forEach(k => { if(categories[k]) catsList.push({key:k, name:categories[k]}); });
            Object.keys(categories).forEach(k => { if(!categoryOrder.includes(k)) catsList.push({key:k, name:categories[k]}); });
            let html = `<button onclick="filterByCategory('all')" class="category-chip px-4 py-2 rounded-full text-sm transition whitespace-nowrap ${currentCategory==='all'?'active':''}">🏠 الكل</button>`;
            catsList.forEach(c => { html += `<button onclick="filterByCategory('${c.key}')" class="category-chip px-4 py-2 rounded-full text-sm transition whitespace-nowrap ${currentCategory===c.key?'active':''}">📁 ${escapeHtml(c.name)}</button>`; });
            container.innerHTML = html;
        }
        
        function filterByCategory(k) { currentCategory = k; renderCategories(); renderProducts(); }
        function searchProducts() { currentSearchTerm = document.getElementById('searchInput').value.trim().toLowerCase(); renderProducts(); }
        function resetSearch() { document.getElementById('searchInput').value = ''; currentSearchTerm = ''; renderProducts(); document.getElementById('no-results').classList.add('hidden'); }
        
        function handleImageClick(pid) { 
            let p = allProducts.find(p=>p.id===pid); 
            if(p && p.video && p.video.trim()) playVideo(p.video); 
            else showProductDetails(pid); 
        }
        
        function showProductDetails(pid) { 
            let p = allProducts.find(p=>p.id===pid); 
            if(!p) return; 
            document.getElementById('modalTitle').innerHTML = p.name; 
            let dh = p.desc ? `<div class="mb-4">${escapeHtml(p.desc).replace(/\n/g,'<br>')}</div>` : ''; 
            dh += `<div class="bg-white/5 p-3 rounded-lg"><span class="text-[var(--akkad-gold)]">💰 السعر:</span> ${Number(p.price).toLocaleString()} د.ع</div>`; 
            document.getElementById('modalDesc').innerHTML = dh; 
            document.getElementById('descModal').style.display = 'flex'; 
        }
        
        function openQuickOrderFromCard(pid) { 
            let p = allProducts.find(p=>p.id===pid); 
            if(p) openQuickOrder(p); 
        }
        
        function openQuickOrder(p) { 
            if(!p) return; 
            document.getElementById('quickProductId').value = p.id; 
            document.getElementById('quickProductName').value = p.name; 
            document.getElementById('quickProductPrice').value = p.price; 
            document.getElementById('quickProductInfo').innerHTML = `<div class="flex justify-between"><span class="font-bold">${escapeHtml(p.name)}</span><span class="text-[var(--akkad-gold)] font-bold">${Number(p.price).toLocaleString()} د.ع</span></div>`; 
            ['quickCustomerName','quickGovernorate','quickPhone','quickAddress','quickNotes'].forEach(id=>{ let el=document.getElementById(id); if(el && el.tagName==='SELECT') el.value=''; else if(el) el.value=''; }); 
            document.getElementById('quickOrderModal').style.display = 'flex'; 
        }
        
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function closeQuickOrder() { document.getElementById('quickOrderModal').style.display = 'none'; }
        
        function renderProducts() {
            let container = document.getElementById('products-grid');
            let filtered = [...allProducts];
            if(currentCategory !== 'all') filtered = filtered.filter(p=>p.category === currentCategory);
            if(currentSearchTerm) filtered = filtered.filter(p=>p.name && p.name.toLowerCase().includes(currentSearchTerm));
            if(filtered.length === 0) { 
                document.getElementById('products-grid').classList.add('hidden'); 
                document.getElementById('no-results').classList.remove('hidden'); 
                return; 
            }
            document.getElementById('products-grid').classList.remove('hidden'); 
            document.getElementById('no-results').classList.add('hidden');
            
            container.innerHTML = filtered.map(p => { 
                let hasVideo = p.video && p.video.trim(); 
                return `<div class="akkad-card overflow-hidden"><div class="product-media-container" onclick="handleImageClick('${p.id}')"><img src="${p.img || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22%3E%3Crect width=%22200%22 height=%22200%22 fill=%22%231a1a2e%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23d4af37%22%3E📦%3C/text%3E%3C/svg%3E'}" alt="${escapeHtml(p.name)}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22%3E%3Crect width=%22200%22 height=%22200%22 fill=%22%231a1a2e%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23d4af37%22 font-size=%2240%22%3E📦%3C/text%3E%3C/svg%3E'">${hasVideo ? `<div class="video-play-btn" onclick="playVideo('${escapeHtml(p.video)}', event)"><i class="fas fa-play"></i></div><div class="video-badge-bar"><i class="fas fa-video"></i> فيديو</div>` : ''}</div><div class="p-4"><h3 class="font-bold text-base mb-1 line-clamp-2">${escapeHtml(p.name)}</h3><div class="text-[var(--akkad-gold)] font-bold text-lg mb-3">${Number(p.price).toLocaleString()} د.ع</div><div class="flex gap-2"><button onclick="showProductDetails('${p.id}')" class="btn-outline-akkad flex-1 py-2 rounded-lg text-sm transition">📖 تفاصيل</button><button onclick="openQuickOrderFromCard('${p.id}')" class="whatsapp-icon-btn w-10 h-10 rounded-lg transition"><i class="fab fa-whatsapp text-lg"></i></button></div></div></div>`; 
            }).join('');
        }

        document.getElementById('quickOrderForm').addEventListener('submit', async function(e) { 
            e.preventDefault(); 
            let name = document.getElementById('quickCustomerName').value.trim(); 
            let gov = document.getElementById('quickGovernorate').value; 
            let phone = document.getElementById('quickPhone').value.trim(); 
            let addr = document.getElementById('quickAddress').value.trim(); 
            let notes = document.getElementById('quickNotes').value.trim(); 
            let pid = document.getElementById('quickProductId').value; 
            let pname = document.getElementById('quickProductName').value; 
            let pprice = document.getElementById('quickProductPrice').value; 
            if(!name || !gov || !phone) { showToast('⚠️ الرجاء ملء الحقول المطلوبة','error'); return; } 
            let orderData = { orderId: Date.now().toString(), customerName: name, governorate: gov, phone: phone, address: addr, notes: notes, productId: pid, productName: pname, productPrice: pprice, status: 'جديد', createdAt: new Date().toISOString(), createdAtTimestamp: Date.now() }; 
            try { 
                await db.ref('orders/' + orderData.orderId).set(orderData); 
                let msg = `🛍️ *طلب جديد من متجر أكاد*\n\n👤 *الاسم:* ${name}\n📱 *الهاتف:* ${phone}\n🏛️ *المحافظة:* ${gov}\n📦 *المنتج:* ${pname}\n💰 *السعر:* ${Number(pprice).toLocaleString()} د.ع`; 
                if(addr) msg += `\n📍 *العنوان:* ${addr}`; 
                if(notes) msg += `\n💬 *ملاحظات:* ${notes}`; 
                msg += `\n\n📅 ${new Date().toLocaleString('ar-IQ')}`; 
                window.open(`https://wa.me/9647730492020?text=${encodeURIComponent(msg)}`, '_blank'); 
                showToast('✅ تم إرسال الطلب بنجاح!'); 
                setTimeout(() => closeQuickOrder(), 1500); 
            } catch(err) { showToast('❌ فشل إرسال الطلب', 'error'); } 
        });
        
        loadData();
    </script>
</body>
</html>
