<body class="p-4 md:p-8">

    <div id="loginOverlay" class="fixed inset-0 bg-slate-900 z-[100] flex items-center justify-center p-4">

            <button onclick="checkAuth()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700">دخول</button>
            <p id="errorMsg" class="text-red-500 mt-4 text-sm hidden">خطأ في كلمة المرور!</p>
        </div>
    </div>

    <div id="mainContent" class="max-w-6xl mx-auto hidden opacity-0 transition-opacity duration-500">

            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="glass-card p-6 h-fit sticky top-4">
                <h3 id="formTitle" class="font-bold text-lg mb-4 text-blue-600">إضافة منتج جديد</h3>
                <div class="space-y-4">
                    <input id="pId" type="hidden">
                    <input id="pName" type="text" placeholder="اسم المنتج" class="w-full p-3 border rounded-lg outline-none">
                    <input id="pPrice" type="text" placeholder="السعر" class="w-full p-3 border rounded-lg outline-none">

                    <input id="pImg" type="text" placeholder="رابط الصورة" class="w-full p-3 border rounded-lg outline-none">
                    <select id="pCat" class="w-full p-3 border rounded-lg outline-none bg-white"></select>
                    <textarea id="pDesc" placeholder="الوصف" class="w-full p-3 border rounded-lg h-24 outline-none"></textarea>
                    <button onclick="saveProduct()" id="saveBtn" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold">حفظ المنتج</button>
                    <button onclick="resetForm()" id="cancelBtn" class="w-full text-slate-400 text-xs hidden">إلغاء</button>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div id="productsList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </div>
    </div>

    <div id="catModal" class="fixed inset-0 bg-black/50 z-[110] hidden items-center justify-center p-4">

                <h3 class="font-bold text-xl">إدارة الأقسام</h3>

                <input id="catEditId" type="hidden"> <input id="catName" type="text" placeholder="اسم القسم" class="flex-1 p-3 border rounded-lg outline-none">

            </div>
            <div id="catListDisplay" class="space-y-2 max-h-60 overflow-y-auto"></div>
        </div>
    </div>
