<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول | لوحة التحكم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background: #0f172a; color: white; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">

    <!-- شاشة تسجيل الدخول -->
    <div id="loginScreen" class="w-full max-w-md p-8 glass rounded-3xl">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-lock text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold">لوحة التحكم</h1>
            <p class="text-gray-400 text-sm mt-2">متجر أكاد الرقمي</p>
        </div>
        
        <form onsubmit="return doLogin(event)">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-2">اسم المستخدم</label>
                    <input type="text" id="username" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white outline-none focus:border-blue-500" required>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-2">كلمة المرور</label>
                    <input type="password" id="password" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white outline-none focus:border-blue-500" required>
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition">
                    <i class="fas fa-sign-in-alt ml-2"></i> دخول
                </button>
            </div>
            <p id="loginError" class="text-red-400 text-sm text-center mt-4 hidden">اسم المستخدم أو كلمة المرور غير صحيحة</p>
        </form>
    </div>

    <!-- المحتوى المحمي (يظهر بعد تسجيل الدخول) -->
    <div id="protectedContent" class="hidden w-full">
        <!-- هنا يأتي كود لوحة التحكم الأصلي بالكامل -->
    </div>

<script>
    // ⚠️ غيّر هذه البيانات قبل الاستخدام!
    const ADMIN_USER = "admin";
    const ADMIN_PASS = "akkad2024"; // غيّرها لكلمة مرور قوية

    // التحقق من تسجيل الدخول عند تحميل الصفحة
    window.addEventListener('load', () => {
        if (localStorage.getItem('adminLoggedIn') === 'true') {
            showDashboard();
        }
    });

    function doLogin(e) {
        e.preventDefault();
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        
        if (user === ADMIN_USER && pass === ADMIN_PASS) {
            localStorage.setItem('adminLoggedIn', 'true');
            showDashboard();
        } else {
            document.getElementById('loginError').classList.remove('hidden');
        }
        return false;
    }

    function showDashboard() {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('protectedContent').classList.remove('hidden');
        // هنا تستدعي دالة init الأصلية للوحة التحكم
    }

    function logout() {
        localStorage.removeItem('adminLoggedIn');
        location.reload();
    }
</script>

</body>
</html>
