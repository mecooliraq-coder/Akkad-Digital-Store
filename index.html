<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر أكاد الرقمي | Akkad Digital Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        
        body { 
            font-family: 'Tajawal', sans-serif; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a); 
            color: white; 
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* حاوية الخلفية المتحركة */
        #bg-elements {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }

        .floating-img {
            position: absolute;
            opacity: 0.1; /* شفافية عالية جداً */
            filter: grayscale(100%) blur(2px); /* رمادي مع تغبيش خفيف للفخامة */
            animation: float-infinite var(--duration) ease-in-out infinite;
        }

        @keyframes float-infinite {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-40px) rotate(15deg); }
        }

        /* شريط متحرك */
        .ticker-wrapper { overflow: hidden; white-space: nowrap; background: rgba(15, 23, 42, 0.8); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .ticker-content { display: inline-block; animation: ticker 40s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        /* الكروت الزجاجية */
        .glass-card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            transition: all 0.4s ease; 
        }
        .glass-card:hover { transform: translateY(-10px); background: rgba(255, 255, 255, 0.07); }

        /* النوافذ المنبثقة */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(8px); padding: 20px; }
        .modal-content { background: #1e293b; border: 1px solid rgba(255,255,255,0.1); width: 100%; max-w-lg; border-radius: 24px; padding: 30px; position: relative; }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="bg-elements"></div>

    <nav class="sticky top-0 z-50 bg-slate-900/90 backdrop-blur-xl border-b border-white/5 p-4 shadow-2xl">
        <div class="container mx-auto flex justify-between items-center mb-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/20"><i class="fas fa-bolt"></i></div>
                <h1 class="text-xl font-bold italic uppercase">AKKAD <span class="text-blue-500">DIGITAL</span></h1>
            </div>
            <a href="https://wa.me/9647730492020" class="text-green-500"><i class="fab fa-whatsapp text-3xl"></i></a>
        </div>
        <div class="relative group max-w-2xl mx-auto">
            <input type="text" id="searchInput" onkeyup="searchProducts()" class="w-full bg-white/5 border border-white/10 rounded-2xl py-2 px-10 outline-none text-sm focus:border-blue-500" placeholder="ابحث عن أجهزة...">
            <i class="fas fa-search absolute right-4 top-3 text-gray-500"></i>
        </div>
        <div id="categories-nav" class="flex gap-3 mt-4 overflow-x-auto pb-2 scrollbar-hide text-[10px] font-bold"></div>
    </nav>

    <div class="ticker-wrapper"><div id="product-ticker" class="ticker-content py-2 text-blue-400 font-bold uppercase tracking-wider text-xs"></div></div>

    <main class="container mx-auto px-4 py-10 relative z-10">
        <div id="products-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
    </main>

    <div id="descModal" class="modal" onclick="closeModal('descModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="modalTitle" class="text-xl font-bold mb-4 text-blue-400"></h2>
            <p id="modalDesc" class="text-gray-300 leading-relaxed text-sm whitespace-pre-line mb-6"></p>
            <button onclick="closeModal('descModal')" class="w-full bg-slate-700 py-3 rounded-xl font-bold">إغلاق</button>
        </div>
    </div>

    <div id="videoModal" class="modal" onclick="closeModal('videoModal')">
        <div class="relative w-full max-w-4xl aspect-video rounded-3xl overflow-hidden shadow-2xl">
            <iframe id="ytPlayer" class="w-full h-full" src="" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://akkad-store-ab5a1-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myPhone = "9647730492020";
        let allProducts = [];

        db.ref('categories').on('value', snap => {
            const cats = snap.val();
            const nav = document.getElementById('categories-nav');
            nav.innerHTML = `<button onclick="filterByCat('all')" class="bg-blue-600 px-5 py-1 rounded-full whitespace-nowrap uppercase">الكل</button>`;
            for(let key in cats) nav.innerHTML += `<button onclick="filterByCat('${cats[key]}')" class="bg-white/5 border border-white/5 px-5 py-1 rounded-full whitespace-nowrap uppercase text-gray-400 hover:text-white transition">${cats[key]}</button>`;
        });

        db.ref('products').on('value', snap => {
            const data = snap.val();
            allProducts = data ? Object.entries(data).map(([id, val]) => ({id, ...val})).reverse() : [];
            displayProducts(allProducts);
            updateTicker();
            createFloatingBg(); // تحديث الخلفية عند تغيير المنتجات
        });

        function displayProducts(items) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = items.map((p, index) => `
                <div class="glass-card rounded-[2.5rem] p-5 flex flex-col relative group">
                    ${index < 4 ? '<span class="absolute top-3 left-3 bg-red-600 text-[8px] font-bold px-2 py-1 rounded-full z-10 shadow-lg">NEW</span>' : ''}
                    <div class="h-40 mb-4 bg-white/5 rounded-3xl flex items-center justify-center p-4 relative overflow-hidden">
                        <img src="${p.img}" class="max-h-full object-contain transition-all duration-500 group-hover:scale-110 group-hover:rotate-3">
                        ${p.video ? `<button onclick="openVideo('${p.video}')" class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-all">
                            <i class="fas fa-play bg-red-600 p-4 rounded-full text-white shadow-2xl"></i>
                        </button>` : ''}
                    </div>
                    <div class="flex-1">
                        <h3 class="font-bold text-xs mb-2 line-clamp-2 h-8 leading-tight text-gray-100">${p.name}</h3>
                        <div class="text-xl font-bold text-white mb-4">${p.price} <span class="text-[9px] text-gray-500 uppercase italic">IQD</span></div>
                        <button onclick="showDetails('${p.name}', \`${(p.desc || 'الوصف الفني غير متوفر حالياً').replace(/`/g, "'")}\`)" 
                                class="w-full border border-blue-500/20 text-blue-400 py-2 rounded-xl text-[9px] font-bold mb-3 hover:bg-blue-500/10 transition uppercase tracking-widest">
                            التفاصيل الكاملة
                        </button>
                    </div>
                    <a href="https://wa.me/${myPhone}?text=سلام عليكم، أرغب بطلب: ${p.name}" target="_blank" 
                       class="w-full bg-green-600 hover:bg-green-500 text-white py-3 rounded-2xl flex items-center justify-center gap-2 transition font-bold text-xs shadow-lg shadow-green-900/20">
                        <i class="fab fa-whatsapp text-lg"></i> اطلب الآن
                    </a>
                </div>
            `).join('');
        }

        // إنشاء عناصر الخلفية المتحركة
        function createFloatingBg() {
            const container = document.getElementById('bg-elements');
            container.innerHTML = ""; 
            // نختار 6 صور عشوائية من المنتجات لتكون في الخلفية
            const shuffled = [...allProducts].sort(() => 0.5 - Math.random()).slice(0, 6);
            
            shuffled.forEach((p, i) => {
                if(!p.img) return;
                const img = document.createElement('img');
                img.src = p.img;
                img.className = 'floating-img';
                
                // توزيع عشوائي للصور في الخلفية
                const top = Math.random() * 80 + 10;
                const left = Math.random() * 80 + 5;
                const size = Math.random() * 100 + 100; // حجم بين 100 و 200 بكسل
                const duration = Math.random() * 10 + 10; // مدة الحركة

                img.style.top = `${top}%`;
                img.style.left = `${left}%`;
                img.style.width = `${size}px`;
                img.style.setProperty('--duration', `${duration}s`);
                
                container.appendChild(img);
            });
        }

        function updateTicker() {
            const ticker = document.getElementById('product-ticker');
            ticker.innerHTML = allProducts.map(p => `<span class="mx-12 font-bold"><i class="fas fa-tag text-blue-600 ml-2"></i> ${p.name} - <span class="text-white">${p.price} د.ع</span></span>`).join('');
        }

        function showDetails(title, desc) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalDesc').innerText = desc;
            document.getElementById('descModal').style.display = 'flex';
        }

        function openVideo(id) {
            document.getElementById('ytPlayer').src = `https://www.youtube.com/embed/${id}?autoplay=1`;
            document.getElementById('videoModal').style.display = 'flex';
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
            if(modalId === 'videoModal') document.getElementById('ytPlayer').src = "";
        }

        function searchProducts() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            displayProducts(allProducts.filter(p => p.name.toLowerCase().includes(term)));
        }

        function filterByCat(category) {
            displayProducts(category === 'all' ? allProducts : allProducts.filter(p => p.cat === category));
        }
    </script>
</body>
</html>
