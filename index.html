<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر أكاد الرقمي | Akkad Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background: radial-gradient(circle at top right, #1e293b, #0f172a); color: white; min-height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.4s ease; }
        .glass-card:hover { transform: translateY(-10px); border-color: rgba(59, 130, 246, 0.5); }
        .wa-glow { box-shadow: 0 0 15px rgba(34, 197, 94, 0.4); }
        /* مودال الفيديو */
        #videoModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 bg-slate-900/80 backdrop-blur-md border-b border-white/5 p-4">
        <div class="container mx-auto flex justify-between items-center mb-4">
            <h1 class="text-xl font-bold italic">AKKAD <span class="text-blue-500">STORE</span></h1>
            <a href="https://wa.me/9647730492020" class="text-green-500"><i class="fab fa-whatsapp text-2xl"></i></a>
        </div>
        <input type="text" id="searchInput" onkeyup="searchProducts()" class="w-full bg-white/5 border border-white/10 rounded-2xl py-2 px-4 outline-none text-sm" placeholder="ابحث عن جهازك...">
        <div id="categories-nav" class="flex gap-3 mt-4 overflow-x-auto pb-2"></div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        <div id="products-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
    </main>

    <div id="videoModal" onclick="closeVideo()">
        <div class="relative w-full max-w-3xl aspect-video bg-black rounded-2xl overflow-hidden shadow-2xl">
            <iframe id="ytPlayer" class="w-full h-full" src="" frameborder="0" allowfullscreen></iframe>
            <button class="absolute top-4 right-4 text-white text-2xl" onclick="closeVideo()">×</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://akkad-store-ab5a1-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myPhone = "9647730492020";
        let allProducts = [];

        db.ref('categories').on('value', snap => {
            const cats = snap.val();
            const nav = document.getElementById('categories-nav');
            nav.innerHTML = `<button onclick="filterByCat('all')" class="bg-blue-600 px-4 py-1 rounded-xl whitespace-nowrap text-xs">الكل</button>`;
            for(let key in cats) {
                nav.innerHTML += `<button onclick="filterByCat('${cats[key]}')" class="bg-white/5 px-4 py-1 rounded-xl whitespace-nowrap text-xs transition">${cats[key]}</button>`;
            }
        });

        db.ref('products').on('value', snap => {
            const data = snap.val();
            allProducts = data ? Object.entries(data).map(([id, val]) => ({id, ...val})).reverse() : [];
            displayProducts(allProducts);
        });

        function displayProducts(items) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = items.map(p => `
                <div class="glass-card rounded-3xl p-4 flex flex-col relative group">
                    <div class="h-40 mb-4 bg-white/5 rounded-2xl flex items-center justify-center p-4 relative">
                        <img src="${p.img || 'https://via.placeholder.com/150'}" class="max-h-full object-contain group-hover:scale-105 transition">
                        ${p.video ? `<button onclick="openVideo('${p.video}')" class="absolute bottom-2 left-2 bg-red-600 text-white text-[10px] px-2 py-1 rounded-lg flex items-center gap-1 shadow-lg hover:bg-red-700 transition">
                            <i class="fas fa-play text-[8px]"></i> مراجعة فيديو
                        </button>` : ''}
                    </div>
                    <div class="flex-1">
                        <h3 class="font-bold text-xs text-gray-100 mb-2 h-8 line-clamp-2">${p.name}</h3>
                        <div class="text-lg font-bold text-white mb-4">${p.price} <span class="text-[10px] text-gray-500">د.ع</span></div>
                    </div>
                    <a href="https://wa.me/${myPhone}?text=سلام عليكم، أرغب بطلب: ${p.name}" target="_blank" 
                       class="wa-glow w-full bg-green-600 hover:bg-green-500 text-white py-2 rounded-xl flex items-center justify-center gap-2 transition active:scale-95">
                        <i class="fab fa-whatsapp text-sm"></i> <span class="text-xs font-bold">اطلب الآن</span>
                    </a>
                </div>
            `).join('');
        }

        function openVideo(id) {
            document.getElementById('ytPlayer').src = `https://www.youtube.com/embed/${id}?autoplay=1`;
            document.getElementById('videoModal').style.display = 'flex';
        }

        function closeVideo() {
            document.getElementById('ytPlayer').src = "";
            document.getElementById('videoModal').style.display = 'none';
        }

        function searchProducts() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            displayProducts(allProducts.filter(p => p.name.toLowerCase().includes(term)));
        }

        function filterByCat(category) {
            displayProducts(category === 'all' ? allProducts : allProducts.filter(p => p.cat === category));
        }
    </script>
</body>
</html>
