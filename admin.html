<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | أكاد</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #080c14; color: white; }
        .card { background: #111827; border: 1px solid #1f2937; padding: 20px; border-radius: 15px; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-6xl mx-auto space-y-6">
        <header class="flex justify-between items-center bg-blue-900/20 p-4 rounded-xl border border-blue-500/30">
            <h1 class="text-xl font-bold">لوحة إدارة المتجر</h1>
            <div id="statCount" class="text-green-400"></div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="card md:col-span-1 space-y-4">
                <h2 class="text-blue-400 font-bold border-b border-white/5 pb-2">إضافة منتج</h2>
                <input type="text" id="pName" placeholder="اسم المنتج" class="w-full bg-black/30 p-3 rounded-lg border border-white/10 outline-none">
                <input type="text" id="pPrice" placeholder="السعر (مثال: 25,000)" class="w-full bg-black/30 p-3 rounded-lg border border-white/10 outline-none">
                <input type="text" id="pImg" placeholder="رابط صورة المنتج" class="w-full bg-black/30 p-3 rounded-lg border border-white/10 outline-none">
                <textarea id="pDesc" placeholder="وصف المنتج" class="w-full bg-black/30 p-3 rounded-lg border border-white/10 outline-none h-24"></textarea>
                <button onclick="addProduct()" class="w-full bg-blue-600 p-3 rounded-lg font-bold hover:bg-blue-700 transition">نشر في المتجر</button>
            </div>

            <div class="card md:col-span-2 space-y-4">
                <h2 class="text-green-400 font-bold border-b border-white/5 pb-2">أحدث الطلبات</h2>
                <div id="ordersContainer" class="space-y-3 max-h-[600px] overflow-y-auto">
                    </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://akkad-store-ab5a1-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // دالة إضافة منتج
        function addProduct() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const img = document.getElementById('pImg').value;
            const desc = document.getElementById('pDesc').value;

            if(name && price && img) {
                db.ref('products').push({ name, price, img, desc }).then(() => {
                    alert("تمت الإضافة!");
                    document.querySelectorAll('input, textarea').forEach(i => i.value = "");
                });
            } else {
                alert("يرجى ملء الحقول الأساسية");
            }
        }

        // مراقبة الطلبات الواردة
        db.ref('orders').on('value', snap => {
            const container = document.getElementById('ordersContainer');
            container.innerHTML = "";
            const orders = snap.val();
            if(orders) {
                Object.entries(orders).reverse().forEach(([id, o]) => {
                    container.innerHTML += `
                        <div class="bg-white/5 p-4 rounded-xl border border-white/5 flex justify-between items-center">
                            <div>
                                <div class="font-bold text-blue-400">${o.name} - ${o.city}</div>
                                <div class="text-xs text-gray-400">المنتج: ${o.product} (${o.price} د.ع)</div>
                            </div>
                            <button onclick="deleteOrder('${id}')" class="text-red-500 hover:text-red-400"><i class="fas fa-trash"></i></button>
                        </div>
                    `;
                });
            } else {
                container.innerHTML = "<p class='text-gray-500 text-center'>لا توجد طلبات حالياً</p>";
            }
        });

        function deleteOrder(id) {
            if(confirm("هل تريد حذف الطلب من القائمة؟")) db.ref('orders/'+id).remove();
        }
    </script>
</body>
</html>
