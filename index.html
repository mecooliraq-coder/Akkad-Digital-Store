<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر أكاد الرقمي | إرث الرافدين</title>
    <script src="https://tailwindcss.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <link href="https://cloudflare.com" rel="stylesheet">
    <style>
        @import url('https://googleapis.com');
        
        :root {
            --akkad-deep: #060a0f;
            --lapis-lazuli: #121f33;
            --akkad-gold: #c9a961;
            --glass: rgba(18, 31, 51, 0.7);
        }

        body { 
            font-family: 'Tajawal', sans-serif; 
            background-color: var(--akkad-deep); 
            color: #e2e8f0;
            min-height: 100vh;
        }

        .bg-royal {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 50% 50%, rgba(201, 169, 97, 0.05) 0%, transparent 70%),
                        linear-gradient(165deg, #060a0f 0%, #0c1624 100%);
        }

        .akkad-nav {
            background: rgba(6, 10, 15, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--akkad-gold);
        }

        .akkad-logo-text {
            font-family: 'Amiri', serif;
            background: linear-gradient(to bottom, #fff, var(--akkad-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .akkad-card {
            background: var(--glass);
            border: 1px solid rgba(201, 169, 97, 0.2);
            border-radius: 4px;
            transition: all 0.4s ease;
        }

        .akkad-card:hover {
            transform: translateY(-8px);
            border-color: var(--akkad-gold);
            box-shadow: 0 0 20px rgba(201, 169, 97, 0.2);
        }

        .btn-akkad {
            background: linear-gradient(135deg, var(--akkad-gold), #8b6f47);
            color: #060a0f;
            font-weight: 700;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            transition: 0.3s;
        }

        .category-chip {
            padding: 8px 24px;
            border: 1px solid rgba(201, 169, 97, 0.3);
            cursor: pointer;
            transition: 0.3s;
            background: rgba(201, 169, 97, 0.05);
        }

        .category-chip.active {
            background: var(--akkad-gold);
            color: var(--akkad-deep);
        }

        .loader {
            border: 3px solid rgba(201, 169, 97, 0.1);
            border-top: 3px solid var(--akkad-gold);
            border-radius: 50%;
            width: 40px; height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="bg-royal"></div>

    <nav class="akkad-nav sticky top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <h1 class="akkad-logo-text text-3xl font-bold">أكاد السومري</h1>
            </div>
            <div class="relative cursor-pointer" onclick="viewCart()">
                <i class="fa-solid fa-shopping-cart text-2xl text-gold-500"></i>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-red-600 text-white text-[10px] rounded-full px-1.5 font-bold">0</span>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-10">
        <div class="flex gap-4 mb-10 overflow-x-auto pb-4 no-scrollbar" id="category-bar">
            <!-- الفئات سيتم تحميلها تلقائياً -->
            <div class="category-chip active" onclick="filterItems('الكل')">الكل</div>
        </div>

        <div id="products-grid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-8 text-center md:text-right">
            <!-- المنتجات هنا -->
        </div>

        <div id="loader" class="flex justify-center my-20">
            <div class="loader"></div>
        </div>
    </main>

    <script>
        // تكوين Firebase الخاص بك
        const firebaseConfig = {
            apiKey: "AIzaSyAEH25yJ-pwfgFUMjLZNgDyNqw8Rcv9S6E",
            authDomain: "akkad-store-ab5a1.firebaseapp.com",
            databaseURL: "https://akkad-store-ab5a1-default-rtdb.firebaseio.com",
            projectId: "akkad-store-ab5a1",
            storageBucket: "akkad-store-ab5a1.firebasestorage.app",
            messagingSenderId: "456810444639",
            appId: "1:456810444639:web:a706dc19781cd7738e28ea"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let products = [];

        // دالة جلب المنتجات
        function loadProducts() {
            document.getElementById('loader').style.display = 'flex';
            db.ref('products').on('value', (snapshot) => {
                const data = snapshot.val();
                products = data ? Object.values(data) : [];
                displayProducts(products);
                document.getElementById('loader').style.display = 'none';
            });
        }

        // دالة عرض المنتجات
        function displayProducts(items) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = items.map(item => `
                <div class="akkad-card p-5">
                    <img src="${item.image}" class="w-full h-52 object-cover rounded mb-4 border border-gold-500/20 shadow-lg">
                    <h3 class="text-xl font-bold text-white mb-2">${item.name}</h3>
                    <div class="flex justify-between items-center mt-4">
                        <span class="text-gold-500 font-bold text-lg">${item.price} د.ع</span>
                        <button onclick="addToCart('${item.id}')" class="btn-akkad px-6 py-2">اقتناء</button>
                    </div>
                </div>
            `).join('');
        }

        // فلاتر الكاتجوري
        function filterItems(category) {
            const filtered = category === 'الكل' ? products : products.filter(p => p.category === category);
            displayProducts(filtered);
            
            // تحديث شكل الفلاتر
            const chips = document.querySelectorAll('.category-chip');
            chips.forEach(c => {
                c.classList.remove('active');
                if(c.innerText === category) c.classList.add('active');
            });
        }

        function viewCart() {
            alert("نظام السلة قيد المعالجة ليتماشى مع قاعدة بياناتك الجديدة");
        }

        window.onload = loadProducts;
    </script>
</body>
</html>
