<script>
    // إعدادات Firebase (يجب التأكد من مطابقتها لمشروعك)
    const firebaseConfig = {
        databaseURL: "https://your-project-id.firebaseio.com" 
    };
    
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    // متغيرات الحالة
    let allOrders = [];
    let allCategories = {};

    // تحديث الوقت المباشر
    function updateClock() {
        const now = new Date();
        document.getElementById('currentTime').innerText = now.toLocaleString('ar-EG');
    }
    setInterval(updateClock, 1000);
    updateClock();

    // 1. إدارة الأقسام (التحكم الكلي)
    function loadCategories() {
        db.ref('categories').on('value', (snapshot) => {
            const categories = snapshot.val() || {};
            allCategories = categories;
            
            // تحديث قائمة الأقسام في نموذج إضافة المنتجات
            const pCatSelect = document.getElementById('pCat');
            pCatSelect.innerHTML = '<option value="">اختر القسم...</option>';
            
            // تحديث قائمة الأقسام في صفحة الإدارة
            const listContainer = document.getElementById('categoriesFullList');
            listContainer.innerHTML = '';

            Object.keys(categories).forEach(id => {
                const cat = categories[id];
                
                // إضافة للقائمة المنسدلة
                pCatSelect.innerHTML += `<option value="${id}">${cat.name}</option>`;
                
                // إضافة لجدول الإدارة
                listContainer.innerHTML += `
                    <div class="flex items-center justify-between p-4 bg-white border border-gray-100 rounded-xl hover:shadow-sm transition">
                        <div class="flex items-center gap-3">
                            <div class="category-icon bg-orange-100 text-orange-600">
                                <i class="fas fa-folder"></i>
                            </div>
                            <span class="font-bold text-slate-700">${cat.name}</span>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="editCategory('${id}', '${cat.name}')" class="text-blue-500 hover:bg-blue-50 p-2 rounded-lg transition">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button onclick="deleteCategory('${id}')" class="text-red-500 hover:bg-red-50 p-2 rounded-lg transition">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
        });
    }

    // حفظ قسم (إضافة أو تعديل)
    function saveCategory() {
        const name = document.getElementById('newCat').value.trim();
        const id = document.getElementById('catId').value;

        if (!name) return alert("يرجى إدخال اسم القسم");

        if (id) {
            // تحديث
            db.ref('categories/' + id).update({ name: name })
                .then(() => {
                    showToast("تم تحديث القسم بنجاح");
                    cancelEdit();
                });
        } else {
            // إضافة جديد
            const newRef = db.ref('categories').push();
            newRef.set({ name: name })
                .then(() => {
                    showToast("تم إضافة القسم الجديد");
                    document.getElementById('newCat').value = '';
                });
        }
    }

    function deleteCategory(id) {
        if (confirm("هل أنت متأكد من حذف هذا القسم؟ سيؤثر ذلك على عرض المنتجات المرتبطة به.")) {
            db.ref('categories/' + id).remove().then(() => showToast("تم حذف القسم"));
        }
    }

    function editCategory(id, name) {
        document.getElementById('catId').value = id;
        document.getElementById('newCat').value = name;
        document.getElementById('catFormTitle').innerText = "تعديل القسم";
        document.getElementById('btnSaveCatText').innerText = "تحديث";
        document.getElementById('btnCancelEdit').classList.remove('hidden');
        document.getElementById('newCat').focus();
    }

    function cancelEdit() {
        document.getElementById('catId').value = '';
        document.getElementById('newCat').value = '';
        document.getElementById('catFormTitle').innerText = "إضافة قسم جديد";
        document.getElementById('btnSaveCatText').innerText = "إضافة";
        document.getElementById('btnCancelEdit').classList.add('hidden');
    }

    // 2. إدارة التبويبات
    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active');
        
        ['orders', 'products', 'categories', 'analytics'].forEach(p => {
            document.getElementById('panel-' + p).classList.add('hidden');
        });
        document.getElementById('panel-' + tab).classList.remove('hidden');
    }

    // 3. إدارة المنتجات
    function saveProduct() {
        const product = {
            name: document.getElementById('pName').value,
            price: document.getElementById('pPrice').value,
            stock: parseInt(document.getElementById('pStock').value),
            img: document.getElementById('pImg').value,
            video: document.getElementById('pVideo').value,
            cat: document.getElementById('pCat').value,
            desc: document.getElementById('pDesc').value,
            timestamp: Date.now()
        };

        if (!product.name || !product.price || !product.cat) {
            return alert("يرجى ملء الحقول الأساسية (الاسم، السعر، القسم)");
        }

        const id = document.getElementById('pId').value;
        if (id) {
            db.ref('products/' + id).update(product).then(() => {
                showToast("تم تحديث المنتج");
                resetForm();
            });
        } else {
            db.ref('products').push(product).then(() => {
                showToast("تم إضافة المنتج بنجاح");
                resetForm();
            });
        }
    }

    function loadProducts() {
        db.ref('products').on('value', (snapshot) => {
            const products = snapshot.val() || {};
            const container = document.getElementById('admin-products-list');
            container.innerHTML = '';
            
            let count = 0;
            let lowStock = 0;

            Object.keys(products).forEach(id => {
                const p = products[id];
                count++;
                if (p.stock <= 3) lowStock++;

                container.innerHTML += `
                    <div class="bg-gray-50 p-4 rounded-xl border border-gray-200 flex gap-4 items-center">
                        <img src="${p.img || 'https://via.placeholder.com/80'}" class="w-16 h-16 rounded-lg object-cover bg-white">
                        <div class="flex-1">
                            <h4 class="font-bold text-sm">${p.name}</h4>
                            <div class="text-blue-600 font-bold text-xs mt-1">${p.price} د.ع</div>
                            <div class="text-xs ${p.stock <= 3 ? 'text-red-500 font-bold' : 'text-gray-400'}">المخزون: ${p.stock}</div>
                        </div>
                        <div class="flex flex-col gap-2">
                            <button onclick="editProduct('${id}')" class="text-blue-500 p-2 hover:bg-blue-100 rounded-lg"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteProduct('${id}')" class="text-red-500 p-2 hover:bg-red-100 rounded-lg"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
            });
            
            document.getElementById('statTotalProducts').innerText = count;
            document.getElementById('statLowStock').innerText = lowStock;
        });
    }

    // وظائف مساعدة
    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'notification-toast';
        toast.innerHTML = `<i class="fas fa-check-circle text-green-500 ml-2"></i> ${msg}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function resetForm() {
        document.getElementById('pId').value = '';
        document.getElementById('pName').value = '';
        document.getElementById('pPrice').value = '';
        document.getElementById('pStock').value = '';
        document.getElementById('pImg').value = '';
        document.getElementById('pVideo').value = '';
        document.getElementById('pDesc').value = '';
        document.getElementById('formTitle').innerText = "إضافة منتج جديد";
        document.getElementById('btnSaveText').innerText = "حفظ المنتج";
    }

    function openCategoryModal() {
        document.getElementById('categoryModal').classList.add('active');
    }

    function closeCategoryModal() {
        document.getElementById('categoryModal').classList.remove('active');
        cancelEdit();
    }

    // تشغيل التحميل عند الفتح
    window.onload = () => {
        loadCategories();
        loadProducts();
    };
</script>
